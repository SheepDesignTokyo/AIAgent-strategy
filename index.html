退","定性検証で「使いたくない」が出たら理由を特定せずにBへ進まない(精度を上げても解決しない場合が多い)","BフェーズはAと性格が異なる: PoCで目をつむっていたセキュリティ・パフォーマンス・障害対応・運用監視・ユーザー管理が本番要件として浮上。導入後の研修・サポート・フィードバックループが定着率を左右"],"related":["ai-uncertainty","three-layer-framework","gap-analysis"],"quiz":{"q":"営業部門から「AIエージェントで提案書作成を自動化したい」という要望を受けた。最初に取るべき行動として最も適切なものはどれか。","c":["要望通り提案書自動化のAIモデル開発をすぐ開始する","「何が困っているか」「何が変われば成功か」「現状どう対処しているか」を深掘りする","市場の提案書作成AIツールを調査し導入コストを試算する","自動化の要件定義ドキュメントを作成する"],"a":1,"exp":"「提案書自動化」は手段の指定であり課題ではない。手段から入ると課題に合わない解決策を設計するリスクが高まる。まず課題の輪郭を掴むのが初期相談の役割。"}},{"id":"three-layer-framework","term":"成功定義の3層フレームワーク","yomi":"さんそうふれーむわーく","aliases":["効果層","定着層","精度層","トップダウンとボトムアップ","成功定義シート"],"ch":3,"sec":"18","secTitle":"AIプロジェクトの成功の定義: 3層フレームワーク","def":"AIプロジェクトの成功を第1層:効果層(ビジネスに効果が出ているか)、第2層:定着層(現場の人が使っているか)、第3層:精度層(AIが正しく答えられるか)の3層で定義するフレームワーク。核心は二重構造:「定義はトップダウン」(効果層→定着層→精度層の順で逆算。効果目標が決まって初めて必要な定着率・精度が根拠を持つ)、「達成はボトムアップ」(精度が出なければ使われず、使われなければ効果が出ない)。","points":["成功定義が難しい理由: エンジニアは正答率、現場は使いやすさ、経営層はコスト削減と、関係者それぞれが異なる成功を描いており評価対象が異なる。唯一の防止策はPoC開始前に3層すべてで成功の定義を合意すること","二重構造を理解しないプロジェクトは精度層だけを定義し「正答率80%達成=成功」と判断→後から「使われていない」「効果が出ていない」に直面","逆算の例: 「対応時間30%削減」→「回答の採用率60%以上が必要」→定着層の目標値に根拠が生まれる","成功定義シート(効果層→定着層→精度層+合否判定ルール+合意した関係者)をPoC開始前に埋めることが混乱を防ぐ最も効果的な手段。全層合格→本運用へ/1つ以上未達→原因特定してAフェーズ反復/見通しが立たない→撤退検討"],"related":["poc-flow","adoption-layer","precision-layer","baseline"],"quiz":{"q":"ヘルプデスクAIのPoCに向けて成功の定義を設計する際、最初に定義すべき指標はどれか。","c":["AIの回答正答率の目標値(例: 85%以上)","問い合わせ対応時間の削減率(例: 30%削減)","担当者の週次利用率の目標値(例: 70%以上)","エスカレーション件数"],"a":1,"exp":"定義はトップダウン。まず効果層(ビジネスへの効果)を定義し、そこから定着層・精度層を逆算する。正答率(精度層)や利用率(定着層)は効果目標が決まって初めて根拠のある数値になる。"}},{"id":"baseline","term":"ベースライン測定","yomi":"べーすらいんそくてい","aliases":["導入前の基準値","現状値の記録"],"ch":3,"sec":"18","secTitle":"AIプロジェクトの成功の定義: 3層フレームワーク","def":"導入前の基準となる数値の測定。効果層で最も起こりやすいミスがベースラインの未測定で、導入前の数値がなければ導入後にどれだけ改善したかを客観的に示す手段がない。PoC開始前(または開始と同時)に現状の業務状況を数値で記録しておくことが鉄則。","points":["主な測定項目: 対象業務の平均処理時間、一定期間あたりの対応件数、担当者数やコスト、品質の現状指標(クレーム件数・エラー率)","精度層でも「現在、人間がどの程度の精度で対応できているか」が導入前の基準値として必要","PoC終了後に経営から「実際どれだけコストが下がったのか」と問われて証明できない失敗の根本原因はベースライン未測定"],"related":["three-layer-framework","roi"],"quiz":{"q":"PoC終了後に経営から「導入で実際にどれだけコストが下がったのか数字で示してほしい」と求められたが証明できない。根本原因として最も適切なものはどれか。","c":["精度層の目標値を高く設定しすぎた","PoC期間が短すぎた","効果層のベースラインをPoC開始前に測定していなかった","定着層の定量指標を本運用後に測定しなかった"],"a":2,"exp":"効果の証明には導入前後の数値比較が必要。ベースライン測定はPoC開始前(または同時)に行うのが鉄則で、成功定義シートの効果層に測定時期として明記される。"}},{"id":"adoption-layer","term":"定着層の測定と「使いたくない」4分類","yomi":"ていちゃくそうのそくてい","aliases":["定着層","定性評価","使いたくない理由"],"ch":3,"sec":"18","secTitle":"AIプロジェクトの成功の定義: 3層フレームワーク","def":"定着層はAIエージェントが現場に受け入れられているかを測る層。技術的に完成したシステムが使われない理由のほとんどはこの層の問題。実務上の注意点として、PoC期間中(数週間〜数ヶ月)の定量指標は解釈が難しい(利用率50%が「使いにくいから」か「まだ慣れていないだけ」か判別できない)ため、PoC中は定性的な代理指標で見通しを評価し、定量検証は本運用フェーズで行うと割り切る。","points":["「使いたくない」理由の4分類: ①精度への不信感→精度層にフィードバック、②UXの問題(画面が使いにくい・回答が長すぎる)→インターフェース改善、③業務フローへの不適合(このタイミングで聞く余裕がない)→業務設計の見直し、④心理的抵抗(AIに頼るとスキルが落ちる気がする)→変革管理(Change Management)の問題","理由を特定せずに「もっと精度を上げれば使われる」と判断するのは原因を誤診した対処","正答率は目標達成でも「回答が長くて電話対応中に読む余裕がない」ならUX・業務フロー適合性の問題。精度を上げても解決せず、Aフェーズに戻って回答フォーマットを改善して再検証する"],"related":["three-layer-framework","poc-flow","obsolescence-risk"],"quiz":{"q":"PoCで正答率は目標の85%を達成したが、現場から「回答が長くて電話対応中に読む余裕がない」という声が複数出た。最も適切な判断はどれか。","c":["正答率目標を達成しているため本運用フェーズへ移行する","定着層の定性評価で問題が見つかったため、原因を特定してAフェーズを繰り返す","定着の問題は本運用後の研修で解決できるため移行を進める","正答率を95%以上に引き上げて信頼を高める"],"a":1,"exp":"「回答が長い」は精度ではなくUXと業務フロー適合性の問題。精度を上げても解決しない。原因を誤診したまま本運用に進むと「動くが使われないシステム」になる。"}},{"id":"precision-layer","term":"精度層と指標の逆算(再現率/適合率)","yomi":"せいどそうとしひょうのぎゃくさん","aliases":["精度層","再現率","適合率","Recall","Precision","正答率"],"ch":3,"sec":"18","secTitle":"AIプロジェクトの成功の定義: 3層フレームワーク","def":"精度層はAIが技術的に課題を解けているかを測る層。最も定義しやすいが「これだけ定義して満足すること」が最大の罠。目標値は「とりあえず正答率80%」のような根拠のない数値ではなく、①現在人間がどの程度の精度で対応できているか、②どの程度なら現場が実務で使えると判断するか、③どの程度なら本番運用時のリスクが許容範囲かの3観点から逆算する。","points":["例: ベテランの正答率95%なら直ちに同水準をAIに求めるのは非現実的。「頻度の高い問い合わせ上位10種類は正答率90%以上、それ以外は担当者へ引き継ぐ」のように対象範囲と水準をあわせて設計","業務によって重視すべき精度指標は異なる: 品質検査AI=不良品を見逃さないことが重要→再現率(Recall)重視、スパムフィルタ=正常メールを誤って除外しないことが重要→誤検知の少なさ(適合率)重視","不良品の見逃しがリコールにつながり、かつ誤検知が多いと検査ラインが止まる場合→再現率を優先しつつ誤検知率に許容上限を設ける設計が現実的。正答率だけでは見逃しと誤検知の内訳がわからない"],"related":["three-layer-framework","baseline","adoption-layer"],"quiz":{"q":"外観検査AIで、不良品の見逃しは製品リコールにつながる一方、誤検知が多すぎると検査ラインが止まる。精度指標の設計として最も適切なものはどれか。","c":["正答率(Accuracy)だけを測定し95%以上を目標にする","適合率(Precision)を優先し誤検知率の最小化を目標にする","再現率(Recall)を優先しつつ、誤検知率にも許容上限を設ける","F1スコアだけを測定しバランスを均等にする"],"a":2,"exp":"最大リスクは見逃し(リコール)なので再現率を優先。ただし誤検知過多はライン停止を招くため許容上限も設ける。正答率だけでは見逃しと誤検知の内訳が見えず業務リスク評価に使えない。"}},{"id":"automation-levels","term":"自動化の4レベル","yomi":"じどうかのよんれべる","aliases":["Lv1 アドホック","Lv2 カスタムチャットボット","Lv3 ワークフロー","Lv4 自律型エージェント","電車と自家用車"],"ch":4,"sec":"19","secTitle":"自動化レベルの進化論と実務における最適解","def":"AIエージェント活用を自律性と仕組み化の程度で4段階に整理したもの(優劣の序列ではなく目的と状況に応じた選択肢)。Lv1アドホック=必要なときに都度使う(ChatGPT等をそのまま利用、仕組み化なし、個人の実験段階として価値)。Lv2カスタムチャットボット=システムプロンプトとナレッジベースで専門性を持たせる(GPTs/Gem等。対話型にとどまり自ら業務を開始しない)。Lv3ワークフロー=トリガーをきっかけに事前設計したステップを自動実行(電車: 決められたレールを走る。再現性が高く責任の所在が明確)。Lv4自律型エージェント=目標を与えるとAIが計画立案から実行・次の行動判断まで自律的に進める(自家用車: 状況を見てルートを判断。柔軟だが想定外動作・コスト増・責任分界の曖昧化リスク)。","points":["境界線の判別: Lv1↔Lv2=「仕組み化されているか」/Lv2↔Lv3=「AIが自ら動き出すか」「システム連携があるか」/Lv3↔Lv4=「フローの構造自体をAIが作ったか」(自動化が進んでいてもフローが人間設計ならLv3)","多くの企業が最初に本格的な成果を実感するのはLv3。想定外の事態ではフローは止まるか人間に引き渡す","Lv4は柔軟だが適用範囲は慎重に。まずLv3で実績と運用知見を蓄積し、高い自律性が必要な領域へ段階的に適用するのが現実的"],"related":["mvp-approach","wf-triggers","context-engineering","autonomy-levels"],"quiz":{"q":"「Salesforceの案件ステージ変更をきっかけに事前設計されたステップが自動実行される仕組み(順序とロジックは人間が設計)」と「AIがCRMの商談進捗を自ら監視し、提案タイミングの判断から構成計画・作成・送付まで自律的に遂行する仕組み」の自動化レベルの組み合わせはどれか。","c":["前者=Lv2、後者=Lv3","前者=Lv3、後者=Lv3","前者=Lv3、後者=Lv4","前者=Lv4、後者=Lv4"],"a":2,"exp":"前者はトリガーから各ステップが事前設計されており電車型のLv3。後者は何をどの順序で行うかをAI自身が計画しており自家用車型のLv4。判別の決め手は「フローの構造自体をAIが作ったか」。"}},{"id":"mvp-approach","term":"MVPアプローチと段階的引き上げ","yomi":"えむぶいぴーあぷろーち","aliases":["MVP","小さく始める","段階的導入"],"ch":4,"sec":"19","secTitle":"自動化レベルの進化論と実務における最適解","def":"いきなり全自動を目指さず、最小限だが実際に価値を提供できる形で素早く検証し、データに基づいて次のレベルへの投資判断を行うアプローチ。全自動を目指すプロジェクトは構築に時間がかかりすぎて成果が出る前に期待値が下がり頓挫しやすい。AI導入は技術の問題であると同時に組織の信頼の問題でもあり、小さく始めて早期に価値を実感し信頼を積み上げてから範囲を広げるのが現実的な道筋。","points":["提案書AIの例: まずLv2のカスタムチャットボットを2週間で構築し5名で1ヶ月検証(「ドラフトは使える品質か」を確認)→「6時間が4時間に短縮」の価値が確認できたらLv3のSalesforce連携へ→Lv4はLv3のデータで自律判断の精度が十分と確認できてから慎重に検討","Lv1では組織的効果が出ず、いきなりLv3では構築3ヶ月で成果が出ない — Lv2をMVPとして「まず価値を証明する」のが判断のポイント","Lv2の検証成功後にLv3を飛ばしてLv4へ進むべきではない"],"related":["automation-levels","poc-flow"],"quiz":{"q":"「まずカスタムチャットボットで5名に先行利用してもらい、品質と時間短縮効果を検証してからSalesforce連携の構築に進む」アプローチの説明として最も適切なものはどれか。","c":["いきなりLv3から始めた方が効率的でありLv2での検証は時間の無駄","MVPアプローチにより自動化の価値を低コストで検証し、データに基づいてLv3への投資判断を行える","MVPは品質の低い試作品であり本番では使えない","Lv2の検証が成功したらLv3を飛ばしてLv4に進むべき"],"a":1,"exp":"MVPは「最小限だが実際に価値を提供できる」形での素早い検証。低コストで価値を証明し、定量データがLv3への投資判断の説得力を生む。"}},{"id":"wf-triggers","term":"ワークフローのトリガー(指示型/定時型/条件型)","yomi":"わーくふろーのとりがー","aliases":["イベントトリガー","Webhook","スケジュール実行","フォーム送信","閾値トリガー","期限・日付ベース"],"ch":4,"sec":"20","secTitle":"ワークフロー設計 トリガーとアクション","def":"トリガーは処理を開始するきっかけ。3つの大分類とその中の具体的な種類がある。【指示型】人間の意図的な行為が合図: チャット・音声指示(結果として外部システム書き込みまで連動する点がLv2との違い)、手動実行(ボタン押下)。【定時型】時間が合図: スケジュール実行(毎朝9時など固定の時刻・頻度。最もシンプルで導入初期にまず試すべき)、期限・日付ベース(契約更新日の30日前などデータ内の日付を参照)。【条件型】変化を検知: イベントトリガー(新規メール受信・CRMステータス変更などをワークフロー側が監視して検知)、フォーム送信、Webhook(外部システム側が変化の発生を通知してくる)、閾値トリガー(在庫が100個を下回ったら等)。","points":["イベントトリガーとWebhookの違いは「変化を検知する主体」: イベントトリガー=ワークフロー側が対象を監視、Webhook=外部システム側が通知","フォーム送信は人間の新規の送信行為がきっかけ。既存レコードの状態変更(担当者が手動でステージを変えた場合も)はイベントトリガーに分類","実務では技術的な種別の区別よりも「業務上、何をきっかけに動くべきか」を先に決めてから合うトリガーを選ぶ","トリガー選定例: Salesforceに案件情報が蓄積済みならイベントトリガーが最適(スケジュール型は最大24時間のタイムラグ、フォーム型は二重入力の手間が発生)。既存業務フローに自然に組み込まれ現場に追加操作を求めない"],"related":["trigger-types","wf-actions","automation-levels"],"quiz":{"q":"次の3つのワークフローに最も適切なトリガー種別の組み合わせはどれか。(1)毎週金曜17時に週間レポートを生成/(2)営業担当者が急ぎの依頼フォームを送信/(3)顧客管理システムへの新規顧客登録を検知してウェルカムメールを下書き","c":["(1)スケジュール、(2)フォーム送信、(3)Webhook","(1)イベント、(2)フォーム送信、(3)イベント","(1)スケジュール、(2)フォーム送信、(3)イベント","(1)スケジュール、(2)イベント、(3)フォーム送信"],"a":2,"exp":"(1)は固定時刻のスケジュール実行、(2)は人間の意図的な送信行為によるフォーム送信、(3)はシステム内の状態変化をワークフロー側が検知するイベントトリガー。"}},{"id":"wf-actions","term":"ワークフローのアクション3分類","yomi":"わーくふろーのあくしょん","aliases":["APIコール","データ抽出","コンテンツ生成","データ処理","実行・連携","ファイル操作"],"ch":4,"sec":"20","secTitle":"ワークフロー設計 トリガーとアクション","def":"アクションはトリガーで起動した後に実行される処理。3つの大分類: 【データ処理】(インプットを担う)=APIコール・データ取得(CRMから顧客情報取得等)、データ抽出・構造化(メール本文から注文番号を抽出等、非構造化データから情報を取り出す。LLMとの組み合わせで自然言語文書からも抽出可)、データ変換・整形(日付フォーマット統一、CSV→JSON等)。【生成・判断】(LLMが中心)=コンテンツ生成、分類・振り分け、判断・条件分岐。【実行・連携】(アウトプットを担う)=APIコール・データ送信(Slack通知・CRM登録等)、ファイル操作(PDF生成・フォルダ振り分け)、Human-in-the-Loop(人間への引き渡し)。","points":["APIコールとデータ抽出の区別: 外部サービスの窓口を介して取得する行為=APIコール、手元にあるデータから情報を取り出す行為=データ抽出","1つのトリガーに複数のアクションを連鎖させることで、人間が介在しなければできなかった一連の業務が自動化できる","As-Is分析とHTAで分解した業務フローがそのままワークフローの設計図になる","実務では1つの業務課題に複数のワークフロー(メインフロー+週次レポート+受信時分析など)を組み合わせて設計する"],"related":["wf-triggers","hta","conditional-branching","hitl"],"quiz":{"q":"「Salesforceから顧客の業界情報と案件規模を取得する処理」と「取得したデータから提案書に記載すべき課題ポイントを抽出する処理」のアクション種別の組み合わせはどれか。","c":["前者=データ抽出、後者=コンテンツ生成","前者=APIコール、後者=データ抽出","前者=APIコール、後者=APIコール","前者=データ抽出、後者=APIコール"],"a":1,"exp":"外部サービス(Salesforce)の窓口を介して情報を取り込むのがAPIコール、取得済みの手元データから必要な情報を取り出すのがデータ抽出。"}},{"id":"lv-tools","term":"レベル別ツールと自律型の実態(Manus)※コラム","yomi":"れべるべつつーる","aliases":["GPTs","Gem","Copilot Studio","Dify","Zapier","Make","iPaaS","Manus","エコシステム型","コネクタ型","開発型"],"ch":4,"sec":"20","secTitle":"ワークフロー設計 トリガーとアクション","def":"(試験範囲外コラム由来)Lv2ツールの選定基準は自社プラットフォーム環境との親和性: GPTs(OpenAI)、Gem(Google/Workspace親和)、Copilotエージェント(Microsoft/SharePoint・Teams統合)、Claudeプロジェクト(特定エコシステムに縛られない)。Lv3ツールは3種類: エコシステム型(Copilot Studio、Agent Designer)、コネクタ型=iPaaS(Zapier、Make。数千の接続先、完全ノーコード)、開発型(Dify。高い自由度、自社サーバー運用可、RAG組み込みやカスタムロジック)。","points":["どのツールでも出力品質を左右する中心はシステムプロンプトとナレッジ(コンテキスト)の設計。ツールを変えても設計が悪ければ品質は得られない","併用も一般的(処理本体はDify、トリガー検知と通知はZapier等)。判断基準は「既存コネクタでは実現できないカスタム処理があるか」","Lv4の実例Manusの設計思想: ①目標からToDoリストを自ら作成し常に書き直して計画をコンテキストの最新部分に保つ、②エラーからの回復(失敗の痕跡をコンテキストに残し同じ間違いを繰り返さない。Lv3ではエラー=停止、Lv4では学習材料)、③「ファインチューニングではなくコンテキストエンジニアリングに賭けた」(モデル再学習は数週間、コンテキスト改善は数時間)"],"related":["automation-levels","context-engineering"],"quiz":{"q":"Lv4自律型エージェント「Manus」の開発チームが「真のエージェント的行動の最も明確な指標」として挙げたものはどれか。","c":["応答速度の速さ","エラーからの回復(失敗の痕跡を残して同じ間違いを繰り返さないこと)","パラメータ数の多さ","完全に人間の介入を排除すること"],"a":1,"exp":"Lv3ワークフローではエラーは停止を意味するが、Lv4では失敗の痕跡をコンテキストに残して参照し、学習して次の手を考える材料になる。この違いがLv3とLv4の本質的な差。"}},{"id":"wf-variables","term":"変数","yomi":"へんすう","aliases":["名前付きの箱","判断材料"],"ch":4,"sec":"21","secTitle":"ワークフロー設計 変数と条件分岐","def":"ワークフロー内でデータを一時的に保持する「名前付きの箱」であり、条件分岐の判断材料を入れる器。トリガーで受け取った顧客名を「customer_name」に格納すれば後続アクションで「{customer_name}様」として呼び出せる。「industry」変数の値に応じてテンプレートを切り替えるなど、変数の値に応じて処理を柔軟に変えられるのが条件分岐の本質。","points":["変数に入るデータの出所: ①トリガーで受け取った情報(フォーム入力値・メール送信者)、②外部システムから取得した情報(CRMの顧客属性・在庫数)、③前のアクションの出力結果(AIが分類したカテゴリ・計算された合計金額)"],"related":["conditional-branching","wf-actions"],"quiz":{"q":"ワークフローにおける変数の説明として最も適切なものはどれか。","c":["LLMのモデルパラメータのこと","ワークフロー内でデータを一時的に保持する名前付きの箱で、条件分岐の判断材料になる","ワークフローの実行速度を制御する設定値","エラー発生時にのみ生成される記録"],"a":1,"exp":"変数はデータを保持する名前付きの箱。トリガー・外部システム・前のアクションの出力から値が入り、その値に応じて処理を柔軟に変えるのが条件分岐の本質。"}},{"id":"conditional-branching","term":"条件分岐の3種類(If/Else・ルーティング・フィルタリング)","yomi":"じょうけんぶんきのさんしゅるい","aliases":["If/Else","ルーティング","フィルタリング","分岐の粒度"],"ch":4,"sec":"21","secTitle":"ワークフロー設計 変数と条件分岐","def":"状況に応じて処理を変える設計。①If/Else=二者択一の分岐(案件規模1,000万円以上なら詳細版・未満なら簡易版)。②ルーティング=3方向以上への振り分け(業界が製造業/金融/小売/それ以外でテンプレートを切り替え。多方向を一箇所で管理でき見通しが良い)。③フィルタリング=条件を満たすデータだけを後続処理に通し、それ以外を除外する通過/遮断の選別(受注に至った提案書のみ参照対象に残す)。","points":["判別の決め手: 二択=If/Else、3方向以上=ルーティング、通過/遮断=フィルタリング","分岐の粒度が最重要の設計判断: すべてを細かく分岐させるとメンテナンスが大変になり、一切分岐しないと業界の異なる顧客に同じ提案書が届く。成否に最も影響する変数(例: 業界と案件規模の2つ)に絞って設計するのが品質と保守性のバランス","処理すべきでないデータを早い段階で除外することで後続処理に不要な負荷をかけない"],"related":["wf-variables","error-handling","wf-actions"],"quiz":{"q":"次の3つの処理に最も適切な条件分岐の種類を当てはめたものはどれか。X:業界情報に基づき製造業/金融/小売/汎用の4テンプレートに振り分け/Y:案件規模1,000万円以上なら詳細版・未満なら簡易版/Z:検索結果から受注した提案書のみを通過させ失注分を除外","c":["X=If/Else, Y=ルーティング, Z=フィルタリング","X=ルーティング, Y=If/Else, Z=フィルタリング","X=ルーティング, Y=フィルタリング, Z=If/Else","X=フィルタリング, Y=If/Else, Z=ルーティング"],"a":1,"exp":"Xは4方向への振り分け=ルーティング、Yは二択=If/Else、Zは通過/遮断の選別=フィルタリング。"}},{"id":"error-handling","term":"エラーハンドリングとフォールバック","yomi":"えらーはんどりんぐ","aliases":["フォールバック","異常系","想定外の設計"],"ch":4,"sec":"21","secTitle":"ワークフロー設計 変数と条件分岐","def":"外部APIが応答しない、想定外の値が入力される、AIの出力形式が異なる — こうした想定外への備え。「正常に処理できたか?」の二択で分岐させるIf/Elseの応用であり、正常系はそのまま次へ、異常系では別の処理(フォールバック)を実行する。例: APIコール失敗時にワークフロー全体を停止するのではなく、担当者にSlack通知し手動対応(手動入力フォームのリンク提供等)を依頼する設計にすれば、エラーが起きても業務が完全には止まらない。","points":["「異常時に人間が介入できる経路を残す」ことがHuman-in-the-Loop設計と直結し、AIを組織で安全に運用する条件。完全自動化を目指しながらも異常時のパスを明示的に設計する発想はガバナンスの観点からも欠かせない","ナレッジ検索で該当がない場合は汎用テンプレート+「類似提案書が見つからなかった」注記付きで通知、のように代替手段を提供する","接続の問題にLLM切り替えで対処するような、原因と無関係な対策は解決にならない"],"related":["conditional-branching","hitl","harness-engineering"],"quiz":{"q":"提案書生成ワークフローでSalesforce APIコールが失敗した場合の処理として最も効果的なものはどれか。","c":["ワークフロー全体を停止し次回のトリガーまで待機する","エラーを無視して顧客情報なしでドラフト生成を続行する","営業担当者にSlackで通知し、手動入力フォームのリンクを提供するフォールバック処理を実行する","自動的にLLMを切り替えて再試行する"],"a":2,"exp":"エラーハンドリングは正常系/異常系のIf/Else分岐。全体停止は放置を生み、情報なしの続行は品質が崩壊し、LLM切り替えは接続の問題を解決しない。人に戻すパスの用意が実運用の基本。"}},{"id":"context-engineering","term":"コンテキストエンジニアリング","yomi":"こんてきすとえんじにありんぐがいろん","aliases":["Context Engineering","プロンプトエンジニアリングとの違い","Karpathy","OSとRAM"],"ch":4,"sec":"22","secTitle":"コンテキストエンジニアリング概論","def":"LLMに渡す文脈情報を体系的に設計・管理する技術。「何を、どのフォーマットで、どのタイミングで、どの順序で渡すか」の設計がLLMの能力を引き出す鍵。プロンプトエンジニアリングが指示そのものの工夫(指示の出し方)に焦点を当てるのに対し、コンテキストエンジニアリングは指示に加えて文書・参考情報・ツール・会話履歴など回答の前提となる情報全体を設計する上位概念であり、プロンプトエンジニアリングはその一部として位置づけられる。","points":["元OpenAI研究者Andrej KarpathyがLLMを新しい種類のOSに例え、コンテキストウィンドウをCPUに対するRAM(作業メモリ)と位置づけた比喩で概念が広まった。「何をメモリに載せるか」に設計の本質がある。Shopify CEOのTobias Lütkeの発信も重なり認知が一気に拡大","核心は「AIエージェントが見えないものは、存在しないのと同じ」という原則","出力品質の問題はほぼすべて「LLMに渡している情報の問題」に帰着する。切り分けの順序: ①必要な情報が含まれているか(欠落)→②不要な情報が混じっていないか(ノイズ)→③フォーマットや指示の粒度は適切か(伝え方)→それでも残る場合に初めてモデル変更を検討。「モデルの前にコンテキストを疑う」","「安いデモ」と「魔法のようなエージェント」の差はコードの複雑さではなくコンテキストの質(カレンダー取得・メール履歴からの関係把握・背景整理を組み合わせた具体的で実用的な応答)"],"related":["context-seven-info","context-four-methods","llm-four-limits","harness-engineering","lv-tools"],"quiz":{"q":"コンテキストエンジニアリングとプロンプトエンジニアリングの関係として最も適切なものはどれか。","c":["まったく別の技術であり互いに関係しない","プロンプトエンジニアリングは指示の最適化に焦点を当て、コンテキストエンジニアリングは指示を含むLLMに渡す情報全体を設計する上位概念である","コンテキストエンジニアリングはプロンプトエンジニアリングの一部である","プロンプトエンジニアリングの方が高度な技術である"],"a":1,"exp":"プロンプトエンジニアリングは指示の書き方の工夫であり、コンテキストエンジニアリング(RAG・記憶・ツール情報などLLMに渡す情報全体の設計)の一部として位置づけられる。"}},{"id":"llm-four-limits","term":"コンテキストが解決する4つの課題","yomi":"よっつのかだい","aliases":["Lost in the Middle","コンテキスト汚染","コンテキスト混乱","情報量の限界"],"ch":4,"sec":"22","secTitle":"コンテキストエンジニアリング概論","def":"LLMが抱える、モデルを高性能化するだけでは解消しない4つの本質的限界。①入力可能な情報量の限界(コンテキストウィンドウの上限。長時間実行でツール結果・検索データ・対話履歴が蓄積し容易に達する)。②認識の限界=Lost in the Middle(スタンフォード大学の研究: LLMは先頭と末尾の情報を参照しやすく中間部分を見落としやすい。重要情報の配置位置が品質を左右)。③コンテキスト汚染(ハルシネーションがコンテキストに混入し、エージェントが自身の出力を次の入力に使うため誤情報が連鎖的に拡散)。④コンテキスト混乱(無関係・矛盾する情報の混在で推論が阻害される。古い企業情報と最新情報の混在等)。","points":["より大きなコンテキストウィンドウのモデルが出ても、扱う情報量の増加に比例して問題は残り続ける","情報の関連性・時系列・矛盾を管理する設計が必要"],"related":["context-engineering","context-four-methods","hallucination","context-window"],"quiz":{"q":"LLMがコンテキストの先頭と末尾の情報を参照しやすく、中間部分に置かれた情報を見落としやすい傾向を指す用語はどれか。","c":["コンテキスト汚染","Lost in the Middle","コンテキスト混乱","ハルシネーション"],"a":1,"exp":"Lost in the Middleは情報の配置位置による認識の偏り。汚染はハルシネーションの混入・連鎖、混乱は無関係・矛盾情報による推論阻害。"}},{"id":"context-seven-info","term":"LLMに渡す情報の7種類","yomi":"じょうほうのななしゅるい","aliases":["システムプロンプト","ユーザープロンプト","短期メモリ","長期メモリ","ツールの情報","構造化出力","手続き記憶","エピソード記憶","意味記憶"],"ch":4,"sec":"22","secTitle":"コンテキストエンジニアリング概論","def":"①システムプロンプト(全対話共通の役割・前提条件・制約条件・行動指針。「ぶれない軸」であり最初に最も時間をかけて設計すべき土台)。②ユーザープロンプト(都度の指示と入力。自由記述より「業界・課題・予算を明記」のような入力形式の誘導設計で品質が大幅向上)。③短期メモリ(セッション内の対話履歴・状態情報。不要になった古い情報は除去、重要な決定は保持)。④長期メモリ(セッションをまたぐ持続的情報。手続き記憶=特定状況での対応方法/エピソード記憶=過去の出来事/意味記憶=事実情報の3種類)。⑤外部知識RAG(事前学習にない社内固有情報を実行時に追加。関連度・鮮度・情報量のバランスを考慮)。⑥ツールの情報(利用可能なツールの定義と使い方。説明が曖昧だと適切なツールを選べない。類似ツールが多数ある場合はRAGで適したツールのみ提示する設計も有効)。⑦構造化出力(JSON・表形式など応答形式の指定。出力が別システムに渡るため形式のぶれは解析エラーの原因)。","points":["「前回の商談で顧客が示した予算上限」=会話の記憶(過去のやり取りの蓄積)、「社内マニュアルの最新料金表」=外部知識RAG(ナレッジベースからの検索)という区別で判別する","トーンの問題はシステムプロンプトの具体化で解決(「信頼感のあるビジネス文書」→「です・ます調、主語を明示、根拠を数値で示す」)"],"related":["context-engineering","rag-two-phases","context-four-methods"],"quiz":{"q":"提案書AIが「前回の商談で顧客が示した予算上限」を踏まえて見積額を調整した場合と、「社内マニュアルの最新料金表」を参照して見積を作成した場合、参照した情報の種類の組み合わせはどれか。","c":["前者=外部知識(RAG)、後者=会話の記憶","前者=会話の記憶、後者=外部知識(RAG)","前者=システムプロンプト、後者=外部知識(RAG)","前者=ユーザープロンプト、後者=システムプロンプト"],"a":1,"exp":"過去の対話で得られた情報は会話の記憶、ナレッジベースから検索して取得した情報は外部知識(RAG)。「過去のやり取りの蓄積」か「外部からの検索」かで判別する。"}},{"id":"context-four-methods","term":"コンテキストの4手法と4つの設計原則","yomi":"よんしゅほうとよんげんそく","aliases":["書き出し","選択","圧縮","分割","Write","Select","Compress","Isolate","必要十分の原則","鮮度の原則"],"ch":4,"sec":"22","secTitle":"コンテキストエンジニアリング概論","def":"コンテキストウィンドウを効率的に使う4手法(組み合わせて効果を発揮): ①書き出しWrite(重要な情報を外部ストレージに保存して容量を確保。ManusのToDoリスト書き直しが実践例。Lost in the Middle対策にも有効)、②選択Select(現在のタスクに必要な情報だけを取得。メモリの読み込み・ツールの選択・RAG検索。関連性の低い情報を渡すことは渡さないことより悪い場合がある)、③圧縮Compress(要約・削減で密度を高める。ただし欠落リスクを伴うため可能な限り避け、タスク分割や選択の最適化を先に検討)、④分割Isolate(複雑な問題を小さな部分問題に分割。マルチエージェント構成または段階的処理。ただし単純な方法から検討し、指示の明確化→セッション内の段階処理→それでも難しければ分散処理の順)。","points":["「情報は多いほど良い」は誤解。過剰な情報は①応答速度の低下、②トークン消費増でコスト高、③重要情報がノイズに埋もれる、の3つの問題を生む。「何を渡すか」と同じくらい「何を渡さないか」の設計が重要(RAGチャンクは関連性の高い上位2〜3件に絞る等)","4つの設計原則: ①必要十分(「関係するかもしれない」ではなく「これがなければ正しい出力ができないか」を問う)、②構造化(重要な制約はシステムプロンプトの冒頭に。参照情報と指示を明確に区別。人間に読みやすい文書とAIが処理しやすい構造は異なる)、③鮮度(LLMはコンテキスト後半=最新部分を強く参照する傾向。重要な指示や直近の状況ほど後半に配置)、④反復検証(一度で完成しない。情報を1つ追加・削除して出力の変化を小さく試す)"],"related":["context-engineering","llm-four-limits","context-seven-info"],"quiz":{"q":"コンテキストエンジニアリングの4手法のうち、「可能な限り避けるべきであり、必要になる前にタスク分割や情報選択の最適化を先に検討すべき」とされるものはどれか。","c":["書き出し(Write)","選択(Select)","圧縮(Compress)","分割(Isolate)"],"a":2,"exp":"圧縮は要約・削減により必要な情報の欠落リスクを伴うため、可能な限り避ける手法。先にタスクの分割や選択の最適化を検討する。"}},{"id":"ai-as-colleague","term":"AIの位置づけの変化(道具から同僚へ)","yomi":"えーあいのいちづけのへんか","aliases":["道具から同僚へ","役割と権限の再定義"],"ch":5,"sec":"23","secTitle":"AIエージェント導入と組織文化の変革","def":"従来のITツール(Excel、ERP、RPA)は「道具」であり、人間が操作した通りに動作し責任はすべて操作者にある。AIエージェントは文脈を解釈し自ら判断を行い、状況に応じて異なる行動を選択する「同僚」に近い存在。新入社員に仕事を任せるように「どこまで任せるか」を決める必要がある。「言われたことを正確にこなす道具」から「自分で考えて動く存在」への変化。","points":["従来のIT導入は操作方法の習得で済んだが、AIエージェント導入は役割と権限の再定義を要求する","「この判断はAIに任せてよいか」「間違っていたら誰が責任を取るか」は技術ではなく組織文化と権限構造の問題","AI導入とは業務のやり方だけでなく「誰が何を決めるか」という構造そのものの再設計"],"related":["delegation-design","tool-vs-agent","hitl"],"quiz":{"q":"従来のITツールとAIエージェントの本質的な違いとして最も適切なものはどれか。","c":["AIエージェントの方が処理速度が速い","従来ツールは操作した通りに動く道具だが、AIエージェントは文脈を解釈し自ら判断する存在であり、役割と権限の再定義が必要になる","AIエージェントは操作方法の習得が不要である","従来ツールには責任の問題が存在しない"],"a":1,"exp":"道具は判断せず責任は操作者にあるが、AIエージェントは同僚に近い存在で「どこまで任せるか」の設計が必要。導入は操作習得ではなく権限構造の再設計を要求する。"}},{"id":"delegation-design","term":"デリゲーション(権限委譲)の設計","yomi":"でりげーしょんのせっけい","aliases":["権限委譲","リスクレベル3段階","デリゲーション4ステップ"],"ch":5,"sec":"23","secTitle":"AIエージェント導入と組織文化の変革","def":"本来上位者が持つ権限を下位者に委ねること。AIエージェントへのデリゲーションでは「判断権限の範囲」と「実行権限の範囲」を明確に定義する。設計は4ステップ: ①業務の棚卸し→②リスク評価(誤判断時の影響度)→③低リスク業務から順にデリゲーション範囲を決定→④モニタリングとエスカレーションのルール策定。リスク3段階との対応: 低リスク=判断と実行の両方を委譲/中リスク=HITL(AIが判断、実行前に人間が承認)/高リスク=AIは情報提供にとどめ判断は人間。","points":["「任せる/任せない」の二択ではなく業務ごとにきめ細かく設計する。請求書処理でも受領=低、OCR=低〜中(信頼度スコアで自動/確認を切り分け)、仕訳=中(HITL)、支払=高(AIはアドバイザー)とステップ単位で異なる","リスクレベルは業務の文脈に依存する: 同じ「メール送信」でも社内連絡は低リスク、顧客への契約条件変更通知は高リスク。文脈依存性を見落とすと設計が形骸化","実績に応じた段階的引き上げも設計できる(同一取引先・同一内容を10回以上処理し仕訳パターンが確立したら自動仕訳を許容など)"],"related":["ai-as-colleague","hitl","autonomy-levels","irreversibility"],"quiz":{"q":"請求書処理AI(受領→OCR→仕訳→支払)のデリゲーション設計として最も適切なものはどれか。","c":["全ステップを完全委譲し月次でまとめてチェックする","全ステップで人間が逐一確認してから実行する","OCRは信頼度スコアで自動/確認を切り分け、仕訳はHITL、支払は人間承認必須とする","最もリスクの高い支払処理から委譲を始める"],"a":2,"exp":"原則は業務のリスクレベルに応じた段階的設計。完全委譲は高リスク業務まで含み不適合、全件確認は工数削減効果が限定的、高リスクから始めるのは「低リスクから段階的に」の原則に反する。"}},{"id":"culture-diagnosis","term":"組織文化診断の3つの問い","yomi":"そしきぶんかしんだん","aliases":["ミスへの許容度","組織の受容性","意思決定の構造"],"ch":5,"sec":"23","secTitle":"AIエージェント導入と組織文化の変革","def":"AI導入前に組織文化を診断する3つの観点。①ミスへの許容度(一切のミスを許容しないのか、一定範囲なら修正・再確認で対応可能と考えるのか)、②新しいツールや仕組みへの受け止め方(過去のITプロジェクトで何が起きたか — ERP導入の長期化、RPAのスムーズな現場主導、システム刷新の混乱の記憶など)、③意思決定のスピードと構造(合議制か、リーダー判断で素早く動けるか)。","points":["ミスに極めて厳しい文化では「AIのミス率が現状の人間のミス率を下回っている」ことを示すデータが導入判断を前に進める材料になる","過去の成功体験がある組織は変革に前向き、失敗の記憶がある組織には同じ轍を踏まないことを丁寧に説明する","合議制の組織では「まず小さな検証を行いデータで判断する」というMVPアプローチの事前合意が有効。リーダー主導の組織では経営層スポンサーの早期確保が最優先","正確性重視の文化は両面: 出力を厳密に検証する姿勢は品質管理の資産になる一方、「100%の精度でなければ使えない」という期待が障壁になり得る→低リスク業務から導入し精度を数値で可視化して段階的に解消"],"related":["delegation-design","change-mgmt-stages","mvp-approach"],"quiz":{"q":"AI導入前の組織文化診断で確認すべき3つの観点に含まれないものはどれか。","c":["ミスへの許容度","新しいツールや仕組みに対する組織の受け止め方(過去のITプロジェクトの経緯)","意思決定のスピードと構造(合議制かリーダー判断か)","従業員の平均年齢"],"a":3,"exp":"3つの観点はミスへの許容度・新しい仕組みへの受け止め方・意思決定の構造。年齢は診断観点に含まれない。この診断により導入時の障壁を事前に把握し対策を設計できる。"}},{"id":"org-types","term":"推進体制の3類型(中央集権/分散/ハイブリッド)","yomi":"すいしんたいせいのさんるいけい","aliases":["中央集権型","分散型","ハイブリッド型","逆転関係"],"ch":5,"sec":"24","secTitle":"AIエージェント推進の組織類型","def":"①中央集権型=CoEなどの専門組織がすべてのAIプロジェクトを主導。強み=統制が効く(ツール・プロセス・セキュリティ基準の全社統一、野良エージェント防止、ナレッジ集約)。弱み=遅さ(CoEのキャパシティがボトルネック、現場の当事者意識が薄れる)。金融・医療などコンプライアンス要件が厳しい業界や大企業向き。②分散型=各部署が独自に推進。強み=速さ(現場ニーズに最も近い人が意思決定、当事者意識の高さ)。弱み=統制が効かない(基準の乱立、セキュリティリスク増大、車輪の再発明、野良エージェント発生)。スタートアップ向き。③ハイブリッド型=中央がルール・ガイドライン・共通基盤を整備し、各部署がその枠組みの中で導入を進める。","points":["中央集権型と分散型はメリット・デメリットが表裏一体の逆転関係。一方の強みはそのまま他方の弱み — 試験で繰り返し問われる","ハイブリッド型の設計論点は中央の枠組みをどの程度厳格にするか。強すぎれば中央集権型に、緩すぎれば分散型に近づく。「何を中央が決め、何を現場が決めるか」の線引きが肝(セキュリティ基準・ツール認定=中央、業務プロセス設計・デリゲーション範囲=現場)","段階的展開にも適する: 1部署で小規模導入→知見をルール化→他部署へ展開","前回のCoEが失敗した組織では、類型ではなく設計の問題(権限集中)と診断し、中央の役割を「承認」から「標準策定とセキュリティ監査」に限定する再設計が有効。信頼醸成と統制確立は並行して行うべきで順序をつける問題ではない"],"related":["coe","culture-diagnosis","blackbox-risk"],"quiz":{"q":"中央集権型と分散型の関係についての記述として最も適切なものはどれか。","c":["両者のメリットは共通している","中央集権型の強み(統制・ナレッジ集約・野良エージェント防止)はそのまま分散型の弱みであり、分散型の強み(即応性・当事者意識)はそのまま中央集権型の弱みという逆転関係にある","分散型は大企業や金融機関に最も適している","中央集権型は現場の当事者意識を高める効果がある"],"a":1,"exp":"2類型はメリット・デメリットが表裏一体の逆転関係。一方のメリットを見たら「もう一方のデメリットでもある」と対応づけられることが重要。"}},{"id":"coe","term":"CoE(Center of Excellence)","yomi":"しーおーいー","aliases":["推進組織","AI推進室","現場AIリーダー"],"ch":5,"sec":"24","secTitle":"AIエージェント推進の組織類型","def":"AIエージェント推進の専門組織。中央集権型ではすべてのAIプロジェクトを主導し、ハイブリッド型ではガバナンスの枠組み策定と技術支援を担う。役割は3つ: ①ガバナンス機能(全社共通のAI利用ポリシー・セキュリティ基準・データ取扱いルールの策定・管理)、②技術支援機能(各部門への技術的助言、ツール選定や設計レビューの支援)、③ナレッジ共有機能(成功・失敗事例を全社の知見として蓄積し同じ失敗を防ぐ)。","points":["形骸化リスク: CoEが存在しても人員が少なく実質各部署が独自推進なら実態は分散型。ガバナンスの実効性にはルール遵守の定期監査プロセスが欠かせない。逆にすべてにCoEの事前承認を義務づければ実態は中央集権型。判別の決め手は「部署の自律的な裁量が実質的に確保されているか」","ハイブリッド型でCoEに許される統制: セキュリティ基準の遵守要求○、高リスク案件に限定した条件付き事前承認○、リスト外ツールの事前申請義務(禁止ではなく申請すれば使える)○。不適切なのは現場の知見共有をCoEの承認制にすること — 情報流通の中央集権化であり組織学習を阻害する","推進体制の3段階進化の例: 第1段階=AI推進室が方針策定とユースケース探索→第2段階=事業責任者を巻き込み「事業部門の取り組み」に→第3段階=各チームに現場AIリーダーを立てる。ポイントは推進室の役割が「自分で作る」から「現場が作れるよう支援する」へ移行すること。推進の主語が現場に移ったときAIは組織に根づく"],"related":["org-types","blackbox-risk","seven-habits"],"quiz":{"q":"ハイブリッド型を採用した企業のCoEの運用として最も不適切なものはどれか。","c":["全社共通のAIセキュリティ基準を策定し各部門に遵守を求める","リスク評価スコアが一定基準を超えた案件のみ事前承認を行う","認定ツールリストを作成しリスト外ツールは事前申請制とする","現場が得た業務改善の知見を「全社展開に値するか」CoEが評価・選別し、承認した事例のみ共有可能とする"],"a":3,"exp":"知見共有の承認制は現場の自律的な学習と横展開をCoEの裁量下に置く情報流通の中央集権化であり、ハイブリッド型の根幹を破壊する。枠組みの策定・限定的な承認・申請制はハイブリッド型の正当な統制の範囲内。"}},{"id":"outcome-output","term":"アウトカム指標とアウトプット指標","yomi":"あうとかむしひょう","aliases":["アウトカム","アウトプット","DAU","MAU","形骸化"],"ch":5,"sec":"25","secTitle":"人材評価と指標の再設計","def":"アウトカム指標=AIエージェントがもたらした「価値」を測る指標(創出された時間、解決された課題数=問い合わせ対応・ミス件数・差し戻しなど実際に減った問題の量、従業員満足度)。アウトプット指標=DAU/MAU(日次/月次アクティブユーザー数)や処理件数といった活動量。活動量だけを追うと、成果に結びつかない使い方が横行し使うこと自体が目的化する「形骸化」が生まれる。","points":["AI導入の本当の目的は「使われること」ではなく「価値を生み出すこと」。中心に据えるべきはアウトカム指標","DAU/MAUは「利用されていなければ成果は生まれにくい」という前提を確認する補助指標として有効。主軸はあくまで価値を示す指標","例:「AIが1日200件処理」はアウトプット。仕訳精度が低く手戻りが増えている可能性を見落とす。「処理件数が増えた結果、支払遅延率が60%低減した」がアウトカム"],"related":["kgi-kpi-okr","kpi-longtail","three-layer-framework"],"quiz":{"q":"「AIエージェントによる1日の処理件数が200件に達した」という報告について正しい評価はどれか。","c":["アウトカム指標であり、成功を判断できる","アウトプット指標であり、成功を判断できる","アウトプット指標であり、この指標だけでは成功を判断できない","アウトカム指標であり、この指標だけでは成功を判断できない"],"a":2,"exp":"処理件数は活動量を測るアウトプット指標。件数が多くてもミス率が高ければ手戻りが増え業務が悪化している可能性がある。成功判断には支払遅延率の低減などのアウトカム指標が必要。"}},{"id":"kgi-kpi-okr","term":"KGI・KPI・OKRと設計4ステップ","yomi":"けーじーあいけーぴーあいおーけーあーる","aliases":["KGI","KPI","OKR","重要目標達成指標","アクションルール"],"ch":5,"sec":"25","secTitle":"人材評価と指標の再設計","def":"KGI(重要目標達成指標)=最終ゴールの達成度(「顧客対応コストを年間30%削減」)。KPI(重要業績評価指標)=KGI達成に向けた中間指標・マイルストーン(「正答率90%以上」)。OKR=定性的な目標(Objective)と定量的な成果指標(Key Results)のセット。KGI/KPIは既存業務の改善度合いの測定に、OKRは探索的・挑戦的な目標に適する。初期フェーズ(Discovery〜PoC)ではOKR、本格導入フェーズ(Deployment以降)ではKGI/KPIを用いる進め方が有効。","points":["KPI設計の4ステップ: ①KGIの合意(数値と期限を含め経営層と。曖昧だと後から「期待と違う」衝突)→②KPI選定(3〜5個。アウトカム指標を最低2個含める)→③計測設計(目標値・計測方法・頻度・責任者。「仕訳ミス率=差し戻し件数÷AI処理件数×100、経理リーダーが毎週月曜集計、ソースは差し戻しログ」まで決めて運用可能になる)→④アクションルールの事前設計(「ミス率2%を2週連続で超えたらナレッジベースとプロンプトを見直す」)","KPIは「測って終わり」ではなく「計測→判断→行動」のサイクル","KGIかKPIかは「誰にとっての指標か」で変わる: 全社では「正答率95%」はKPIだが、QA部門にとってはKGIになりえる。固定的なラベルではない"],"related":["outcome-output","kpi-longtail","three-layer-framework","baseline"],"quiz":{"q":"請求書処理AIプロジェクトでKGIとして最も適切なものはどれか。","c":["AIの1日あたりの請求書処理件数","月次決算の締め日を翌月10日から翌月5日に短縮","AI仕訳の正答率95%以上","経理部門のDAU"],"a":1,"exp":"KGIはプロジェクトの最終ゴール。月次決算の早期化が最終成果目標。正答率は中間指標(KPI)、処理件数とDAUはアウトプット指標。"}},{"id":"kpi-longtail","term":"KPIの限界とロングテール課題","yomi":"ろんぐてーるかだい","aliases":["ロングテール","名もなき非効率","パソコン導入の例え"],"ch":5,"sec":"25","secTitle":"人材評価と指標の再設計","def":"ロングテール課題とは、個別には小さくKPIとして設定するほどでもないが、組織全体に無数に存在する「名もなき非効率」(毎回手作業で面倒だが改善申請するほどでもない作業、誰がやるか曖昧な確認、整形に1時間かかるデータ等)。従来の業務改善では「コストをかけるほどではない」と後回しにされてきたが、AIエージェントは個別の設定コストが低く複数課題に並行対応できるため、ロングテールを一気に解消できる可能性を持つ。","points":["AIの価値は可視化された「大きな課題の解決」だけでなく、計測されていなかった無数の小さな改善の総和として現れる。従来のKPIには映らない","パソコン導入の例え: 「1台あたりの文書作成速度を何%改善するか」で価値を測った企業は少ないが、パソコンは組織全体の生産性と働き方を大きく変えた","「KPIに変化がない=AIが機能していない」とは限らない。KPIを設計すること、そしてKPIだけを信じないこと — この2つを同時に持つことが本質的な評価の眼差し"],"related":["outcome-output","kgi-kpi-okr"],"quiz":{"q":"AIエージェントが解く「ロングテール課題」の説明として最も適切なものはどれか。","c":["経営会議で議題になる大規模な課題のこと","個別には小さくKPI化するほどでもないが組織に無数に存在する非効率のことで、AIは低い設定コストで並行して解消できる","処理に長時間かかる課題のこと","KPIで完全に計測可能な課題のこと"],"a":1,"exp":"ロングテール課題は「名もなき非効率」の集合。従来は後回しにされてきたが、AIの価値はその無数の小さな改善の総和として現れ、KPIには映りにくい。"}},{"id":"jd-redesign","term":"職務定義書(JD)の再設計とソフトスキル","yomi":"じぇいでぃーのさいせっけい","aliases":["JD","職務定義書","ハードスキル","ソフトスキル","問いを立てる力"],"ch":5,"sec":"25","secTitle":"人材評価と指標の再設計","def":"ハードスキル(ツール操作方法、手順知識、資格など文書化・定量化しやすいスキル)はAIが最も得意とする領域であり、JDに列挙し続けることは「AIが得意なことを人間に求める」矛盾に陥る。AIが苦手なのはソフトスキル、なかでも「問いを立てる力」。JDの再設計とは「何ができるか」から「どう考え、何を問えるか」へ評価軸を移す作業。","points":["重要性が下がる: 特定ツールの操作手順、定型フォーマットの作成・処理、情報の検索・収集・整理、マニュアルに沿った業務遂行","重要性が残る・高まる: 問いの設定力(何を解くべきかを定義)、論理的思考力(前提・根拠・結論の整合性を批判的に検証。AIの出力は流暢だが常に正確とは限らない)、文脈読解力、関係構築力(合意形成・感情の調整・文化の醸成)、倫理的判断力","引き続き価値を持つハードスキルもある: 財務・法務・医療など専門的判断や資格が求められる領域の知識、AIの出力の妥当性を判断する基盤となるデータサイエンス・統計","組織の支援設計も不可欠: 移行期間の確保(生産性低下を許容する方針の事前合意)、評価制度の連動(JDを変えても評価基準が旧来のままでは新能力の習得が後回しに)、キャリアパスの提示(変化の先に自分の居場所が見えなければ人は抵抗する)"],"related":["reskilling","ai-as-colleague","change-mgmt-stages"],"quiz":{"q":"AI時代のJD再設計で「重要性が高まるスキル」に該当しないものはどれか。","c":["問いの設定力(何を解くべきかを定義する力)","論理的思考力(AIの出力を批判的に検証する力)","特定ツールの操作手順の習熟","倫理的判断力(AIの判断に最終的な是非を下す力)"],"a":2,"exp":"特定ツールの操作手順はAIや自動化の対象になりやすく、ツールの進化とともに価値が低下しやすいハードスキル。問いの設定・批判的検証・倫理判断はAIが苦手とする人間の領域。"}},{"id":"reskilling","term":"リスキリングとアップスキリング","yomi":"りすきりんぐとあっぷすきりんぐ","aliases":["Reskilling","Upskilling","職務の変化"],"ch":5,"sec":"25","secTitle":"人材評価と指標の再設計","def":"リスキリング=従来の職務が代替または変化した場合に、新しいスキルを習得して別の職務や役割へ移ること。アップスキリング=現在の職務を継続しながら必要なスキルを追加的に習得し業務遂行能力を高めること。判別の基本観点は「職務そのものが変わるかどうか」。","points":["経理担当者が「仕訳を実行する作業者」から「AIの出力を監督し例外処理を担う品質管理者」へ変わるのはリスキリング(職務の中心が変化)。Excelマクロに加えてAIツール操作を覚えて従来業務を効率化するだけならアップスキリング","「新しいツールを学んだ」だけではリスキリングの理由にならない。決め手は職務の名称が変わるレベルの変化か","どちらの場合も、操作方法だけでなく判断・例外対応・業務設計・他部門との調整といった変化しにくい本質的な能力への投資が重要"],"related":["jd-redesign","change-mgmt-stages"],"quiz":{"q":"経理担当者の職務が「仕訳の実行」から「AIが生成した仕訳のレビューと例外処理の対応」に変わった。この変化はどちらに該当するか。","c":["アップスキリング。経理業務を続けながらAI活用スキルを追加したため","リスキリング。職務の中心が「作業実行」から「AI監督・例外対応」へ変わったため","アップスキリング。経理部門に所属し続けているため","リスキリング。AIツールの操作方法を新しく学んだため"],"a":1,"exp":"判別の決め手は職務が変わるかどうか。同じ部門に所属していても職務内容が根本的に変わればリスキリング。ツールを学んだだけではリスキリングの理由にならない。"}},{"id":"change-mgmt-stages","term":"チェンジマネジメントと抵抗の3段階(否認→抵抗→受容)","yomi":"ちぇんじまねじめんと","aliases":["チェンジマネジメント","否認","抵抗","受容","クイックウィン"],"ch":5,"sec":"26","secTitle":"チェンジマネジメント","def":"チェンジマネジメントとは、組織変革を計画的に推進し、変革への抵抗を小さくしながら定着を促すアプローチ。AI導入は技術プロジェクトであると同時に組織変革プロジェクトであり、AIは人間の「仕事そのもの」に影響を与えるため「自分の仕事が奪われるのでは」という実存的な不安を引き起こす。抵抗の心理プロセスは3段階: ①否認(変革の必要性そのものを認めない。「うちの業務にAIは関係ない」「AIに仕訳なんて無理」)→②抵抗(必要性は理解しても感情的に受け入れられない。「仕事が奪われるのでは」「経験が無意味になるのでは」)→③受容(新しいやり方を試み始める。「意外と便利だ」)。","points":["否認への対応: 悪意ではなく自然な防衛反応と捉える。「使うべきだ」と求めても効果はなく、変革の必要性を数値や事例で具体的に示し認知(Awareness)を形成する。他社事例やデモで「技術的に可能」という事実を示す","抵抗への対応: 問題は知識不足ではなく感情面にあるため論理だけでは不十分。変化の先に自分の役割が残ることを具体的に示す(「経験は例外処理や品質管理に活きる」)。恐怖を動機に使う(「使えなければ仕事がなくなる」)のは中長期的に抵抗を強める失敗パターン。不安を口にできる場も確保する","受容への対応: クイックウィン(小さな成功体験)を積み重ねる(「定型請求書50件で仕訳精度98%だった」)","判別の決め手は「変革の必要性を認めているかどうか」: 「無理だ」=否認、「できるのは分かるが嫌だ」=抵抗"],"related":["resistance-curve","psych-safety","culture-diagnosis","jd-redesign"],"quiz":{"q":"ベテラン経理担当者が「AIに仕訳なんて無理だ。勘定科目の判断には長年の経験が必要だ」と発言した。抵抗の心理プロセスのどの段階か。","c":["否認","抵抗","受容","否認と抵抗の中間"],"a":0,"exp":"技術的可能性(変革の必要性)自体を認めていないので否認段階。抵抗段階なら「AIが仕訳できるのは分かるが自分の仕事がなくなるのは嫌だ」のように必要性を認めた上で感情的に拒否する。"}},{"id":"resistance-curve","term":"抵抗曲線と「谷」","yomi":"ていこうきょくせん","aliases":["谷","U字カーブ","一時的な生産性低下"],"ch":5,"sec":"26","secTitle":"チェンジマネジメント","def":"組織変革に対する心理的・行動的反応を時間経過に沿って示した考え方。縦軸に生産性やモチベーション、横軸に時間を取ると、変革導入直後に一時的な低下が生じ、その後徐々に回復し定着とともに向上するU字型の推移になる。この一時的な低下の局面を「谷」と呼ぶ。","points":["①谷は異常ではなく変革に伴う通常の反応。導入初期の低下だけを見て失敗と判断しない","②谷の時期だけを見て導入を中止することが最大の失敗。効果は一定の適応期間を経てはじめて表れる","③谷を浅く・短くする施策を事前に設計する: 導入前後の研修、相談できる支援体制、段階的導入、従来手作業との並行運用の許容、フィードバック反映の仕組み","谷の時期のKPIは「処理速度」ではなく「学習進捗」で評価するよう設計しておく","谷を避けることより、谷が生じる前提で影響を小さくし早く回復できるよう準備することが重要"],"related":["change-mgmt-stages","psych-safety"],"quiz":{"q":"AI導入直後に処理速度が一時的に低下し「前のやり方のほうが速かった」という声が出た。プロジェクトリーダーの最も適切な対応はどれか。","c":["導入を中止し従来の手作業に戻す","抵抗曲線の「谷」として正常な反応と理解し、事前に計画した支援施策を実行する","処理速度の低下を経営層に報告し継続判断を仰ぐ","「慣れれば速くなる」と説得し手作業との並行運用を禁止する"],"a":1,"exp":"導入直後の生産性低下は谷であり正常。谷の時期の中止がチェンジマネジメント最大の失敗。並行運用の禁止は心理的安全性を損ない抵抗を強化する。事前計画した研修・サポートの着実な実行で谷を浅く短くする。"}},{"id":"psych-safety","term":"心理的安全性とFail-Fast","yomi":"しんりてきあんぜんせい","aliases":["Fail-Fast","エドモンドソン","Project Aristotle","スモールウィン"],"ch":5,"sec":"26","secTitle":"チェンジマネジメント","def":"心理的安全性とは「この組織では、自分の意見を言っても、失敗を報告しても、無知を認めても、罰せられたり恥をかかされたりしない」とメンバーが信じられる状態。ハーバード・ビジネススクールのエイミー・エドモンドソン教授が提唱し、Google社のProject Aristotleでチームの生産性を左右する最大の要因として注目された。「居心地の良さ」「仲良し」「甘やかし」とは明確に異なり、高い基準と厳しいフィードバックを維持しつつ「率直に発言しても人格を否定されない」信頼関係を指す。","points":["心理的安全性が高い環境ではむしろ厳しい指摘や建設的な対立が活発に行われる。表面的な和やかさの裏で本音を飲み込んでいる状態は低い典型例","Fail-Fast=小さく素早く実験し、失敗したら早期に方向転換するアプローチ。「無計画に突っ込んで失敗する」こととは異なり、仮説→検証方法の設計→小規模実施→結果から学ぶプロセスが支える。機能するには心理的安全性が前提(失敗が罰せられる環境では誰もリスクを取らない)","スモールウィン(最初の着手対象)の設計3基準: ①短期間で成果が出る、②成果が定量化できる(「15分が3分に短縮」と数字で語れ、日常業務なので実感がわく)、③低リスクで実施できる。逆に非定型から着手するとミスが多発し否認・抵抗を強化する"],"related":["change-mgmt-stages","resistance-curve","poc-flow"],"quiz":{"q":"チーム内で心理的安全性が「高い」状態を示すものはどれか。","c":["対立を避け全員が賛成するまで議論を続けない方針を取っている","AIの使い方で失敗した担当者が経緯と学びを率直に共有し、他メンバーから感謝された","リーダーが「失敗は許さない。最初から正しく使うように」と指示している","全員がAIに好意的な意見だけを述べ、懸念を表明する人がいない"],"a":1,"exp":"心理的安全性は率直に発言しても罰せられない信頼関係。失敗報告が学びとして評価される状態が高い状態。対立回避・失敗への罰・懸念を言えない状態はいずれも低い典型例。"}},{"id":"five-questions","term":"現場で直面する5つの問いと答え方","yomi":"いつつのとい","aliases":["AIは間違えるのでは","ROIは見込めるのか","責任は誰が負うのか","自社データを入れても問題ないか","デモ通りに動くのか"],"ch":5,"sec":"27","secTitle":"AIエージェント推進者が現場で直面する5つの問いと答え方","def":"推進者が経営層・現場・IT部門・法務部門から受ける5つの問いへの答え方。①「AIは間違えるのでは」→間違いは生じ得る(生成AIは同じ入力に同じ出力を返すとは限らない)。「間違えるから使えない」ではなく「間違えを設計する」: 低リスク業務の選定+HITL+ミス頻度の定量測定の3点セット。比較対象を「完璧」ではなく「現状の人間のミス率」にすると議論が建設的になる。②「デモ通りに本番でも動くのか」→「動く」と断定せず、デモと本番の差を正直に伝えPoCで検証すると説明。PoCは必ず成功しなければならない工程ではなく、期待を下回っても本番前に得られた重要な知見。③「自社データを入れて問題ないか」→「何のデータを、どこに、どう渡すかを設計で制御できる」: マスキング前処理・クラウド/オンプレの選択・送信データがモデル学習に使われない契約設定。④「ROIは見込めるのか」→「やってみなければ分からない」も確定値の提示も不適切。前提条件付きROI+検証計画をセットで提示(「精度90%以上なら年間○○万円削減。達成可能かを2週間・費用○○万円のPoCで確認」)。⑤「責任は誰が負うのか」→AI自体に責任主体の地位はない。HITLで人間の確認・承認を経る設計にし、責任を分解して整理(ルール設計の誤り=設計者、確認漏れ=承認者、導入方針と許容リスク=経営)。","points":["共通する姿勢: 断定・保証ではなく「検証する方法」を提示する。不確実性を消すのではなく管理可能にするのがストラテジストの役割","IT部門には「大丈夫です」と断言するのは逆効果。「何を送り何を送らないか」を具体的に示し「一緒に設計をレビューしませんか」と巻き込むことで味方になる","予算獲得の鉄則: 大きな投資判断ではなく「小さな検証への投資判断」を求める(50万円と350万円では意思決定のハードルが違う)","現場への責任説明: 「AIが下書き、あなたが最終判断。責任構造は今の業務と同じ」という枠組みが「AIのせいで新しい責任を負わされる」不安を解消する"],"related":["hitl","legal-risks","roi","poc-flow","hallucination"],"quiz":{"q":"経営層から「AIエージェントの仕訳精度は保証できるのか」と聞かれた。最も適切な回答はどれか。","c":["「最新のLLMは非常に高精度なので問題ありません」","「精度は保証できません。まず50件のPoCで精度を測定し、その結果をもとに本格導入を判断いただけませんか」","「精度保証はAIベンダーの責任であり推進者が答える問いではありません」","「精度は100%にならないので導入は見送るべきです」"],"a":1,"exp":"精度の事前保証はできない。「問題ない」と断言すると本番で期待を下回った際に信頼を失う。保証ではなく検証する方法を提示し、小さなPoCの結果で投資判断を仰ぐ — 不確実性を管理可能にするのがストラテジストの役割。"}},{"id":"five-d-model","term":"5Dモデル","yomi":"ふぁいぶでぃーもでる","aliases":["Discovery","Definition","Design","Development & PoC","Deployment & Scale"],"ch":6,"sec":"28","secTitle":"発見・選定(Discovery)","def":"AIエージェント導入プロジェクトの全体工程を5ステップで整理したモデル。①Discovery(発見・選定: 何を自動化するかを決める)→②Definition(定義・構造化: 要件を具体化)→③Design(設計・プロンプト: どう実現するかの技術設計)→④Development & PoC(開発・検証: プロトタイプ構築と検証)→⑤Deployment & Scale(展開・定着: 本番展開と組織への定着)。頭文字がすべてDであることから5Dモデルと呼ぶ。","points":["各ステップは独立した知識ではなく、第1〜5章の内容をプロジェクトの中で統合して用いる場: Discoveryでは業務分析、Definitionでは業務分解とコンテキスト設計、DesignではRAGとセキュリティ設計、DevelopmentではHITL、Deploymentではチェンジマネジメント","DiscoveryとDefinitionの境界線は粒度: Discoveryは「どこに問題があるか」の発見まで、6ステップへの分解などの構造化はDefinition","DefinitionとDesignの境界線は「業務要件の文書化か、技術設計か」: 要件定義書への記載=Definition、JSONスキーマの設計=Design","DevelopmentとDeploymentの境界線: テスト用データ+隔離環境での検証=Development、実データ+実ユーザーでの本番運用=Deployment"],"related":["discovery-methods","definition-artifacts","design-three-areas","prototype-poc-mvp","rollout-scaling"],"quiz":{"q":"「スクリーニング業務を6ステップに分解し、各ステップをAIエージェントに任せるか人間が担うかを決めた」という活動は5Dモデルのどのステップに該当するか。","c":["Discovery","Definition","Design","Development"],"a":1,"exp":"業務をフローチャートレベルで構造化し役割分担を定義するのはDefinition。Discoveryは「この業務に問題がある」という発見までが範囲で、分解はDefinitionの成果物。"}},{"id":"discovery-methods","term":"Discoveryの3手法(ボトルネック分析・AI適合性診断・優先順位マトリクス)","yomi":"でぃすかばりーのさんしゅほう","aliases":["ボトルネック","AI適合性","優先順位マトリクス","2段階フィルタリング"],"ch":6,"sec":"28","secTitle":"発見・選定(Discovery)","def":"①ボトルネック分析=プロセス全体の生産性を制約している最も弱い箇所の特定(処理に時間がかかる、ミスが頻発、特定担当者に依存、反復的で付加価値が低い)。②AI適合性診断の3基準=非構造化データの処理を含むか(LLMの最大の強み)/文脈に応じた判断が必要か(手順が完全に定義できるならルールベースで十分)/ミスが許容できるか・HITLで補完できるか。③優先順位マトリクス=「期待効果の大きさ」×「実現のしやすさ」の2軸で整理し、効果が大きく実現しやすい業務を最優先。","points":["「ボトルネックだからAI化すべき」ではなく「ボトルネックであり、かつAIに向いている業務を選ぶ」— この2段階フィルタリングがDiscoveryの核心","AI適合性が低い業務: 100%の正確性が法的に要求される/データが極秘で外部APIに送信できない/対人関係や共感が本質/物理的な操作が伴う","クイックウィン選定の例: エンジニア職はスキル要件が技術的に明確で評価精度が出やすく、応募数が多く効果も大きく、正解/不正解が客観的に判断できる。定性評価が中心の営業職・管理職より最初のMVPに適する","効果は大きいが実現が難しい業務はすぐ着手せず中長期の検討対象に"],"related":["five-d-model","poc-flow","psych-safety","unstructured-data-advantage"],"quiz":{"q":"採用プロセスの4業務のうちAI適合性が最も高いものはどれか。","c":["面接官と候補者のスケジュール調整","月間2,000件の応募書類から求人要件との適合度を評価して一次スクリーニングを行う","最終面接後の採用/不採用の経営判断","内定者への入社手続き書類の郵送"],"a":1,"exp":"書類選考は非構造化データ(職務経歴書)の読解が中心で文脈に応じた柔軟な判断が必要、かつHITLで補完可能なためAI適合性が高い。スケジュール調整は定型処理で可能、経営判断はミス許容度が極めて低く、郵送は物理的操作を伴う。"}},{"id":"definition-artifacts","term":"Definitionの成果物(フローチャート・要件定義書)","yomi":"でふぃにしょんのせいかぶつ","aliases":["要件定義書","機能要件","非機能要件","制約条件","前提条件","業務フローチャート"],"ch":6,"sec":"29","secTitle":"定義・構造化(Definition)","def":"Definitionは選定したユースケースを設計・開発に渡せる形へ落とし込むステップ。まず対象業務をフローチャートとして詳細に可視化する(暗黙知のまま進めるとAIに任せる範囲と人間が担う範囲の切り分けが曖昧になり後続で手戻りが発生。HTAやIPOモデルの手法が本格的に活用される)。要件定義書の4つの構成要素: ①機能要件(AIに何をさせたいのか。「スキル情報を抽出する」「適合度を算出する」)、②非機能要件(どの程度の品質・条件で動作してほしいか。「30秒以内に結果を返す」など応答速度・安定性・可用性)、③制約条件(守らなければならないルール。「性別や年齢を評価に用いてはならない」など法務・倫理・業務ルール)、④前提条件(あらかじめ満たされているとみなす条件。「応募書類はPDFまたはWord形式」。満たされていないと設計の見直しが必要になるため事前に明確化)。","points":["「何をするか」=機能要件、「どの水準で実現するか」=非機能要件と捉えると判別しやすい","ストラテジストの役割は最初から完全な要件定義書を一人で作り切ることではなく、検討の土台となる叩き台を言語化して提示すること。実装担当者が技術的観点から補足・修正しながら精度を高める共同作業がDefinitionの重要な役割","バイアス防止の制約条件の例: スコアリングに使用するのはスキル・経験・資格のみ。氏名や出身大学を含めると無意識のバイアスがAIに再現されるリスク"],"related":["five-d-model","hta","ipo-model","persona-pass-criteria"],"quiz":{"q":"要件定義書の記載のうち「非機能要件」に該当するものはどれか。","c":["職務経歴書からスキル・経験・年数を構造化データとして抽出する","1件あたりの処理時間は30秒以内とする","求人要件との適合度を100点満点でスコアリングする","判定理由の評価コメントを自動生成する"],"a":1,"exp":"「30秒以内」は処理速度に関する非機能要件。他はいずれも「AIに何をさせるか」という機能要件。判別の決め手は「何をするか」なのか「どの水準でするか」なのか。"}},{"id":"persona-pass-criteria","term":"ペルソナ定義と合格基準","yomi":"ぺるそなとごうかくきじゅん","aliases":["ペルソナ","合格基準","間接ユーザー","バイアステスト"],"ch":6,"sec":"29","secTitle":"定義・構造化(Definition)","def":"ペルソナ定義=AIエージェントを利用するユーザーの典型像を具体的に描写すること。AI固有のペルソナで重要なのは年齢や役職といった属性ではなく「この人はAIの出力をどう使って、どんな判断を下すのか」。合格基準=AIの品質が業務に使えるレベルかを判断する定量的基準で、Definitionの段階で定義しDevelopment & PoCの合否判定に使う。事前に決めなければPoC結果の評価が主観的判断になる。「なんとなく90%」ではなく業務上の要求から逆算した根拠が必要。","points":["ペルソナの違いが機能要件に直結: スコアを見て合否を判断する人事担当者は「スコアの信頼性」を、面接対象を絞り込むエンジニアリングマネージャーは「スコアの根拠の具体性」を重視→「判定理由の評価コメント自動生成」という機能要件が導かれる","見落としやすいのが間接ユーザー(出力を確認・監督する社内担当者)のペルソナ。SIPOCの「出力の受取者を漏れなく洗い出す」考え方が活きる","合格基準の根拠の例: 精度90%以上の根拠は現状の担当者間一致率85%を上回ることを最低条件としたため。バイアステスト(同一スキルセットで氏名・性別・年齢を変えた模擬書類でスコア差±3点以内)は公平性を担保する採用AI固有の基準","合格基準とKPIの区別: 合格基準=PoCの合否を判定する一回限りの基準、KPI=運用中の継続的な成果測定に使う指標"],"related":["definition-artifacts","sipoc","go-nogo-pivot","kgi-kpi-okr"],"quiz":{"q":"「スコアの根拠が欲しい。根拠がないスコアは信用できない」というエンジニアリングマネージャーのペルソナから導き出される機能要件として最も適切なものはどれか。","c":["応募書類のPDFからテキストを自動抽出する機能","スコアの根拠を「Python経験5年、要件3年以上→◎」のように項目別に提示する機能","応募者に結果通知メールを自動送信する機能","応募書類を職種別に自動分類する機能"],"a":1,"exp":"ペルソナの要求(根拠の具体性)から項目別の評価根拠提示機能が導かれる。ペルソナ定義が曖昧だと「技術的にはすごいが誰も使わないエージェント」になるリスクがある。"}},{"id":"design-three-areas","term":"Designの3領域(コンテキスト/I/O/セキュリティ)","yomi":"でざいんのさんりょういき","aliases":["コンテキスト設計","I/O設計","セキュリティ設計"],"ch":6,"sec":"30","secTitle":"設計・プロンプト(Design)","def":"Designは「何をやりたいか」(Definition)と「どう実現するか」の間のギャップを埋めるステップで、3つの設計領域がある。①コンテキスト設計=AIエージェントにどう指示するか(システムプロンプト、Few-shot、Chain-of-Thought)。②I/O設計=何を入力しどんな形式で出力を受け取るか(JSON・スキーマ・バリデーション)。③セキュリティ設計=何を見せて何を見せないか(アクセス制御・ガードレール)。","points":["3領域の技術的な実装はアーキテクトの仕事。ストラテジストの役割はDefinitionで定義した業務要件が設計に正しく反映されているかの確認(「ペルソナの要求がJSONスキーマに反映されているか」「バイアス防止の制約条件がアクセス制御に落とし込まれているか」のレビュー)","マスキング処理はセキュリティ設計(アクセス制御)、プロンプトや指示の設計はコンテキスト設計、データ形式・構造の設計はI/O設計と領域を判別できることが重要"],"related":["five-d-model","context-engineering","json-io","access-guardrails","prompt-techniques"],"quiz":{"q":"応募書類をAIに送信する前に氏名・性別・年齢をマスキングする処理は、Designの3領域のどれに該当するか。","c":["コンテキスト設計","I/O設計","セキュリティ設計","すべての領域に該当する"],"a":2,"exp":"入力データのマスキングは「AIに何を見せるか」の制限=アクセス制御であり、セキュリティ設計の領域。コンテキスト設計はプロンプト・指示の設計、I/O設計はデータ形式・構造の設計。"}},{"id":"prompt-techniques","term":"Few-shotとChain-of-Thought","yomi":"ふゅーしょっととちぇーんおぶそーと","aliases":["Few-shot","Chain-of-Thought","CoT","例からルールを抽出"],"ch":6,"sec":"30","secTitle":"設計・プロンプト(Design)","def":"出力品質を高める2つの代表的技法。Few-shotプロンプト=入力例と出力例の組み合わせをプロンプトに含め、期待する出力形式や判断傾向を示す手法。Chain-of-Thought=思考過程を段階的に出力させる手法(「まずスキルキーワードを抽出し、次に経験年数を特定し、要件と1項目ずつ照合し、最後に総合スコアを算出する」)。LLMは一気に答えを出すより段階を踏むほうが複雑な問題の正確性が上がる。","points":["Few-shotの弱点: どの例を与えるかで品質が大きく左右される。偏った例だけ並べると境界事例で判断が不安定に。明確な合格例・明確な不合格例・判断が分かれやすい境界事例をバランスよく含める","弱点を補う実務手法=例からルールを抽出する: 例をそのまま載せるのではなく、AIに複数の例を分析させ判断基準を言語化させ、人間がレビュー・修正した判断ルールをシステムプロンプトへ組み込む。個別の例に依存せず未知のパターンへの対応力が高まる","CoTの注意点: 推論の段階が増えるほどトークン消費が増える。複数の判断を組み合わせる処理に限定して用いることでコストと精度のバランスを取る。推論モデルはこの段階的な考え方を行いやすいよう設計されたモデルだが、通常のLLMでも「順を追って判断する」指示である程度促せる"],"related":["design-three-areas","context-engineering","reasoning-model"],"quiz":{"q":"Few-shotプロンプトの例の選び方として最も適切なものはどれか。","c":["明確に合格となる例だけを多数並べる","明確な合格例・明確な不合格例・判断が分かれやすい境界事例をバランスよく含める","例は多いほど良いので無作為に大量に含める","例は不要でルールだけを書けばよい"],"a":1,"exp":"偏った例だけではその偏りを強く学習し、境界事例で判断が不安定になる。異なるパターンをバランスよく含めることが重要。さらに例から判断ルールを抽出してプロンプト化すれば個別の例への依存を減らせる。"}},{"id":"json-io","term":"I/O設計(JSONスキーマとバリデーション)","yomi":"あいおーせっけい","aliases":["JSONスキーマ","バリデーション","構造化出力の設計","confidence"],"ch":6,"sec":"30","secTitle":"設計・プロンプト(Design)","def":"AIの出力を自然言語のまま受け取ると後続処理で困る(文章から「85」を見つけ出す処理が必要になり、「85点くらい」という表現でシステムが止まる)。あらかじめ決めた形式=JSONで返させる。スキーマとはJSONの構造を定めた設計ルール(どの項目を含めるか、文字列/数値/真偽値のどの型か、どの項目が必須か、値の許容範囲)であり、JSONの設計図にあたる。スキーマがあれば出力が期待形式かを自動確認できる — この確認の仕組みがバリデーション。","points":["バリデーションで不整合(必須項目の欠け、数値であるべき項目に文字列)が見つかった場合の対応(AIに再生成を求める/人間へ引き継ぐ)をあらかじめ設計しておく","設計例のポイント: skill_evaluationを配列にして項目別の評価根拠を格納(ペルソナの要求を満たす)、confidence(判定確信度)フィールドで確信度が低い場合に自動的に人間の確認を求めるルールを設計、bias_check_passedフラグで後続処理からチェック結果を参照可能に"],"related":["design-three-areas","data-three-types","context-seven-info"],"quiz":{"q":"AIエージェントの出力にJSONスキーマを定義する主な目的として最も適切なものはどれか。","c":["出力の文字数を減らしてコストを下げるため","出力の構造を事前に定め、バリデーションで形式を自動確認し、後続システムが機械的に情報を取り出せるようにするため","AIの推論能力を向上させるため","人間が読みやすい文章にするため"],"a":1,"exp":"スキーマはJSONの設計図。形式が統一されていれば採用管理システム等が必要な情報を機械的に取り出せ、不整合はバリデーションで自動検出して再生成や人間への引き継ぎにつなげられる。"}},{"id":"access-guardrails","term":"アクセス制御とガードレール","yomi":"あくせすせいぎょとがーどれーる","aliases":["ガードレール","アクセス制御","入口と出口","バイアス防止の二重対策"],"ch":6,"sec":"30","secTitle":"設計・プロンプト(Design)","def":"セキュリティ設計は「AIに何を見せるか」と「AIに何を出させるか」の両方を管理する。アクセス制御=入力側の制限。AIが参照できる情報の範囲を制限する(処理に不要な氏名や住所を除外・マスキングして渡す、機密文書にアクセスさせない)。ガードレール=出力側の制限。出力内容や動作に制限を設ける仕組み(個人情報や不適切な表現が含まれる場合に出力を遮断・再生成を要求)。入口段階で参照範囲を制御し、出口段階で不適切な内容を防ぐ二重の考え方が重要。","points":["バイアス防止は入口と出口の両方の対策が必要: 入口=性別・年齢・氏名・出身大学をマスキング(プロンプトで「使用しない」と指示するだけでなく、そもそもバイアスの元になる情報を見せない=セキュリティ・バイ・デザイン)、出口=「男性なので〜」のような属性に基づく表現を自動検出してブロックし再生成を求める","プロンプト指示だけではバイアスを完全に排除できない。JSONにgenderフィールドを追加するのはバイアスを助長し、不適切な評価の「正しい例」は存在しない","設計して終わりではなく運用後も継続監視: 属性情報だけを変えた模擬書類を定期的に入力し評価差が許容範囲内かを確認"],"related":["design-three-areas","ai-policy","legal-risks","risk-categories"],"quiz":{"q":"AIの出力に「応募者は女性なので、コミュニケーション力が高いと推定される」というコメントが含まれていた。Design上の対策として最も適切な組み合わせはどれか。","c":["システムプロンプトで「性別に基づく評価を禁止する」と指示するのみ","入口側で性別情報をマスキングし、出口側で性別に基づく表現を自動検出してブロックする","JSONスキーマにgenderフィールドを追加する","Few-shotに性別に基づく評価の「正しい例」を追加する"],"a":1,"exp":"バイアス防止には入口(アクセス制御=マスキング)と出口(ガードレール=自動検出・ブロック)の両方の対策が必要。プロンプト指示だけでは完全に排除できず、genderフィールドの追加は助長、不適切な評価に正しい例は存在しない。"}},{"id":"prototype-poc-mvp","term":"プロトタイプ・PoC・MVPの区別","yomi":"ぷろとたいぷぴーおーしーえむぶいぴー","aliases":["プロトタイピング","試作品","実現可能性の検証"],"ch":6,"sec":"31","secTitle":"開発・検証(Development & PoC)","def":"プロトタイプ=設計した仕組みが技術的に動くかを確認するための試作品。主な利用者は開発・設計メンバーで「この設計で本当に動くか」を確かめる。PoC=その仕組みが業務上・技術上、実現可能だと示すための検証。主な対象は導入判断を行う意思決定者で「効果が期待できるか」「導入に進む価値があるか」の判断材料。MVP=実際の利用者に最小限の価値を提供できる状態まで作り込んだ製品。利用者は実際の業務担当者や顧客で「最低限使える形で提供し実際の利用を通じて改善」する。","points":["整理: プロトタイプ=「動くかを確かめる試作品」、PoC=「実現可能性を確かめる検証」、MVP=「最小限でも価値を提供する実用品」","プロトタイピングの目的は完成品ではなく、設計どおりに動くか・技術的に実現できそうかの早期確認。画面の完成度や特殊ケース対応は目指さず、主要な利用場面で期待した出力が得られるかに集中","全職種同時ではなく、Discoveryで選定した対象(エンジニア職)に絞って検証すべき変数を減らす"],"related":["five-d-model","mvp-approach","sandbox-pilot","poc-flow"],"quiz":{"q":"プロトタイプ・PoC・MVPの区別として最も適切なものはどれか。","c":["3つはすべて同じ意味である","プロトタイプは技術的に動くかの試作品、PoCは実現可能性を示す検証、MVPは実利用者に最小限の価値を提供する実用品","MVPが最初でプロトタイプが最後の工程である","PoCは本番環境で全ユーザーに提供するものである"],"a":1,"exp":"プロトタイプ=動くかの確認(開発メンバー向け)、PoC=導入判断の材料(意思決定者向け)、MVP=最小限の価値提供(実利用者向け)。対象と目的が異なる。"}},{"id":"sandbox-pilot","term":"サンドボックスとパイロット","yomi":"さんどぼっくすとぱいろっと","aliases":["サンドボックス","パイロット導入","隔離環境","限定運用"],"ch":6,"sec":"31","secTitle":"開発・検証(Development & PoC)","def":"サンドボックス=本番環境から切り離された検証専用の環境。テスト用データを用いて、限られた関係者が隔離環境の中でプロトタイプの動作を確認する(開発・検証の段階)。パイロット=本番導入の直前または初期段階で行う限定運用。実際の利用者と実データを対象に、本番に近い環境で運用上の課題を確認する。「安全に試すための検証環境」と「実運用に近い条件で確かめるための限定導入」の違い。","points":["判別の決め手: テスト用データ+隔離環境=サンドボックス(Development)、実データ+実ユーザー=パイロット(Deployment)","PoC検証データの設計例: 50件の内訳を明確合致15件・明確不合致15件・ボーダーライン10件・発生頻度は低いが判断が難しいケース(異業種転職・フリーランスのみ・海外経歴)10件とバランスさせる","開発段階では出力品質が安定しないため人間の確認(HITL)が重要。確認結果や修正内容は改善に活用できるフィードバックとして蓄積される"],"related":["prototype-poc-mvp","rollout-scaling","hitl"],"quiz":{"q":"「プロトタイプをワークフローツールで構築し、テスト用の応募書類50件で精度を検証した」活動は5Dモデルのどのステップか。","c":["Definition","Design","Development & PoC","Deployment & Scale"],"a":2,"exp":"テスト用データを使い隔離環境(サンドボックス)で検証しているのでDevelopment。実データ・実ユーザーによる検証であればDeploymentのパイロットに該当する。"}},{"id":"go-nogo-pivot","term":"フィードバックループとGo/No-Go/Pivot判断","yomi":"ごーのーごーぴぼっと","aliases":["Go","No-Go","Pivot","フィードバックループ","改善サイクル"],"ch":6,"sec":"31","secTitle":"開発・検証(Development & PoC)","def":"フィードバックループ=「実行→結果の評価→改善→再実行」を繰り返す改善サイクル。Definitionで設定した合格基準が「このサイクルをいつ終了してよいか」の判断基準として機能する。PoCの結果を受けた判断は3通り: Go=本番展開に進む(合格基準をすべて満たした場合)/No-Go=中止する(フィードバックを重ねても基準に届かない場合。前提条件の見直しが必要)/Pivot=方向転換する(精度は基準を満たすが処理コストが想定を大きく上回る場合など。対象の限定や軽量モデルへの切り替えでスコープや実装方式を見直す)。","points":["1回の検証で合格基準に届かないことは珍しくなく、複数回の改善サイクルで精度を引き上げるのがDevelopmentの本質(例: 初回78%→フリーランス経歴のFew-shot例追加・役割名称の同義語リスト追加・関連する技術的貢献の加点ルール追加→86%→3回目で92%と基準クリア)","基準未達で合格基準を引き下げてDeploymentに進むのは業務上の根拠に基づく品質水準を損なう。検証を通過していない段階での対象拡大はリスク拡散","HITLでベテラン担当者が出力を確認し正しい評価を記録することがプロンプト改善の根拠になる。HITLは「人間による確認・判断・修正」の工程、フィードバックループはそれを含む改善サイクル全体","最終判断は「成功か失敗か」の二択ではなく、進む/止める/方向修正を合格基準に照らして判断する"],"related":["persona-pass-criteria","sandbox-pilot","hitl","poc-flow"],"quiz":{"q":"PoCの結果、スコア精度が78%で合格基準の90%に達しなかった。次に取るべきアクションとして最も適切なものはどれか。","c":["精度が不十分なのでプロジェクトを即時中止する","フィードバックループでプロンプトとFew-shotを改善し、再検証する","合格基準を78%に引き下げてDeploymentに進む","全職種に展開してデータ量を増やし精度向上を図る"],"a":1,"exp":"1回で基準に届かないことは珍しくなく、まず改善サイクルを回すのが適切。即時中止は時期尚早、基準引き下げは品質水準を損ない、検証未通過での展開拡大はリスク拡散。"}},{"id":"rollout-scaling","term":"パイロット・ロールアウト・スケーリング","yomi":"ろーるあうととすけーりんぐ","aliases":["ロールアウト","スケーリング","段階的展開"],"ch":6,"sec":"32","secTitle":"展開・定着(Deployment & Scale)","def":"パイロット導入=全社一斉ではなく、まず限定された部門・チーム・業務で本番稼働させること。重要な理由は3つ: ①実環境でしか見つからない品質問題がある(表記の揺れ・例外ケース・入力ミス)、②AI本体だけでなく運用の仕組み(引き継ぎ先、誤出力時の対応)も検証が必要、③小さな成功実績が次の展開の根拠になる(クイックウィン)。ロールアウト=パイロットの成功を受けて対象範囲を段階的に広げるプロセス。「同じ機能を、より多くの人に届ける」ことで機能自体は変わらない。スケーリング=処理能力や適用範囲の拡大。対象業務の拡大や新機能の追加など、能力そのものの拡張を含む。","points":["段階的に進める意味はリスクを管理可能な範囲に収めること。各段階で問題を検出・修正してから次に進む","判別例: 担当者2名→5名に広げる=ロールアウト(同じ機能の利用者拡大)、営業職向けに定性的スキルの評価基準を新設計=スケーリング(能力の拡張)、面接日程の自動調整機能を追加=スケーリング(新機能)","段階進行の判断基準を事前に設定する(「スコア精度85%以上を2週間維持」「バイアステスト合格」「担当者満足度70%以上」の3条件をすべて満たしたら次へ)"],"related":["five-d-model","sandbox-pilot","psych-safety","ai-seci"],"quiz":{"q":"「エンジニア職担当2名でのパイロット成功後、全エンジニア職採用の担当者5名に展開する」ことと「営業職向けにコミュニケーション力などの定性的スキル評価基準を新たに設計して対応職種を広げる」ことの組み合わせとして正しいものはどれか。","c":["前者=スケーリング、後者=ロールアウト","前者=ロールアウト、後者=スケーリング","両方ともロールアウト","両方ともスケーリング"],"a":1,"exp":"同じ機能をより多くの人に届けるのがロールアウト、評価基準の新設計など能力そのものの拡張を伴うのがスケーリング。"}},{"id":"ai-seci","term":"AI-SECIモデルと運用KPIモニタリング","yomi":"えーあいせきもでる","aliases":["AI-SECI","知識循環","入社後パフォーマンス","定着化"],"ch":6,"sec":"32","secTitle":"展開・定着(Deployment & Scale)","def":"AI-SECIモデルは、SECIモデルをAIエージェントの文脈に拡張した概念。従来のSECIが「人間同士」の知識変換を扱うのに対し、AI-SECIは「人間とAIエージェント」の間で知識が循環する構造を捉える。共同化=担当者がAIの出力を日々確認する中で感覚的な判断(AIの癖の発見など)を蓄積→表出化=暗黙知がAIへのフィードバックとして明文化→連結化=フィードバックがプロンプトやナレッジベースに統合され他職種へも横展開→内面化=改善されたAIの出力を通じて新人担当者が判断力を自然に習得。このサイクルでAIの精度と人間の判断力が同時に向上し、組織の知的資産が厚みを増す。","points":["運用KPIモニタリングではアウトカム指標を中心に追跡: 1件あたりの処理時間の短縮率、担当者間の判定一致率の変化、バイアステストの定期合格確認、採用後のパフォーマンス","「AIが高スコアを付けた候補者が実際に入社後に活躍しているか」は採用スクリーニングAI固有の本質的指標。工数を削減しても採用した人材の質が下がっていれば導入の意味がない。半年〜1年のスパンが必要なため短期と長期のアウトカム指標を分けて設計する","「処理件数」だけではスコア精度が低く差し戻しが増えている可能性を見落とす(アウトプット指標の限界)"],"related":["seci-model","rollout-scaling","outcome-output","kb-freshness"],"quiz":{"q":"ベテラン担当者がAIのスコアリングの癖を発見し、その知見を明文化してプロンプトに反映した結果AI精度が向上し、改善されたAIの出力を見た新人担当者が同様の判断力を自然に習得した。この一連のプロセスを最も適切に表す概念はどれか。","c":["フィードバックループ","Human-in-the-Loop","AI-SECIモデル","SECIモデル"],"a":2,"exp":"人間の暗黙知がAIへのフィードバックとして形式知化され(表出化)、統合され(連結化)、改善されたAIを通じて人間が新たな暗黙知を獲得する(内面化)という人間とAIの間の知識循環。従来のSECIは人間同士の知識変換であり、AIがサイクルの中核に立つ点で区別される。"}}],"chapters":{"0":"Prologue 導入","1":"生成AIとAIエージェントの基礎","2":"業務の基礎","3":"AIデータリテラシーとマネジメント","4":"自動化レベルとワークフロー設計","5":"人と組織から考えるAI時代の組織設計","6":"AIエージェントを実装する5Dモデル"},"summaries":{"0":{"title":"Prologue 導入","points":["生成AI導入企業の約7割が期待した成果を出せておらず、その大半は技術以外の課題(適用業務の選定・現場の不使用・効果測定・法務調整)","本資格が育てるのは「使う人」ではなく「導入する人」。AIエージェント×業務設計×組織設計の3本柱の掛け合わせが核心能力","AI発展の3フェーズ: 作るAI(専門家の時代)→使うAI(誰もが使える時代)→任せるAI(AIエージェントの時代)。現在は境界点","AGI(人間と同等)・ASI(人間を超える)は定義未確立の不確実な長期シナリオとして冷静に参照する","各Sectionは「知識→業務シナリオ→理解度チェック」で構成。第1-2章の共通シナリオは社内ITヘルプデスクAI(月500件・3名・FAQ6割・月75時間)"]},"1":{"title":"生成AIとAIエージェントの基礎","points":["生成AIの最大のインパクトは非構造化データの活用。LLMは「次の言葉の確率的予測」の繰り返しで動き、ハルシネーションはその構造的特性","トークン従量課金のため「1回あたりの消費×月間件数」でAPI費用を概算できることが基本スキル。ただし総コストはTCOで判断","AIエージェント=頭脳(LLM)・記憶(ナレッジベース)・手足(ツール連携)の三位一体。手足が欠けると高機能なFAQ検索ツール止まり","自律性4段階(反応型・支援型・協働型・自律型)。支援型→協働型への段階的引き上げが実務の主流。不可逆な操作は必ず人間の確認を挟む","起動タイプは指示型・定時型・条件型。見分けは「AIに直接依頼したか」。起動タイプと自律性レベルは独立した設計判断","RPAとの違いは思考・解釈能力の有無。3基準(例外的判断・入力の定型性・例外頻度)で使い分け、ハイパーオートメーションで組み合わせる","MCPは接続の共通規格(2024年11月Anthropic公開)。M×N問題をM+Nに解消し、ツール選択を自動化。判断基準は「今後の拡張計画」","導入価値は定量(工数・費用)+定性(顧客体験・従業員体験)。経営層報告は定量・定性・リスクの3点セット","リスクは信頼性・形骸化・ブラックボックス化・セキュリティ/倫理の4分類。相互に連鎖するため小さく導入し段階的に展開","トレンド3軸: エージェント化・ドメイン特化・モデル強化。「自社のこの業務に使えるか」で判断(入力データ・コスト精度バランス・現性能)"]},"2":{"title":"業務の基礎","points":["「技術の前に業務を見る」が第2章の通底姿勢。仕事(目的)>業務(繰り返しの流れ)>作業(具体的行為)の階層で、AIが置き換えるのは作業だが業務全体の理解が前提","IPOモデル(Input/Process/Output)で業務の輪郭を掴み、Processの中からAIが担える作業を特定する。Input品質(不鮮明な画像など)も精度を左右する","As-Is分析は事実のみを記録し改善案を混ぜない。ウォークスルー(観察)・5W1H(特にWhy)・スイムレーン図・マニュアルと実態の差分・タイムスタディで暗黙知まで拾う","To-Beは既存業務のそのまま置き換えではなくAI前提の再設計。HITL(3基準: ルール明確→AI/例外多い→人間/誤りリスク高→人間の最終確認)、ストーリーボード、KPIひも付け","順序の厳守: As-Is→To-Be→ギャップ分析。理想から入ると現実離れした設計になり利用率低迷につながる","BPR(ハマー&チャンピー、1990年代)は改善ではなく「そもそも必要か」を問う再設計。現代は特定業務に絞り小さく検証する運用が現実的","最多の失敗は「汚いプロセスの自動化」— 非効率をそのまま自動化すると非効率を高速に回す装置ができる。ECRSが難しい場合は理想の共有と難易度上昇のトレードオフを事前合意","ECRSは効果の大きい順(排除→結合→順序変更→簡素化)に問う。Eliminateが最優先で、排除できれば自動化の必要すらない","可視化4手法は粗い順にIPO→SIPOC→HTA→業務フロー図。目的と対象者で使い分ける(経営層への説明=IPO/SIPOC、現場との役割詰め=HTA/フロー図)","SIPOCはCustomerの見落とし(例: 経営企画部門)による手戻りを防ぐ。HTAはアトミック・タスクを AI処理/定型処理/人間 の3分類に割り当てHITLと直結。フロー図はチームの認識統合が最大の価値"]},"3":{"title":"AIデータリテラシーとマネジメント","points":["情報=事実の記述、知識=判断の根拠。AIが参照できるのは形式知(ナレッジベース)のみで、暗黙知の形式知化がAI導入の前提条件。障壁は言語化の困難さと知識の囲い込み","SECIモデル(野中郁次郎): 共同化→表出化→連結化→内面化の循環。AI導入と最も関連が深いのは表出化で、AIは全フェーズを加速し循環を媒介する","RAGとファインチューニングの使い分け: 更新頻度の高い知識(価格・FAQ・規程)はRAG、文体・トーン・専門用語はファインチューニング。実務では組み合わせる","データ3分類と担い手: 構造化→API・定型処理、非構造化(企業データの約8割)→LLM、半構造化(JSON)→入出力インターフェース。典型パターンは非構造化→LLM→JSON→API→構造化","RAGの2フェーズ: 保存(チャンク分割→ベクトル化→インデックス化)と検索・生成(セマンティック検索→グラウンディング)。チャンクは「1トピック=1チャンク」、メタデータが検索精度を左右","RAGの精度問題は「検索」と「生成」に切り分けて原因特定。向上4観点=質問の変換・検索先の振り分け・リランキング/フィルタリング・チャンク設計","AIガバナンス: AIポリシー(許可/禁止データ。万社共通の正解なし)+利用ガイドライン(具体性が命)。法的リスク3つ=著作権・個人情報保護法・責任分界点。技術を法務の言葉に翻訳する力がストラテジスト固有の能力","AIが読みやすいデータ7つの習慣(固有名詞/構造で作る/仕組みで入力品質/画像注釈/日付・タグ/履歴機能/アクセス可能な場所)。原則は「AIが見えないものは存在しないのと同じ」","AI Readyデータ4特性=正確性・可視性・追跡可能性・安全性(Gartner:2026年までにデータ不備でAIプロジェクトの60%が中止と予測)。整形は「全部やる」が罠で、導入対象範囲から優先","ナレッジベースの鮮度管理: 静的運用がドリフトの最大原因。更新パイプライン4ステップ(検知→反映→旧版除外→品質確認)+自動更新/定期棚卸/フィードバックトリガーの使い分け+プライマリ/セカンダリの階層管理","AIプロジェクトは3つの不確実性(技術・業務適合性・効果)ゆえPoCが不可欠。A(実験)→判断ゲート→B(本運用)。Aの繰り返しは正常、撤退も成果。スコープは一点集中、MVPは作り込みすぎない","成功定義の3層(効果・定着・精度): 定義はトップダウン(効果から逆算)、達成はボトムアップ。ベースライン測定はPoC前が鉄則。定着層はPoC中=定性/本運用=定量。「使いたくない」は精度不信/UX/業務フロー不適合/心理的抵抗の4分類で原因特定"]},"4":{"title":"自動化レベルとワークフロー設計","points":["自動化の4レベル: Lv1アドホック(都度利用)→Lv2カスタムチャットボット(仕組み化・対話型)→Lv3ワークフロー(電車: 事前設計のレール、再現性と責任の明確さ)→Lv4自律型(自家用車: AIが計画を作る。柔軟だがリスクも)。優劣ではなく選択肢","境界線: Lv1↔2=仕組み化、Lv2↔3=自ら動き出すか+システム連携、Lv3↔4=フローの構造自体をAIが作ったか","MVPアプローチ: 小さく始めて素早く検証し段階的に引き上げる。Lv2を2週間で作り1ヶ月検証→データを持ってLv3への投資判断。AI導入は技術と同時に組織の信頼の問題","トリガー3分類: 指示型(チャット・手動実行)/定時型(スケジュール・期限日付ベース)/条件型(イベント・フォーム送信・Webhook・閾値)。イベントとWebhookの違いは検知主体(自分で監視vs外部から通知)","アクション3分類: データ処理(APIコール取得・データ抽出・変換)/生成・判断(コンテンツ生成・分類・条件分岐)/実行・連携(APIコール送信・ファイル操作・HITL)。As-Is分析とHTAの結果がそのまま設計図になる","条件分岐3種: 二択=If/Else、3方向以上=ルーティング、通過/遮断=フィルタリング。粒度は成否に最も影響する変数に絞る(全部細かく→保守不能、分岐なし→品質崩壊)","エラーハンドリング: 正常系/異常系のIf/Else。全体停止ではなく人へ戻すフォールバックを設計。HITLと直結しガバナンスの基本","コンテキストエンジニアリング=LLMに渡す情報全体の設計(プロンプトエンジニアリングを包含する上位概念)。KarpathyのOS/RAM比喩。原則「AIが見えないものは存在しないのと同じ」","LLMの4つの限界: 情報量の上限/Lost in the Middle(中間の見落とし)/コンテキスト汚染(ハルシネーションの連鎖)/コンテキスト混乱(矛盾情報)","渡す情報7種: システムプロンプト(ぶれない軸)・ユーザープロンプト・短期メモリ・長期メモリ(手続き/エピソード/意味記憶)・外部知識RAG・ツール情報・構造化出力","4手法=書き出し/選択/圧縮(避けるべき最終手段)/分割。4原則=必要十分・構造化・鮮度(重要情報は後半に)・反復検証。「何を渡さないか」の設計が重要","出力品質の切り分け順序: 情報の欠落→ノイズ→伝え方→最後にモデル変更。「モデルの前にコンテキストを疑う」。Manusはファインチューニングでなくコンテキストエンジニアリングに賭けた"]},"5":{"title":"人と組織から考えるAI時代の組織設計","points":["AIの位置づけは「道具」から「同僚」へ。導入は操作習得ではなく役割と権限の再定義(誰が何を決めるかの再設計)を要求する","デリゲーション設計4ステップ(棚卸し→リスク評価→低リスクから範囲決定→モニタリング/エスカレーション)。リスク3段階: 低=判断+実行を委譲/中=HITL/高=AIは情報提供のみ。リスクは文脈依存(同じメール送信でも社内連絡と契約変更通知で異なる)","HITLは安全装置であると同時にAIを育てる仕組み(フィードバックが改善データに)。ステップ単位で設計し、実績に応じて段階的に引き上げる","組織文化診断3つの問い: ミスへの許容度/新しい仕組みへの受け止め方(過去のITプロジェクトの経緯)/意思決定のスピードと構造","推進体制3類型: 中央集権型(統制◎速さ×)⇔分散型(速さ◎統制×)は逆転関係。ハイブリッド型は「何を中央が決め何を現場が決めるか」の線引きが肝(基準=中央、業務設計=現場)","CoEの3機能=ガバナンス/技術支援/ナレッジ共有。形骸化と過剰統制の判別は「部署の自律的裁量が実質確保されているか」。知見共有の承認制はハイブリッド型の根幹を破壊する","アウトカム指標(創出時間・解決課題数・従業員満足度)を主軸に、アウトプット指標(DAU/処理件数)は補助。活動量だけ追うと形骸化する","KGI=最終ゴール、KPI=中間指標、OKR=探索的目標向け(初期フェーズはOKR、本格導入はKGI/KPI)。KPI設計4ステップ=KGI合意→選定(アウトカム最低2個)→計測設計→アクションルール。KPIの限界=ロングテール課題(名もなき非効率の総和はKPIに映らない)","JD再設計: ハードスキル(ツール操作・定型処理)の重要性が下がり、ソフトスキル(問いの設定力・論理的思考力・文脈読解力・関係構築力・倫理的判断力)が高まる。リスキリング=職務が変わる/アップスキリング=職務継続+スキル追加","チェンジマネジメント3段階: 否認(必要性を認めない→データと事例で認知形成)→抵抗(感情の問題→役割の見通しを示す。恐怖で動かすのは失敗パターン)→受容(クイックウィンを積む)","抵抗曲線の「谷」は正常な反応。谷での中止が最大の失敗。事前施策で浅く短くし、谷の時期のKPIは学習進捗で評価。心理的安全性(エドモンドソン)は仲良しではなく「率直に発言しても罰せられない」状態でFail-Fastの前提","5つの問いへの共通姿勢: 保証ではなく検証方法を提示(前提条件付きROI+小さなPoC)、比較対象は完璧ではなく現状の人間のミス率、IT部門は「一緒にレビュー」で巻き込む、責任はHITL+分解(設計者/承認者/経営)で整理"]},"6":{"title":"AIエージェントを実装する5Dモデル","points":["5Dモデル: Discovery(何を自動化するか)→Definition(要件の具体化)→Design(技術設計)→Development & PoC(構築と検証)→Deployment & Scale(展開と定着)。第1〜5章の知識を統合して用いる場","Discovery: ボトルネック特定→AI適合性診断(非構造化データ/文脈判断/ミス許容・HITL補完の3基準)→優先順位マトリクス(効果×実現しやすさ)。「ボトルネックかつAIに向いている」2段階フィルタリングが核心","AI適合性が低い業務: 100%の正確性が法的に要求される/極秘データ/対人関係・共感が本質/物理的操作を伴う","Definition: フローチャートで暗黙知を可視化し役割分担を切り分け。要件定義書4要素=機能要件(何をするか)/非機能要件(どの水準か)/制約条件(守るべきルール)/前提条件(満たされている前提)。ストラテジストは叩き台を言語化する","ペルソナは属性ではなく「出力をどう使いどんな判断を下すか」を描写。間接ユーザーも忘れない(SIPOCの発想)。合格基準はDefinitionで事前定義(業務要求から逆算)し、PoCの合否判定に使う(KPIとは別物)","Design 3領域: コンテキスト設計(システムプロンプト/Few-shot=バランスの取れた例+例からルール抽出/CoT=段階的推論・コスト注意)、I/O設計(JSONスキーマ+バリデーション+confidence)、セキュリティ設計","セキュリティ設計はアクセス制御(入口: マスキング等で見せない)とガードレール(出口: 不適切な出力を検出・遮断)の二重の考え方。バイアス防止は入口+出口の両方+運用後の継続監視","プロトタイプ=動くかの試作品/PoC=実現可能性の検証/MVP=最小限の価値を提供する実用品。サンドボックス=テストデータ+隔離環境/パイロット=実データ+実ユーザーの限定運用","フィードバックループ(実行→評価→改善→再実行)を合格基準到達まで回す。判断はGo(本番へ)/No-Go(中止・前提の見直し)/Pivot(スコープや実装方式の方向転換)の3通り。1回で届かないのは正常","パイロットが重要な3つの理由: 実環境でしか見つからない品質問題/運用の仕組みの検証/小さな成功実績が展開の根拠になる","ロールアウト=同じ機能の利用者拡大、スケーリング=対象業務や機能など能力の拡張。段階進行の判断基準を事前設定","AI-SECIモデル: 人間とAIの間の知識循環(共同化→表出化→連結化→内面化)でAIの精度と人間の判断力が同時に向上。運用KPIはアウトカム中心で、採用AIなら「入社後パフォーマンス」という長期指標も設計する"]}}};

/* ================= ゼロトラスト基本ユーティリティ =================
   - すべての動的挿入は textContent か escapeHtml 経由
   - ストレージは自動検出しメモリへフォールバック(例外を握りつぶさない設計)      */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
const store = (() => {
  const mem = {};
  let ok = false;
  try{
    const k = "__aicx_probe__";
    localStorage.setItem(k, "1"); localStorage.removeItem(k); ok = true;
  }catch(e){ ok = false; }
  return {
    get(k, fb){
      try{
        const raw = ok ? localStorage.getItem(k) : (k in mem ? mem[k] : null);
        return raw === null || raw === undefined ? fb : JSON.parse(raw);
      }catch(e){ return fb; }
    },
    set(k, v){
      try{
        const raw = JSON.stringify(v);
        if(ok) localStorage.setItem(k, raw); else mem[k] = raw;
      }catch(e){ /* 容量超過等は黙って諦める(致命ではない) */ }
    },
    persistent: ok
  };
})();
const K = s => "aicxnav:v1:" + s;

/* ================= 検索正規化 ================= */
function norm(s){
  s = String(s).normalize("NFKC").toLowerCase();
  // カタカナ→ひらがな
  s = s.replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
  return s.replace(/[\s・･、。‐\-–—_/／]/g, "");
}
const INDEX = DATA.terms.map(t => ({
  t,
  nTerm: norm(t.term),
  nYomi: norm(t.yomi || ""),
  nAlias: (t.aliases || []).map(norm),
  nBody: norm(t.def + " " + (t.points || []).join(" ") + " " + t.secTitle)
}));
const BYID = {}; DATA.terms.forEach(t => BYID[t.id] = t);

function search(qRaw){
  const q = norm(qRaw);
  if(!q) return [];
  const hits = [];
  for(const e of INDEX){
    let score = -1;
    if(e.nTerm === q) score = 100;
    else if(e.nTerm.startsWith(q)) score = 80;
    else if(e.nTerm.includes(q)) score = 70;
    else if(e.nAlias.some(a => a === q)) score = 65;
    else if(e.nAlias.some(a => a.includes(q))) score = 55;
    else if(e.nYomi.startsWith(q)) score = 50;
    else if(e.nBody.includes(q)) score = 30;
    if(score >= 0) hits.push({ e, score });
  }
  hits.sort((a, b) => b.score - a.score || a.e.t.term.localeCompare(b.e.t.term, "ja"));
  return hits.map(h => h.e.t);
}

/* ================= 共通: 用語カード描画 ================= */
function chLabel(t){ return (t.ch === 0 ? "P" : "CH" + t.ch) + " · S" + t.sec; }
function termCard(t, opts){
  opts = opts || {};
  const card = document.createElement("article");
  card.className = "card";
  let html = '<div class="eyebrow mono">' + escapeHtml(chLabel(t)) + ' — ' + escapeHtml(t.secTitle) + '</div>'
    + '<h3>' + escapeHtml(t.term) + '</h3>'
    + '<div class="yomi">' + escapeHtml(t.yomi || "") + '</div>'
    + '<p class="def">' + escapeHtml(t.def) + '</p>';
  if(t.points && t.points.length){
    html += '<ul class="pts">' + t.points.map(p => "<li>" + escapeHtml(p) + "</li>").join("") + "</ul>";
  }
  card.innerHTML = html;
  if(t.related && t.related.length){
    const rel = document.createElement("div"); rel.className = "rel";
    t.related.forEach(rid => {
      const rt = BYID[rid]; if(!rt) return;
      const sp = document.createElement("span");
      sp.textContent = rt.term;
      sp.addEventListener("click", () => { showView("search"); const q = document.getElementById("q"); q.value = rt.term; renderSearch(rt.term); window.scrollTo({top:0}); });
      rel.appendChild(sp);
    });
    card.appendChild(rel);
  }
  if(t.quiz && !opts.noQuiz){
    const btn = document.createElement("button"); btn.className = "qtoggle"; btn.textContent = "この用語の確認問題を見る ▾";
    const body = document.createElement("div"); body.className = "qbody";
    btn.addEventListener("click", () => {
      const open = body.classList.toggle("open");
      btn.textContent = open ? "確認問題を閉じる ▴" : "この用語の確認問題を見る ▾";
      if(open && !body.hasChildNodes()) body.appendChild(inlineQuiz(t));
    });
    card.appendChild(btn); card.appendChild(body);
  }
  return card;
}
function inlineQuiz(t){
  const wrap = document.createElement("div");
  const q = document.createElement("p"); q.className = "qq"; q.style.fontSize = ".88rem"; q.textContent = t.quiz.q;
  wrap.appendChild(q);
  const exp = document.createElement("div"); exp.className = "exp";
  const opts = [];
  t.quiz.c.forEach((c, i) => {
    const b = document.createElement("button"); b.className = "opt"; b.textContent = String.fromCharCode(65 + i) + ". " + c;
    b.addEventListener("click", () => {
      opts.forEach(o => o.disabled = true);
      opts[t.quiz.a].classList.add("correct");
      if(i !== t.quiz.a) b.classList.add("wrong");
      exp.innerHTML = "<b>" + (i === t.quiz.a ? "正解" : "不正解") + "</b> — " + escapeHtml(t.quiz.exp);
      exp.classList.add("show");
      recordAnswer(t.id, i === t.quiz.a);
    });
    opts.push(b); wrap.appendChild(b);
  });
  wrap.appendChild(exp);
  return wrap;
}

const $q = document.getElementById("q");
const $results = document.getElementById("results");
const $hint = document.getElementById("searchHint");
const $clear = document.getElementById("qClear");
function renderSearch(qRaw){
  $clear.style.display = qRaw ? "block" : "none";
  $results.textContent = "";
  if(!qRaw.trim()){
    $hint.textContent = "収録 " + DATA.terms.length + " 用語から即答します。例:「三位一体」「MCP」「形骸化」";
    return;
  }
  const res = search(qRaw);
  $hint.textContent = res.length ? res.length + "件ヒット" : "";
  if(!res.length){
    const d = document.createElement("div"); d.className = "empty";
    d.textContent = "「" + qRaw + "」に該当する用語は未収録です(収録範囲は順次拡大中)。別の言い方や略語でも試してみてください。";
    $results.appendChild(d);
    return;
  }
  res.slice(0, 20).forEach(t => $results.appendChild(termCard(t)));
}
let deb = null;
$q.addEventListener("input", () => { clearTimeout(deb); deb = setTimeout(() => renderSearch($q.value), 120); });

(function(){
  const root = document.getElementById("dict");
  const byCh = {};
  DATA.terms.forEach(t => { (byCh[t.ch] = byCh[t.ch] || []).push(t); });
  Object.keys(DATA.chapters).map(Number).sort((a,b)=>a-b).forEach(ch => {
    const terms = byCh[ch] || [];
    const box = document.createElement("div"); box.className = "chap";
    const head = document.createElement("button");
    head.innerHTML = '<span class="n mono">' + (ch === 0 ? "P" : "C" + ch) + '</span><span>' + escapeHtml(DATA.chapters[ch]) + '</span><span class="c">' + (terms.length ? terms.length + "語" : "準備中") + '</span>';
    box.appendChild(head);
    const body = document.createElement("div"); body.className = "body";
    if(terms.length){
      const bySec = {};
      terms.forEach(t => { (bySec[t.sec] = bySec[t.sec] || []).push(t); });
      Object.keys(bySec).sort().forEach(sec => {
        const h = document.createElement("div"); h.className = "sec-h mono";
        h.textContent = "SECTION " + sec + " — " + bySec[sec][0].secTitle;
        body.appendChild(h);
        bySec[sec].forEach(t => {
          const r = document.createElement("button"); r.className = "t-row";
          r.innerHTML = escapeHtml(t.term) + "<small>" + escapeHtml(t.def.slice(0, 42)) + "…</small>";
          r.addEventListener("click", () => { showView("search"); $q.value = t.term; renderSearch(t.term); window.scrollTo({top:0}); });
          body.appendChild(r);
        });
      });
    } else {
      const d = document.createElement("div"); d.className = "empty"; d.style.padding = "18px";
      d.textContent = "この章は次回アップデートで収録予定です。";
      body.appendChild(d);
    }
    box.appendChild(body);
    head.addEventListener("click", () => box.classList.toggle("open"));
    root.appendChild(box);
  });
})();

/* ================= 学習履歴(正誤記録) ================= */
function recordAnswer(id, correct){
  const h = store.get(K("hist"), {});
  const e = h[id] || { o: 0, x: 0 };
  correct ? e.o++ : e.x++;
  h[id] = e; store.set(K("hist"), h);
  if(!correct){ srsDemote(id); } // 間違えた用語はカード復習キューへ
  updateDueBadge();
}

/* ================= クイズビュー ================= */
const quizArea = document.getElementById("quizArea");
let quizState = null;
function quizSetup(){
  quizState = null;
  quizArea.textContent = "";
  const wrap = document.createElement("div"); wrap.className = "setup";
  const best = store.get(K("best"), null);
  wrap.innerHTML = '<h2>出題範囲を選択</h2>';
  const chips = document.createElement("div"); chips.className = "chips";
  const avail = [...new Set(DATA.terms.map(t => t.ch))].sort((a,b)=>a-b);
  const sel = new Set(store.get(K("quizSel"), avail));
  avail.forEach(ch => {
    const c = document.createElement("button"); c.className = "chip" + (sel.has(ch) ? " on" : ""); c.type = "button";
    c.textContent = ch === 0 ? "Prologue" : "第" + ch + "章";
    c.addEventListener("click", () => {
      sel.has(ch) ? sel.delete(ch) : sel.add(ch);
      c.classList.toggle("on");
      store.set(K("quizSel"), [...sel]);
    });
    chips.appendChild(c);
  });
  wrap.appendChild(chips);
  const info = document.createElement("p"); info.className = "hint";
  info.textContent = "選択範囲からランダムに10問出題。選択肢の順序もシャッフルされます。" + (best !== null ? " ベストスコア: " + best + "/10" : "");
  wrap.appendChild(info);
  const go = document.createElement("button"); go.className = "btn block"; go.textContent = "クイズを開始";
  go.addEventListener("click", () => {
    const pool = DATA.terms.filter(t => sel.has(t.ch) && t.quiz);
    if(pool.length < 4){ info.textContent = "出題範囲を1つ以上選択してください。"; return; }
    startQuiz(pool);
  });
  wrap.appendChild(go);

  // 弱点復習
  const h = store.get(K("hist"), {});
  const weak = DATA.terms.filter(t => h[t.id] && h[t.id].x > 0 && h[t.id].x >= h[t.id].o);
  if(weak.length){
    const wbtn = document.createElement("button"); wbtn.className = "btn ghost block";
    wbtn.textContent = "苦手な用語だけ復習 (" + weak.length + "語)";
    wbtn.addEventListener("click", () => startQuiz(weak));
    wrap.appendChild(wbtn);
  }
  quizArea.appendChild(wrap);
}
function shuffle(a){ a = a.slice(); for(let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function startQuiz(pool){
  const qs = shuffle(pool).slice(0, 10);
  quizState = { qs, i: 0, score: 0 };
  renderQ();
}
function renderQ(){
  const s = quizState;
  if(s.i >= s.qs.length) return quizDone();
  const t = s.qs[s.i];
  quizArea.textContent = "";
  const w = document.createElement("div"); w.className = "qwrap";
  w.innerHTML = '<div class="qmeta"><span class="mono">Q' + (s.i + 1) + ' / ' + s.qs.length + '</span><span>' + escapeHtml(chLabel(t)) + ' ' + escapeHtml(t.secTitle) + '</span></div>'
    + '<p class="qq">' + escapeHtml(t.quiz.q) + '</p>';
  const order = shuffle(t.quiz.c.map((c, i) => i));
  const exp = document.createElement("div"); exp.className = "exp";
  const next = document.createElement("button"); next.className = "btn block"; next.style.display = "none";
  next.textContent = s.i === s.qs.length - 1 ? "結果を見る" : "次の問題へ";
  const btns = [];
  order.forEach((orig, pos) => {
    const b = document.createElement("button"); b.className = "opt";
    b.textContent = String.fromCharCode(65 + pos) + ". " + t.quiz.c[orig];
    b.addEventListener("click", () => {
      btns.forEach(o => o.disabled = true);
      const ok = orig === t.quiz.a;
      btns[order.indexOf(t.quiz.a)].classList.add("correct");
      if(!ok) b.classList.add("wrong");
      if(ok) s.score++;
      recordAnswer(t.id, ok);
      exp.innerHTML = "<b>" + (ok ? "正解 ✓" : "不正解") + "</b> — " + escapeHtml(t.quiz.exp);
      exp.classList.add("show");
      next.style.display = "block";
    });
    btns.push(b); w.appendChild(b);
  });
  w.appendChild(exp); w.appendChild(next);
  next.addEventListener("click", () => { s.i++; renderQ(); window.scrollTo({top:0}); });
  quizArea.appendChild(w);
}
function quizDone(){
  const s = quizState;
  const best = store.get(K("best"), 0);
  if(s.qs.length === 10 && s.score > best) store.set(K("best"), s.score);
  quizArea.textContent = "";
  const w = document.createElement("div");
  w.innerHTML = '<div class="scorebig">' + s.score + ' <span style="font-size:1.1rem;color:var(--muted)">/ ' + s.qs.length + '</span></div>'
    + '<p class="center">' + (s.score === s.qs.length ? "全問正解。仕上がっています。" : s.score >= s.qs.length * 0.7 ? "合格圏。間違えた用語はカードに追加済みです。" : "間違えた用語がカード復習キューに追加されました。") + '</p>';
  const again = document.createElement("button"); again.className = "btn block"; again.textContent = "もう一度";
  again.addEventListener("click", quizSetup);
  const toSrs = document.createElement("button"); toSrs.className = "btn ghost block"; toSrs.textContent = "カードで復習する";
  toSrs.addEventListener("click", () => showView("srs"));
  w.appendChild(again); w.appendChild(toSrs);
  quizArea.appendChild(w);
}

/* ================= SRS(ライトナー3箱) =================
   box1: 毎日 / box2: 2日ごと / box3: 4日ごと
   わかる→昇格 / わからない→box1へ                         */
const DAY = 86400000;
const BOX_IV = { 1: 0, 2: 2 * DAY, 3: 4 * DAY };
function srsGet(){ return store.get(K("srs"), {}); }
function srsSet(v){ store.set(K("srs"), v); }
function srsState(id){
  const s = srsGet();
  return s[id] || { box: 1, last: 0 };
}
function srsDemote(id){
  const s = srsGet(); s[id] = { box: 1, last: 0 }; srsSet(s);
}
function dueTerms(){
  const now = Date.now();
  return DATA.terms.filter(t => {
    const st = srsState(t.id);
    return now - st.last >= BOX_IV[st.box];
  });
}
function updateDueBadge(){
  const n = dueTerms().length;
  const b = document.getElementById("dueBadge");
  b.style.display = n ? "inline-block" : "none";
  b.textContent = n > 99 ? "99+" : n;
}
const srsArea = document.getElementById("srsArea");
function srsHome(){
  srsArea.textContent = "";
  const s = srsGet();
  const counts = { 1: 0, 2: 0, 3: 0 };
  DATA.terms.forEach(t => counts[srsState(t.id).box]++);
  const due = dueTerms();
  const w = document.createElement("div"); w.className = "stat";
  w.innerHTML = '<h2>フラッシュカード(間隔反復)</h2>'
    + '<div class="boxbar"><div><b>' + counts[1] + '</b>Box1 毎日</div><div><b>' + counts[2] + '</b>Box2 2日毎</div><div><b>' + counts[3] + '</b>Box3 4日毎</div></div>'
    + '<p class="hint">今日の復習対象: ' + due.length + '語。「わかる」で箱が上がり出題間隔が延び、「わからない」でBox1に戻ります。</p>';
  const go = document.createElement("button"); go.className = "btn block";
  go.textContent = due.length ? "復習を始める (" + due.length + "語)" : "今日の復習は完了 🎉";
  go.disabled = !due.length;
  go.addEventListener("click", () => startSrs(shuffle(due)));
  w.appendChild(go);
  srsArea.appendChild(w);
}
function startSrs(queue){
  let i = 0;
  function next(){
    if(i >= queue.length){ srsHome(); updateDueBadge(); return; }
    const t = queue[i];
    srsArea.textContent = "";
    const meta = document.createElement("p"); meta.className = "hint mono";
    meta.textContent = (i + 1) + " / " + queue.length + "  ·  " + chLabel(t) + "  ·  Box" + srsState(t.id).box;
    srsArea.appendChild(meta);
    const card = document.createElement("div"); card.className = "flash";
    let flipped = false;
    function renderFace(){
      card.textContent = "";
      if(!flipped){
        const d = document.createElement("div"); d.className = "fterm"; d.textContent = t.term;
        const n = document.createElement("div"); n.className = "tapnote"; n.textContent = "タップして答えを表示";
        card.appendChild(d); card.appendChild(n);
      } else {
        const d = document.createElement("div"); d.className = "fdef";
        d.textContent = t.def;
        card.appendChild(d);
        if(t.points && t.points[0]){
          const p = document.createElement("div"); p.className = "tapnote"; p.style.textAlign = "left";
          p.textContent = "▸ " + t.points[0];
          card.appendChild(p);
        }
      }
    }
    card.addEventListener("click", () => { flipped = !flipped; renderFace(); });
    renderFace();
    srsArea.appendChild(card);
    const btns = document.createElement("div"); btns.className = "srsbtns";
    const ng = document.createElement("button"); ng.className = "btn ng-btn"; ng.textContent = "わからない";
    const ok = document.createElement("button"); ok.className = "btn ok-btn"; ok.textContent = "わかる";
    ng.addEventListener("click", () => { grade(false); });
    ok.addEventListener("click", () => { grade(true); });
    function grade(pass){
      const s = srsGet();
      const cur = srsState(t.id);
      s[t.id] = pass
        ? { box: Math.min(3, cur.box + 1), last: Date.now() }
        : { box: 1, last: Date.now() };
      srsSet(s);
      i++; next();
    }
    btns.appendChild(ng); btns.appendChild(ok);
    srsArea.appendChild(btns);
  }
  next();
}

/* ================= まとめビュー ================= */
(function(){
  const root = document.getElementById("sumArea");
  Object.keys(DATA.summaries).map(Number).sort((a,b)=>a-b).forEach(ch => {
    const s = DATA.summaries[ch];
    const box = document.createElement("div"); box.className = "sum";
    box.innerHTML = '<h3><span class="n mono">' + (ch === 0 ? "P" : "CH" + String(ch).padStart(2, "0")) + '</span>' + escapeHtml(s.title) + '</h3>'
      + '<ul>' + s.points.map(p => "<li>" + escapeHtml(p) + "</li>").join("") + '</ul>';
    root.appendChild(box);
  });
})();

/* ================= タブ切替 ================= */
function showView(name){
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === "view-" + name));
  document.querySelectorAll("nav.tabbar button").forEach(b => b.classList.toggle("on", b.dataset.v === name));
  if(name === "quiz" && !quizState) quizSetup();
  if(name === "srs") srsHome();
}
document.querySelectorAll("nav.tabbar button").forEach(b => b.addEventListener("click", () => showView(b.dataset.v)));

/* ================= 初期化 ================= */
document.getElementById("hdrCount").textContent = DATA.terms.length + "語収録 · " + APP_VERSION + (store.persistent ? "" : " · 一時保存モード");
renderSearch("");
updateDueBadge();

/* PWA: Service Worker(同一オリジンのみ) */
if("serviceWorker" in navigator && location.protocol === "https:"){
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
