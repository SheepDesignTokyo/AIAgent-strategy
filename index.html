<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- ゼロトラスト設計: 外部リソース依存ゼロ / ネットワーク接続は同一オリジンのみ / インラインデータのみで完結 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#12161C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AIX即答ナビ">
<title>AIエージェント・ストラテジスト 即答ナビ</title>
<style>
:root{
  --bg:#12161C; --surface:#1B222B; --surface2:#232C37; --line:#2E3947;
  --ink:#E9EDF2; --muted:#93A1B0; --faint:#5E6B7A;
  --amber:#E4A93C; --amber-dim:#8A6A2C; --steel:#7FA6C9;
  --ok:#5FBF87; --ng:#D96B6B;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
  line-height:1.65; padding-bottom:calc(64px + env(safe-area-inset-bottom));
  min-height:100vh;
}
.mono{font-family:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.06em}
header.app{
  padding:calc(14px + env(safe-area-inset-top)) 18px 12px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
}
header.app h1{font-size:1.02rem;font-weight:700;letter-spacing:.02em}
header.app h1 b{color:var(--amber);font-weight:800}
header.app .count{font-size:.72rem;color:var(--muted)}
main{max-width:720px;margin:0 auto;padding:14px 14px 30px}
.view{display:none}
.view.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.view.active{animation:none}}

/* ---- 即答検索 (signature) ---- */
.searchbox{position:relative;margin:6px 0 14px}
.searchbox input{
  width:100%;padding:16px 46px 16px 18px;font-size:1.05rem;
  background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);
  color:var(--ink);outline:none;
}
.searchbox input:focus{border-color:var(--amber)}
.searchbox input::placeholder{color:var(--faint)}
.searchbox .clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;border:none;background:transparent;
  color:var(--faint);font-size:1.1rem;display:none;cursor:pointer;
}
.hint{font-size:.78rem;color:var(--faint);margin:0 4px 10px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{
  font-size:.78rem;padding:6px 12px;border-radius:999px;
  background:var(--surface);border:1px solid var(--line);color:var(--muted);cursor:pointer;
}
.chip:active{border-color:var(--amber);color:var(--amber)}

/* ---- term card ---- */
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 16px 14px;margin-bottom:12px;
}
.card .eyebrow{font-size:.68rem;color:var(--steel);margin-bottom:4px}
.card h3{font-size:1.06rem;font-weight:700;line-height:1.4}
.card .yomi{font-size:.74rem;color:var(--faint);margin:2px 0 8px}
.card .def{font-size:.9rem;color:var(--ink)}
.card .pts{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.card .pts li{
  list-style:none;font-size:.84rem;color:var(--muted);
  padding-left:16px;position:relative;margin-bottom:7px;
}
.card .pts li::before{content:"▸";position:absolute;left:0;color:var(--amber)}
.rel{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.rel span{
  font-size:.72rem;color:var(--steel);border:1px solid var(--line);
  padding:3px 9px;border-radius:999px;cursor:pointer;
}
.card .qtoggle{
  margin-top:12px;width:100%;padding:9px;border-radius:10px;border:1px solid var(--line);
  background:var(--surface2);color:var(--muted);font-size:.8rem;cursor:pointer;
}
.card .qbody{display:none;margin-top:10px}
.card .qbody.open{display:block}
.empty{color:var(--faint);text-align:center;padding:36px 10px;font-size:.88rem}
mark{background:transparent;color:var(--amber);font-weight:700}

/* ---- 辞典 ---- */
.chap{margin-bottom:10px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden}
.chap>button{
  width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:none;border:none;color:var(--ink);font-size:.92rem;font-weight:700;text-align:left;cursor:pointer;
}
.chap>button .n{color:var(--amber);font-size:.78rem;min-width:2.2em}
.chap>button .c{margin-left:auto;color:var(--faint);font-size:.74rem;font-weight:400}
.chap .body{display:none;border-top:1px solid var(--line)}
.chap.open .body{display:block}
.chap .sec-h{font-size:.7rem;color:var(--steel);padding:10px 16px 4px}
.chap .t-row{
  display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
  padding:9px 16px;color:var(--ink);font-size:.88rem;border-bottom:1px solid rgba(46,57,71,.45);
}
.chap .t-row:last-child{border-bottom:none}
.chap .t-row small{display:block;color:var(--faint);font-size:.7rem}

/* ---- quiz ---- */
.qwrap .qmeta{font-size:.74rem;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:10px}
.qq{font-size:.96rem;font-weight:700;margin-bottom:14px;line-height:1.6}
.opt{
  display:block;width:100%;text-align:left;margin-bottom:9px;padding:13px 14px;
  background:var(--surface);border:1.5px solid var(--line);border-radius:12px;
  color:var(--ink);font-size:.88rem;cursor:pointer;line-height:1.55;
}
.opt.correct{border-color:var(--ok);background:rgba(95,191,135,.1)}
.opt.wrong{border-color:var(--ng);background:rgba(217,107,107,.1)}
.opt:disabled{opacity:.92}
.exp{
  margin-top:12px;padding:12px 14px;border-radius:12px;background:var(--surface2);
  border-left:3px solid var(--amber);font-size:.84rem;color:var(--muted);display:none;
}
.exp.show{display:block}
.exp b{color:var(--ink)}
.btn{
  display:inline-block;padding:13px 22px;border-radius:12px;border:none;cursor:pointer;
  background:var(--amber);color:#191300;font-weight:700;font-size:.92rem;
}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn.block{display:block;width:100%;text-align:center;margin-top:12px}
.scorebig{font-size:2.6rem;font-weight:800;color:var(--amber);text-align:center;margin:16px 0 4px}
.center{text-align:center;color:var(--muted);font-size:.86rem}
.setup h2,.stat h2{font-size:.95rem;margin:16px 0 10px;color:var(--ink)}
.setup .chips .chip.on{border-color:var(--amber);color:var(--amber)}

/* ---- SRS card ---- */
.flash{
  background:var(--surface);border:1px solid var(--line);border-radius:18px;
  min-height:250px;padding:24px 20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;cursor:pointer;
}
.flash .fterm{font-size:1.3rem;font-weight:800}
.flash .fdef{font-size:.88rem;color:var(--muted);text-align:left}
.flash .tapnote{margin-top:16px;font-size:.72rem;color:var(--faint)}
.srsbtns{display:flex;gap:10px;margin-top:14px}
.srsbtns .btn{flex:1;padding:15px 0}
.srsbtns .ng-btn{background:var(--surface);border:1.5px solid var(--ng);color:var(--ng)}
.srsbtns .ok-btn{background:var(--surface);border:1.5px solid var(--ok);color:var(--ok)}
.boxbar{display:flex;gap:8px;margin:10px 0 16px}
.boxbar div{
  flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;
  padding:8px 4px;text-align:center;font-size:.7rem;color:var(--muted);
}
.boxbar div b{display:block;font-size:1rem;color:var(--ink)}

/* ---- summary ---- */
.sum{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sum h3{font-size:.95rem;margin-bottom:10px}
.sum h3 .n{color:var(--amber);font-size:.74rem;margin-right:8px}
.sum li{list-style:none;font-size:.84rem;color:var(--muted);padding-left:16px;position:relative;margin-bottom:8px}
.sum li::before{content:"—";position:absolute;left:0;color:var(--steel)}
.note{font-size:.74rem;color:var(--faint);margin:14px 4px;line-height:1.7}

/* ---- tabbar ---- */
nav.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(18,22,28,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
}
nav.tabbar button{
  flex:1;background:none;border:none;color:var(--faint);
  padding:9px 0 8px;font-size:.66rem;cursor:pointer;
}
nav.tabbar button .ic{display:block;font-size:1.15rem;margin-bottom:2px}
nav.tabbar button.on{color:var(--amber)}
nav.tabbar button:focus-visible,.btn:focus-visible,.opt:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.badge{
  display:inline-block;min-width:16px;padding:0 4px;border-radius:8px;
  background:var(--amber);color:#191300;font-size:.62rem;font-weight:800;vertical-align:top;
}
</style>
</head>
<body>
<header class="app">
  <h1><b>AIX</b> 即答ナビ <span class="mono" style="font-size:.66rem;color:var(--faint)">AI AGENT STRATEGIST</span></h1>
  <span class="count" id="hdrCount"></span>
</header>
<main>
  <!-- 検索 -->
  <section class="view active" id="view-search">
    <div class="searchbox">
      <input id="q" type="search" placeholder="何でも聞いてください(用語・概念・略語)" autocomplete="off" enterkeyhint="search" aria-label="用語検索">
      <button class="clear" id="qClear" aria-label="クリア">×</button>
    </div>
    <div class="chips" id="quickChips"></div>
    <p class="hint" id="searchHint"></p>
    <div id="results"></div>
  </section>

  <!-- 辞典 -->
  <section class="view" id="view-dict">
    <div id="dict"></div>
  </section>

  <!-- クイズ -->
  <section class="view" id="view-quiz">
    <div id="quizArea"></div>
  </section>

  <!-- カード(SRS) -->
  <section class="view" id="view-srs">
    <div id="srsArea"></div>
  </section>

  <!-- まとめ -->
  <section class="view" id="view-sum">
    <div id="sumArea"></div>
    <p class="note">収録範囲は順次拡大中です。学習データはこの端末内(localStorage)にのみ保存され、外部送信は一切ありません。</p>
  </section>
</main>

<nav class="tabbar" role="tablist">
  <button data-v="search" class="on"><span class="ic">⌕</span>検索</button>
  <button data-v="dict"><span class="ic">▤</span>辞典</button>
  <button data-v="quiz"><span class="ic">✓</span>クイズ</button>
  <button data-v="srs"><span class="ic">▣</span>カード<span class="badge" id="dueBadge" style="display:none"></span></button>
  <button data-v="sum"><span class="ic">☰</span>まとめ</button>
</nav>

<script>
"use strict";
/* ================= データ(ビルド時埋め込み・改変不可の静的データ) ================= */
const DATA = {"terms":[{"id":"ai-phase-model","term":"AI発展の3フェーズ","yomi":"えーあいはってんのさんふぇーず","aliases":["作るAI","使うAI","任せるAI","フェーズ1","フェーズ2","フェーズ3"],"ch":0,"sec":"00","secTitle":"はじめに","def":"AIの発展を「作るAI(〜2022年ごろ)」「使うAI(2022年〜)」「任せるAI(2024年〜進行中)」の3段階で捉えるフレームワーク。技術の変化だけでなく「誰が主役か」という構造変化を描く点が特徴。作るAIの主役は研究者・データサイエンティスト、使うAIの主役は一般ビジネスパーソン、任せるAIの主役はAIエージェント。","points":["フェーズ1「作るAI」: 専門家が設計・構築。AI活用の壁は技術の壁で、経営層はIT投資の一種と見なしていた","フェーズ2「使うAI」: ChatGPT公開(2022年11月)を境に誰もが使える時代へ。プロンプト設計やAI人材育成が経営課題に。多くの組織はまだこのフェーズの途上","フェーズ3「任せるAI」: 人間が目標を与えるとAIが自律的にタスク分解・ツール呼び出し・判断・実行する。本資格が扱うのはこのフェーズ","現在地は「使うAI」の成熟期から「任せるAI」の黎明期への境界点"],"related":["ai-agent","tool-vs-agent","agi"],"quiz":{"q":"AI発展の3フェーズの説明として最も適切なものはどれか。","c":["フェーズの区分は技術の性能向上のみを基準としている","「作るAI」の時代はAIリテラシーがあれば誰でもAIの恩恵を受けられた","「任せるAI」では人間が目標を与えるとAIが自律的にタスクを分解し実行する","3フェーズは同時に終了し、現在はすべて過去のものである"],"a":2,"exp":"3フェーズは「誰が主役か」という構造変化を描く。フェーズ3「任せるAI」ではAIが目標に向かって自律的に計画・実行する。誰でも使えるようになったのはフェーズ2以降。"}},{"id":"agi","term":"AGI(汎用人工知能)","yomi":"えーじーあい","aliases":["Artificial General Intelligence","汎用人工知能"],"ch":0,"sec":"00","secTitle":"はじめに","def":"特定分野に特化した現在の「専門AI」に対し、料理・経営判断・芸術創作・医療診断など幅広い課題を人間と同等にこなせるAIの概念。「なんでもできる」の判断基準そのものが研究者間でも一致しておらず、定義が定まっていない点が重要。","points":["現在のAIは画像認識・文章生成など特定分野に特化した専門AI","AGIの定義・判定基準は研究者の間でも一致していない","身体性(embodiment)の問題: 言語や概念の理解は身体的経験と切り離せないという身体化認知論の立場からは、身体を持たないAIが真の知能を持てるかは哲学的な問い","ロボット工学との融合なしに本質的なAGIは実現しないと論じる研究者も多い"],"related":["asi","ai-phase-model"],"quiz":{"q":"AGIに関する記述として最も適切なものはどれか。","c":["AGIの定義と判定基準は国際標準として確立している","AGIとは特定分野で人間を上回る専門特化型AIを指す","「何をもってなんでもできると判断するか」の基準が定まっておらず、定義自体が研究者間でも一致していない","身体性の問題はAGIの議論とは無関係である"],"a":2,"exp":"AGIは「人間と同じように何でもこなせるAI」の概念だが、その判定基準は未確立。身体化認知論の観点から身体性の問題も哲学的論点となっている。"}},{"id":"asi","term":"ASI(人工超知性)","yomi":"えーえすあい","aliases":["Artificial Superintelligence","人工超知性","超知能"],"ch":0,"sec":"00","secTitle":"はじめに","def":"AGIのさらに先にある概念で、あらゆる面で人間をはるかに超える知能を指す。AGIが「人間と同等」であるのに対し、ASIは天才科学者が一生かけて解けなかった問題を数秒で解くような存在。AGIの実現自体が不確かな現状では、さらに遠い仮説の領域にある。","points":["AGI=人間と同等、ASI=人間をはるかに超える、という関係を区別する","ストラテジストはAGI・ASIを夢物語として退けず、確定した近未来としても語らず、「不確実性の高い長期シナリオ」として冷静に参照する態度が求められる","向き合うべき問いは「AGIはいつ来るか」ではなく「任せるAIの時代を人間と組織はどう設計するか」"],"related":["agi","ai-phase-model"],"quiz":{"q":"AGI・ASIに対するAIエージェント・ストラテジストの適切な態度はどれか。","c":["SFの世界の話なので業務では一切参照しない","確定した近未来として経営計画の前提に組み込む","不確実性の高い長期シナリオとして冷静に参照する","ASIが実現してからAI導入を検討する"],"a":2,"exp":"夢物語として退けることも確定的前提として語ることも不適切。不確実性の高い長期シナリオとして参照しつつ、目の前の「任せるAI」の設計に向き合うのがストラテジストの態度。"}},{"id":"strategist-three-pillars","term":"ストラテジストの3本柱","yomi":"すとらてじすとのさんぼんばしら","aliases":["AIエージェント×業務設計×組織設計","3本柱"],"ch":0,"sec":"00","secTitle":"はじめに","def":"AIエージェント・ストラテジストの核心能力を構成する3要素。①AIエージェント(仕組みと限界を理解し関係者に説明できる)、②業務設計(業務を構造的に分析しAI前提で作り直す)、③組織設計(現場と技術を橋渡ししAIが根づく仕組みを作る)。どれか1つだけでは不足で、掛け合わせが本質。","points":["技術がわかっても業務がわからなければ的外れな導入になる","業務がわかっても組織が動かなければ定着しない","「使う人」ではなく「導入する人」を育てるのが本資格の狙い","生成AI導入企業の約7割が期待した成果が出ていないと回答し、その大半は技術以外の課題(適用業務の選定、現場の不使用、効果測定、法務調整など)"],"related":["ai-phase-model","obsolescence-risk"],"quiz":{"q":"AIエージェント・ストラテジストに求められる能力の説明として最も適切なものはどれか。","c":["高度なプログラミングスキルとモデル開発能力が最重要である","AIエージェント・業務設計・組織設計の3つを掛け合わせて導入を主導する能力である","AIツールの操作方法を社員に教えるスキルがあれば十分である","法務知識のみを深く持つことが求められる"],"a":1,"exp":"3本柱(AIエージェント×業務設計×組織設計)の掛け合わせが核心。技術・業務・組織のどれか1つだけでは導入は成功しない。"}},{"id":"text-structure","term":"テキストの学習構造","yomi":"てきすとのがくしゅうこうぞう","aliases":["知識→業務シナリオ→理解度チェック","学習マップ"],"ch":0,"sec":"01","secTitle":"本テキストの読み方","def":"公式テキストの各Sectionは「知識→業務シナリオ→理解度チェック」の流れで構成される。各章の冒頭で共通シナリオ(例: 第1〜2章は社内ITヘルプデスクAI)が提示され、学んだ知識を実務の判断に結びつける設計になっている。","points":["章別シナリオ: 第1-2章=社内ITヘルプデスクAI、第3章=AIデータリテラシー、第4章=営業提案書の自動生成AI、第5章=請求書処理AI(組織受容)、第6章=採用スクリーニングAI(5Dモデル)","概念理解で終わらせず「自分ならどう設計するか」「どこにリスクがあるか」「誰に何を確認すべきか」を考えながら読む"],"related":["strategist-three-pillars"],"quiz":{"q":"公式テキストの各Sectionの構成として正しいものはどれか。","c":["理論→歴史→暗記事項","知識→業務シナリオ→理解度チェック","事例→用語集→過去問","導入→開発→運用"],"a":1,"exp":"各Sectionは「知識→業務シナリオ→理解度チェック」で構成され、章ごとの共通シナリオに知識を当てはめて実務判断を学ぶ。"}},{"id":"generative-ai","term":"生成AI","yomi":"せいせいえーあい","aliases":["Generative AI","ジェネレーティブAI"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"入力された内容をもとにテキストや画像などの新しい出力を生み出せるAI。従来の画像認識・音声認識AIが「予測」「識別」に焦点を当てていたのに対し、データのパターンや関係を学習して新しい出力を生成できる点が特徴。テキスト・画像・音声・音楽・プログラム・動画など多様な形式に対応する。","points":["従来AI=予測・識別中心、生成AI=新しい出力の生成","真のインパクトは「非構造化データの活用」: 従来のDXは行と列で整理された構造化データが中心だったが、議事録・企画書・チャットなど文章そのものを処理できるようになった","企業に眠るデータの8割以上は非構造化データと言われる","現在の実務では分類(識別)処理も生成AIで高精度にこなせるため、分類と生成の両方をLLMで処理するのが主流"],"related":["llm","unstructured-data-advantage","machine-learning"],"quiz":{"q":"生成AIが従来のAIと比べて真にインパクトをもたらした点として、最も適切なものはどれか。","c":["構造化データの集計速度が向上した","議事録やチャットなどの非構造化データを処理できるようになった","計算資源を一切使わずに動作するようになった","ハルシネーションが完全になくなった"],"a":1,"exp":"従来のDXが扱えたのは行と列の構造化データが中心。生成AIにより企業データの8割以上を占める非構造化データ(文章そのもの)に手が届くようになったことが最大の変化。"}},{"id":"machine-learning","term":"機械学習","yomi":"きかいがくしゅう","aliases":["マシンラーニング","ML"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"コンピューターが大量のデータからパターンやルールを自動的に学習し、その結果に基づいて予測や判断を行うAIの中核技術。人間が明示的な手順をすべてプログラミングするのではなく、データに基づいて自ら進化する点が特徴。主な手法に教師あり学習・教師なし学習・強化学習がある。","points":["教師あり学習: 正解データ(入力と期待される出力のペア)で学習。問い合わせ分類や画像認識など識別タスクに利用","教師なし学習: 正解を与えずデータの構造や隠れたパターンを発見。顧客セグメンテーション(クラスタリング)などに利用","強化学習: 環境の中で試行錯誤を繰り返し、報酬を最大化する行動を学習","従来の予測・識別型AIの多くは機械学習の手法で開発されてきた"],"related":["deep-learning","generative-ai"],"quiz":{"q":"顧客データを正解ラベルなしでグループ分け(セグメンテーション)したい。適切な機械学習の手法はどれか。","c":["教師あり学習","教師なし学習","強化学習","ルールベース処理"],"a":1,"exp":"正解を与えずにデータそのものの構造やパターンを発見するのは教師なし学習。クラスタリングによる顧客セグメンテーションが代表例。"}},{"id":"deep-learning","term":"ディープラーニング","yomi":"でぃーぷらーにんぐ","aliases":["深層学習","ニューラルネットワーク"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"機械学習の一種で、人間の脳の神経回路を模した「ニューラルネットワーク」を多層化(深く)したモデルを用いる手法。最大のブレイクスルーは特徴量の自動抽出であり、従来は人間が設計していた特徴量を、非構造化データから自動で学習・抽出できる。LLM成立の技術的基盤。","points":["従来の機械学習では「これは猫の耳だ」といった特徴量を人間が設計する必要があった","ディープラーニングは非構造化データから特徴量を自動抽出できる","この能力によりLLMは数千億の文章パターンを学習し、文脈理解や論理的推論といった高度な能力を獲得した","生成AIの「非構造化データの活用」を可能にした技術的基盤"],"related":["machine-learning","llm","unstructured-data-advantage"],"quiz":{"q":"ディープラーニングの最大のブレイクスルーとして最も適切なものはどれか。","c":["計算コストを完全にゼロにしたこと","特徴量を人間が設計せずとも自動抽出できるようになったこと","ハルシネーションを根絶したこと","ルールベース処理を高速化したこと"],"a":1,"exp":"従来の機械学習では人間が特徴量を設計する必要があった。ディープラーニングは非構造化データから特徴量を自動で学習・抽出でき、これがLLM成立の基盤となった。"}},{"id":"llm","term":"大規模言語モデル(LLM)","yomi":"だいきぼげんごもでる","aliases":["Large Language Model","LLM"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"生成AIの中核技術。インターネット上などの膨大なテキストから言語のパターンを学習し、「この文脈の次に来る最も自然な言葉は何か」を確率的に予測する。この予測の繰り返しで文章全体を生成する。数千億の文章パターン学習の結果、文脈理解・論理的推論・要約・翻訳・コード生成まで「予測」の延長で実現した。","points":["動作原理は「次の言葉の確率的予測の繰り返し」というシンプルなもの","確率的に動作するため、出力には常に不確実性が伴う(ハルシネーションの構造的要因)","どのLLMを選ぶかがエージェント全体のコスト・精度・速度を決める(三位一体の「頭脳」)"],"related":["generative-ai","hallucination","token","context-window","trinity-model"],"quiz":{"q":"LLMの基本的な動作原理として最も適切なものはどれか。","c":["データベースから完全一致する回答を検索して返す","文脈の次に来る最も自然な言葉を確率的に予測し、それを繰り返す","事前に人間が書いたルールに従って文字列を組み立てる","毎回インターネットを検索して回答を取得する"],"a":1,"exp":"LLMは膨大なテキストから学習した言語パターンに基づき、次に来る言葉を確率的に予測することを繰り返して文章を生成する。この確率的な性質がハルシネーションの構造的要因でもある。"}},{"id":"hallucination","term":"ハルシネーション","yomi":"はるしねーしょん","aliases":["幻覚","Hallucination"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"AIが事実ではない情報を、あたかも正しいかのように生成してしまう現象。日本語では「幻覚」。AIは「正しいことを言う」のではなく「次に来る自然な言葉を確率的に選ぶ」仕組みのため、知らないことを「知らない」と言う代わりにもっともらしい言葉をつなげてしまう。AIの欠陥ではなく、現在の言語モデルが持つ構造的な特性。","points":["自信たっぷりに流暢な文章で出力されるため、専門外の分野では誤りに気づきにくい","対策の基本: 出力を鵜呑みにしない、重要な情報は一次ソースで確認する","設計面の対策はRAGによるグラウンディング(事実データに基づく回答)と出典明示","完全になくすことは難しい前提で管理する(信頼性リスクの代表例)","関連する特性として、AIは主観と客観を区別できず、主観的な問いにも事実を述べるような口調で答える"],"related":["llm","rag-basic","reliability-risk"],"quiz":{"q":"ハルシネーションの本質的な原因として最も適切なものはどれか。","c":["学習データ量が少なすぎるため","LLMが次に来る自然な言葉を確率的に選ぶ仕組みであり、知らないことでももっともらしい言葉をつないでしまうため","開発者が意図的に虚偽を出力させているため","ネットワーク障害により正しいデータを取得できないため"],"a":1,"exp":"ハルシネーションは確率的生成という構造に由来する特性であり、意図的な虚偽でも単なるバグでもない。完全な根絶は難しく、RAGや出典明示、人間の確認と組み合わせて管理する。"}},{"id":"token","term":"トークン","yomi":"とーくん","aliases":["token","従量課金","API費用"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"LLMがテキストを処理する際の最小単位。入力テキストはトークンに分割されてから処理される。英語では約1単語=1トークンだが、日本語は1文字〜数文字で1トークンとなるため、同じ意味の文章でも日本語の方がトークン数が多くなる傾向がある。業務システムへのLLM組み込みではAPI利用料がトークン数に応じた従量課金となるため、コスト構造に直結する。","points":["個人利用は月額サブスクで済むが、業務システム組み込みではトークン従量課金が一般的","「1回の処理で何トークン消費し、月間いくらかかるか」を見積もれることがストラテジストの基本スキル","日本語は英語よりトークン数が多くなる傾向","処理件数が増えるほどコストが積み上がる"],"related":["context-window","api-cost-estimation","llm"],"quiz":{"q":"業務システムに組み込んだLLMのAPI費用を見積もる際の基本的な考え方はどれか。","c":["月額固定なので処理件数は考慮不要","1回あたりのトークン消費量と月間処理件数から従量課金として見積もる","APIは無料なので見積もり不要","トークン数はコストと無関係である"],"a":1,"exp":"LLMのAPI利用料はトークン数に応じた従量課金。1回あたりのトークン消費量×処理件数で月間コストを概算できることがストラテジストの基本スキル。"}},{"id":"context-window","term":"コンテキストウィンドウ","yomi":"こんてきすとうぃんどう","aliases":["context window","一度に渡せる量の上限"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"LLMに一度に渡せるトークンの上限。かつては上限が小さく必要な情報を入力しきれない制約があったが、現在の主要モデルでは大幅に拡大し制約はほぼ解消。ただし「入る」ことと「入れるべき」は別で、全文を毎回入力するとトークン消費が跳ね上がりコストが膨らむため、必要な部分だけを検索して渡すRAGの設計が合理的。","points":["例: 75,000トークンの社内マニュアルを毎回全文入力すると月間コストが数十倍に膨らむ","「必要な情報だけを検索して渡す」仕組みがRAG","RAGの精度はデータの整備・蓄積に依存する。議事録や業務資料を長年蓄積してきた企業とそうでない企業では活用の質に大差がつく","AIエージェントの性能はモデル選定だけで決まらず、自社独自データの質と量が競争優位の源泉"],"related":["token","rag-basic","llm"],"quiz":{"q":"約75,000トークンの社内マニュアルをAIエージェントに参照させる設計として最も適切なものはどれか。","c":["コンテキストウィンドウが拡大したので毎回全文を入力する","RAGで関連箇所だけを検索・抽出して渡す","マニュアルの要約だけを参照させ原文は使わない","LLMの事前学習の一般知識だけで対応する"],"a":1,"exp":"全文入力はコストが数十倍に膨らむ。要約のみでは詳細が失われ、事前学習に社内固有情報は含まれない。RAGで必要箇所だけ原文から取得するのがコストと精度を両立する現実解。"}},{"id":"unstructured-data-advantage","term":"非構造化データの活用","yomi":"ひこうぞうかでーたのかつよう","aliases":["非構造化データ","構造化データ"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"生成AIが従来の自動化技術に対して決定的な優位を持つ領域。構造化データ(行と列で整理された売上データや顧客リスト)に対し、非構造化データは議事録・企画書・メール・チャット・自由記述テキストなど。企業に眠るデータの8割以上が非構造化データとされ、ここに手が届くようになったのが生成AI最大の変化。","points":["従来のDX・RPAが得意なのは構造化データと定型フォーマット","メール・チャット・自由記述の処理はLLMによる文脈理解が必要","RPAとの使い分け判断基準「入力が定型か」に直結する概念"],"related":["generative-ai","rpa","routine-vs-judgment"],"quiz":{"q":"LLMが従来の自動化技術に対して決定的な優位を持つ領域はどれか。","c":["CSVファイルの高速転記","定型帳票の読み取り","自由記述テキストなど非構造化データの処理","固定フォーマットのデータ入力"],"a":2,"exp":"CSVや定型帳票などの構造化・定型データはルールベース自動化が得意。メールや自由記述などの非構造化データの文脈理解こそLLMの決定的な優位領域。"}},{"id":"model-routing","term":"モデルルーティング","yomi":"もでるるーてぃんぐ","aliases":["モデルの使い分け","難易度で振り分け"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"タスクの難易度に応じてLLMのグレードを振り分ける設計パターン。単純な分類処理には軽量・低コストのLLM、文脈理解や文章構成が求められる回答生成には高性能LLMを割り当てることで、コストと品質を両立させる。","points":["1つの業務には識別的な処理と生成的な処理が混在するのが普通。まずタスクの性質を分解・整理するのが出発点","現在の実務では分類も生成もどちらもLLMで処理するのが主流(別々の専用AIシステムを作ると開発・保守コストが過大)","発展形: FAQには通常モデルやSLM、複雑なトラブルシューティングには推論モデル、と使い分ける"],"related":["llm","slm","reasoning-model","api-cost-estimation"],"quiz":{"q":"問い合わせ対応業務に「分類処理」と「回答文の生成処理」が含まれる場合のモデル構成として、現在の実務で最も一般的な方針はどれか。","c":["分類は識別AI、生成はLLMと、別々の専用システムを構築する","どちらもLLMで処理し、難易度に応じて軽量モデルと高性能モデルを使い分ける","すべて最高性能のモデルで統一する","分類処理はAI化できないため人間が行う"],"a":1,"exp":"現在はLLMが分類も高精度にこなせるため、両方をLLMで処理しつつ、分類には軽量モデル・生成には高性能モデルを割り当てるモデルルーティングが一般的。"}},{"id":"api-cost-estimation","term":"API費用の概算","yomi":"えーぴーあいひようのがいさん","aliases":["費用見積もり","月間コスト試算"],"ch":1,"sec":"01","secTitle":"生成AIの基礎","def":"「1件あたりの入出力トークン×月間件数×単価」でLLMのAPI費用を見積もる基本スキル。テキストのヘルプデスク例では月500件・1件あたり入力約2,500トークン(問い合わせ文+RAG取得FAQ+システムプロンプト)・出力約500トークンで、月間約$4.50(約700円)と試算される。","points":["入力側の内訳: 問い合わせ文+RAGで取得した参照情報+システムプロンプト","API費用は意外と安いが、AIエージェントの総コストは構築費用とランニングコストの方がはるかに大きい","API費用だけを見て「安い」と判断せず、TCO(総所有コスト)で見積もる","料金は変動するため最新の公式ドキュメントを参照する"],"related":["token","tco","roi"],"quiz":{"q":"AIエージェントのコストに関する記述として最も適切なものはどれか。","c":["API費用が総コストの大半を占めるためAPI費用だけで投資判断できる","API費用は安価でも、構築費用やランニングコストを含めたTCOで判断する必要がある","API費用は月額固定である","コストの見積もりはエンジニアの仕事でありストラテジストには不要である"],"a":1,"exp":"API費用はコスト全体のごく一部。初期構築、ナレッジ整備・更新、プロンプト改善、監視・保守の人件費などを含めたTCOで投資判断する。"}},{"id":"ai-agent","term":"AIエージェント","yomi":"えーあいえーじぇんと","aliases":["AI Agent","エージェント"],"ch":1,"sec":"02","secTitle":"AIエージェントの定義と構成要素","def":"人間の指示を受けて、自律的に考え・判断し・行動することができるAIシステム。従来の生成AIが質問に答えるだけの1往復のやり取りだったのに対し、目標を与えれば到達までの計画立案・ツール使用・実行・修正を自分で繰り返せる点が大きな違い。「回答を生成する」だけでなく「実際にアクションを起こせる」点がチャットAIとの最大の違い。","points":["AIがすべてを自律的に判断するわけではない。人間とAIの役割分担を設計し、業務の中で安全に活用できる形にすることが重要","目標を与えると、自ら計画を立て、情報を集め、外部ツールを操作し、結果に応じて次のアクションを決める一連のプロセスを自律的に回す"],"related":["trinity-model","tool-vs-agent","autonomy-levels","generative-ai"],"quiz":{"q":"チャットAIとAIエージェントの最大の違いとして最も適切なものはどれか。","c":["AIエージェントは日本語に対応している点","回答を生成するだけでなく、外部システムを操作して実際にアクションを起こせる点","AIエージェントはハルシネーションを起こさない点","AIエージェントは学習データが不要な点"],"a":1,"exp":"チャットAIは回答を返す1往復で終わるが、AIエージェントは計画・ツール操作・実行・修正を自律的に繰り返し、実際のアクションまで遂行できる。"}},{"id":"tool-vs-agent","term":"ツールとしてのAI活用/エージェントとしてのAI活用","yomi":"つーるとしてのえーあいかつよう","aliases":["ツール活用","エージェント活用","道具としてのAI"],"ch":1,"sec":"02","secTitle":"AIエージェントの定義と構成要素","def":"特定の作業をAIに肩代わりさせる使い方が「ツールとしてのAI活用」、業務プロセス全体を自律的に推進させる使い方が「エージェントとしてのAI活用」。試験全体を通じて繰り返し登場する最も基本的な概念区分。","points":["例(経費精算): 領収書の分類だけ頼む=ツール活用。領収書画像から内容読み取り→カテゴリ判断→申請書作成→上長への承認依頼送信まで一気に行う=エージェント活用","ツール活用では後続作業(申請書作成・承認依頼など)が人間の手作業として残る"],"related":["ai-agent","ai-phase-model"],"quiz":{"q":"「エージェントとしてのAI活用」に該当するものはどれか。","c":["議事録の要約を毎回依頼する","領収書画像の送付だけで、読み取り・分類・申請書作成・承認依頼送信までAIが一気に行う","メール文面の誤字チェックを頼む","翻訳を1件ずつ依頼する"],"a":1,"exp":"1つの作業の肩代わりはツール活用。業務プロセス全体(読み取り→判断→作成→送信)を自律的に進めるのがエージェント活用。"}},{"id":"trinity-model","term":"三位一体モデル(頭脳・記憶・手足)","yomi":"さんみいったいもでる","aliases":["頭脳","記憶","手足","構成要素"],"ch":1,"sec":"02","secTitle":"AIエージェントの定義と構成要素","def":"AIエージェントを「頭脳・記憶・手足」の3つの構成要素に分解して理解するモデル。頭脳=LLM(指示の理解・判断・推論エンジン)、記憶=ナレッジベース(業務マニュアル・FAQ・過去の対応履歴などの社内情報参照)、手足=ツール連携(メール送信・DB更新・ファイル生成など外部システム操作)。","points":["頭脳が欠ける→ルール通りに動くだけの自動化ツール","記憶が欠ける→社内固有情報を持たず汎用的な回答しかできない/毎回ゼロからのやり取り","手足が欠ける→「考えて終わり」。回答は生成できても実システムを操作できず、高機能なFAQ検索ツール止まり","どのLLMを選ぶかがエージェント全体のコスト・精度・速度を決める"],"related":["ai-agent","llm","mcp","rag-basic"],"quiz":{"q":"LLMで問い合わせを理解しFAQデータベースから回答を生成するが、送信は担当者が手動でコピー&ペーストしている。三位一体モデルでの説明として適切なものはどれか。","c":["3要素がすべて揃った完成形である","頭脳と記憶は備えているが手足が欠けている","記憶が欠けているため回答精度が低い","頭脳が欠けているため判断ができない"],"a":1,"exp":"理解・生成=頭脳、FAQ参照=記憶は揃っているが、送信という外部システム操作=手足が欠けており、手動作業が残るため自動化は不完全。"}},{"id":"autonomy-levels","term":"自律性の4段階","yomi":"じりつせいのよんだんかい","aliases":["反応型","支援型","協働型","自律型","自律性レベル"],"ch":1,"sec":"02","secTitle":"AIエージェントの定義と構成要素","def":"人間がどこまで関与するかによるAIエージェントの自律性の分類。①反応型(入力に即座に反応するだけ。例: 翻訳)、②支援型(AIが案を提示し最終決定は必ず人間)、③協働型(定型はAIが自動実行、複雑な案件は人間へエスカレーション)、④自律型(目標を与えれば計画から実行まで自律的に完遂)。現時点の実務では支援型〜協働型が主流。","points":["支援型と協働型の見分けポイント: AIエージェントが最終判断を含む意思決定を自ら行っているか","いきなり全自動を目指さず、段階的に任せる範囲を広げるのが実務の鉄則(例: 支援型で1ヶ月運用→FAQ回答精度95%以上を確認→FAQのみ協働型へ)","自律型は技術的に可能でも判断ミスのリスクが大きく、業務の重要度に応じて段階的に引き上げる"],"related":["ai-agent","irreversibility","trigger-types"],"quiz":{"q":"「すべての問い合わせにAIが回答案を生成し担当者確認後に送信する案A」と「定型問い合わせはAIが自動送信し複雑な案件のみ担当者に引き継ぐ案B」の自律性レベルの組み合わせはどれか。","c":["案A=反応型、案B=支援型","案A=支援型、案B=協働型","案A=協働型、案B=自律型","案A=支援型、案B=自律型"],"a":1,"exp":"案Aは最終送信判断を必ず人間が行うため支援型。案Bは定型案件でAIが判断から送信まで自律的に行い、残りを人間に委ねるため協働型。"}},{"id":"irreversibility","term":"「何を任せないか」の判断(不可逆性)","yomi":"なにをまかせないかのはんだん","aliases":["不可逆的な操作","やり直しがきくか","任せない判断"],"ch":1,"sec":"02","secTitle":"AIエージェントの定義と構成要素","def":"AIエージェント設計では「何を任せるか」と同じくらい「何を任せないか」の判断が重要。判断基準は「やり直しがきくかどうか」。誤って在籍者のアカウントを削除するような不可逆的な操作を伴う業務は、自律性レベルに関わらず必ず人間の確認を挟む設計にする。","points":["例: 会議室の予約方法の案内=誤っても実害ほぼなし。全社通知の発信・アカウント削除=取り消し困難で人間の確認必須","セキュリティインシデント時の影響範囲判断と全社通知は、判断ミスの影響が甚大なため人間が主導すべき","リスクの大小で任せる範囲を切り分けることがストラテジストの設計判断"],"related":["autonomy-levels","risk-categories"],"quiz":{"q":"AIエージェントに任せる対象として最も不適切な業務はどれか。","c":["FAQ問い合わせへの回答案生成","問い合わせメールのカテゴリ分類","セキュリティ問題発生時の影響範囲判断と全社通知の発信","毎朝の未処理チケットの一覧化と通知"],"a":2,"exp":"セキュリティインシデント対応は判断ミスの影響が甚大で全社通知は取り消し困難。不可逆な判断を伴う業務は人間が主導する。他は誤りがあっても影響が限定的か修正可能。"}},{"id":"trigger-types","term":"起動タイプ(指示型・定時型・条件型)","yomi":"きどうたいぷ","aliases":["指示型","定時型","条件型","トリガー"],"ch":1,"sec":"03","secTitle":"AIエージェントの起動タイプ","def":"AIエージェントが「何をきっかけに動くか」の分類。①指示型: 人間がリアルタイムに指示(チャット質問・ボタンクリック)。②定時型: 設定した時刻に自動動作(毎朝8時のニュース要約など)。③条件型: 特定の出来事の発生がきっかけ(在庫が一定数を下回ったら発注書生成、メール受信を検知して分類・回答など)。","points":["指示型と条件型の見分け: AIエージェントに直接依頼したかどうか。CRMへのリード登録をシステムが検知してメールドラフトを作るのは条件型(担当者はCRM登録をしただけでAIに依頼していない)","定時型は実行タイミングと処理内容が固定されているため導入効果を測定・比較しやすく、初期導入や効果検証に向く","1つのエージェントが場面ごとに複数の起動タイプで動くのは実務で一般的","条件型は現場に追加作業を発生させず通常業務フローに溶け込むため、形骸化リスク対策としても有効"],"related":["ai-agent","autonomy-levels","obsolescence-risk"],"quiz":{"q":"CRMに新規リードが登録されたタイミングで自動的にウェルカムメールのドラフトが作成される。この起動タイプはどれか。","c":["指示型(担当者の登録操作がきっかけのため)","定時型","条件型(システム上のイベント発生がきっかけのため)","自律型"],"a":2,"exp":"担当者が行ったのはCRMへのデータ登録であり、AIエージェントへの直接依頼ではない。登録というイベントをシステムが検知して起動するため条件型。指示型との見分けは「直接依頼したか」。"}},{"id":"trigger-autonomy-combo","term":"起動タイプ×自律性レベルの組み合わせ設計","yomi":"きどうたいぷとじりつせいのくみあわせ","aliases":["独立した設計判断","組み合わせ設計"],"ch":1,"sec":"03","secTitle":"AIエージェントの起動タイプ","def":"起動タイプ(いつ動くか)と自律性レベル(どこまで自律的に動くか)は独立した設計判断であり、業務の場面ごとに最適な組み合わせを選ぶ。例: メール対応=条件型×協働型(FAQは自動回答、他はエスカレーション)、チャット対応=指示型×支援型(回答案生成、担当者確認後送信)。","points":["条件型だから自律型、のような固定的な対応関係はない","複数の起動タイプを同時に実装するのではなく、インパクトの大きい業務から優先順位をつけて段階導入する","導入の各段階で現場の声を拾い、次のステップに反映する"],"related":["trigger-types","autonomy-levels"],"quiz":{"q":"条件型で起動し、定型処理はAIが自動実行、複雑な処理は担当者にエスカレーションする設計の説明として適切なものはどれか。","c":["起動タイプは条件型、自律性レベルは支援型","起動タイプは条件型、自律性レベルは協働型","条件型なら自律性レベルは必ず自律型になる","条件型で自動実行することは技術的に不可能"],"a":1,"exp":"起動タイプと自律性レベルは独立した設計判断。定型はAIが自律実行し複雑な案件を人間に委ねる役割分担は協働型。"}},{"id":"rpa","term":"RPA","yomi":"あーるぴーえー","aliases":["Robotic Process Automation","ロボティックプロセスオートメーション"],"ch":1,"sec":"04","secTitle":"RPAとAIエージェントの違い","def":"Robotic Process Automationの略。人間がマウスやキーボードで行う操作を記録・再現し、定型作業をルールベースで自動実行するソフトウェア。人間が定義した手順を高速・正確に繰り返すが、自分で状況を理解・判断・推論することは苦手で、想定外の入力や画面変更、例外処理で止まる。「決まった仕事を自動化する職人」。","points":["ルールが正しければ100%正確に動く(AIエージェントは確率的に動作しハルシネーションのリスクがある)","「AIエージェントの方が常に優れている」わけではなく、業務の性質に応じた使い分けが必要","例: フォーマット固定の請求書処理はRPA向き。取引先ごとにフォーマットが異なる場合は文脈から金額欄を推測できるAIエージェント向き"],"related":["routine-vs-judgment","hyperautomation","ai-agent"],"quiz":{"q":"RPAとAIエージェントの本質的な違いとして最も適切なものはどれか。","c":["処理速度の違いのみである","思考や解釈を行う能力の有無に集約される","RPAの方が常に正確性で劣る","AIエージェントはルールベースで動作する"],"a":1,"exp":"違いは「思考や解釈を行う能力の有無」。RPAはルール通りに100%正確に動くが判断はできない。AIエージェントは文脈から判断できるが確率的動作でハルシネーションのリスクを持つ。"}},{"id":"routine-vs-judgment","term":"定型処理か判断処理かの3基準","yomi":"ていけいしょりかはんだんしょりか","aliases":["使い分け基準","ルールベース自動化"],"ch":1,"sec":"04","secTitle":"RPAとAIエージェントの違い","def":"業務をAI化する前に「ルールベースの自動化で十分ではないか」を問うための判断基準。①例外的な判断が必要か(手順が完全定義でき例外不要ならルールベースで十分)、②入力が定型か(CSV・定型帳票はルールベース、メール・チャット・自由記述はLLM)、③例外の頻度(例外が頻発する業務でルールベースを使うと停止のたびに人間が介入し工数が増える)。","points":["手順・条件が完全に決まっている作業(例: パスワード期限チェックと定型メール送信、退職者の権限一括無効化)は定型処理向き","文脈理解や総合判断が必要な作業(例: 自由記述クレームの緊急度判定、PC不調の原因切り分け、エラー画面画像からの原因回答)はAI処理向き","すべてをAIエージェント化する必要はない。AIエージェントを使うこと自体が目的化しないよう注意"],"related":["rpa","hyperautomation","unstructured-data-advantage"],"quiz":{"q":"ルールベースの自動化ではなくAIエージェントによる処理が必要な業務はどれか。","c":["月次売上CSVの基幹システムへの転記","自由記述のクレームメールを読み取り緊急度を判定して振り分ける","全社員のライセンス期限チェックとリマインド送信","マニュアル手順通りの新入社員アカウント一括作成"],"a":1,"exp":"自由記述は非構造化データであり、緊急度判定には文脈理解と総合判断が必要。他は手順が完全に定義でき判断不要な定型業務でルールベースで十分。"}},{"id":"hyperautomation","term":"ハイパーオートメーション","yomi":"はいぱーおーとめーしょん","aliases":["Hyperautomation","いいとこ取り"],"ch":1,"sec":"04","secTitle":"RPAとAIエージェントの違い","def":"1つの業務プロセスに混在する「ルール通りにやればいいステップ」と「判断が必要なステップ」を切り分け、それぞれに最適な技術(定型処理/AI処理)を割り当てるアプローチ。AIエージェントが「読み取り・判断」を、定型処理が「システム操作」を担当する組み合わせであり、RPAをAIに置き換えるものではない。","points":["受注処理の例: ①メールから発注書取得=定型、②内容読み取り・品目/数量/納期の抽出=AI(取引先ごとにフォーマットが異なるため)、③在庫照合と納期判断=AI、④受注管理システムへの登録=定型、⑤確認メール送信=定型","すべてをAIに任せると定型処理にまでハルシネーションのリスクを持ち込み、かえって精度が下がり得る","既存業務をそのまま自動化するのではなく、AIエージェント前提で業務プロセス自体を再設計する発想が重要(紙の回付をRPAで再現しても非効率は残る。デジタル完結フローに組み替えれば効果が大きい)"],"related":["rpa","routine-vs-judgment","bpr"],"quiz":{"q":"ハイパーオートメーションの説明として最も適切なものはどれか。","c":["RPAをAIエージェントに完全に置き換えるアプローチ","定型処理の正確さとAIの柔軟な判断を組み合わせ、業務プロセス全体を自動化するアプローチ","AIエージェントがRPAの動作を自律的に設計・管理する仕組み","すべての処理をAIエージェントに任せて精度を高める手法"],"a":1,"exp":"ハイパーオートメーションは置き換えではなく組み合わせ。各ステップの性質を見極め、定型部分にはルールベース自動化、判断部分にはAIを割り当てる。"}},{"id":"api","term":"API","yomi":"えーぴーあい","aliases":["Application Programming Interface"],"ch":1,"sec":"05","secTitle":"エージェントの接続標準 MCP","def":"あるソフトウェアが別のソフトウェアの機能を呼び出すための窓口。例えばSlackにメッセージを送るにはSlack APIに投稿リクエストを送る。ツールごとに専用の窓口があり、窓口ごとに「注文の書き方」が異なるため、複数ツール接続時には開発者が接続ごとにコードを書き、どの場面でどのAPIを呼ぶかのルーティングも事前設計する必要がある。","points":["AIエージェントの「手足」を実現する基盤概念","API連携はAIと他サービスをつなぐ「配管工事」に例えられる","ツールごとの個別実装の負担がMCP登場の背景"],"related":["mcp","trinity-model"],"quiz":{"q":"APIの説明として最も適切なものはどれか。","c":["AIモデルの学習アルゴリズムの名称","あるソフトウェアが別のソフトウェアの機能を呼び出すための窓口","ネットワークケーブルの規格","データベースの暗号化方式"],"a":1,"exp":"APIはソフトウェア間の機能呼び出しの窓口。ツールごとに専用の窓口と流儀があり、個別実装の負担がM×N問題につながる。"}},{"id":"mcp","term":"MCP(Model Context Protocol)","yomi":"えむしーぴー","aliases":["Model Context Protocol","接続標準"],"ch":1,"sec":"05","secTitle":"エージェントの接続標準 MCP","def":"AIエージェントと外部ツールの接続を共通規格で行えるようにする仕組み。2024年11月にAnthropicがオープン標準として公開。APIが「ツールごとに専用の窓口」なのに対し、MCPは窓口フォーマットを共通化する。USBがプリンター・キーボード・カメラの端子を統一したのと同じ発想。APIを置き換えるのではなく、APIの上に共通フォーマットを被せて機能する。","points":["価値は2つ: ①接続の標準化によるM×N問題の解消、②LLMによるツール選択の自動化","Claude、ChatGPT、各種IDEのAIプラグインで対応が拡大し、MCPサーバーも多数公開","誰でも作成・公開できるオープンな仕組みのため、信頼できない提供元のMCPはセキュリティリスク。提供元の信頼性確認が必須"],"related":["api","mxn-problem","tool-selection-auto","security-ethics-risk"],"quiz":{"q":"MCPの説明として最も適切なものはどれか。","c":["APIを完全に置き換える技術であり、MCP導入後はAPIが不要になる","接続の標準化とツール選択の自動化を実現する共通規格で、APIの上に共通フォーマットを被せて機能する","APIとまったく同じ概念の別名である","接続先が何個でも個別API連携の方が常に効率的である"],"a":1,"exp":"MCPはAPIの置き換えではなく、APIの上に共通規格を被せるもの。M×N問題の解消とツール選択の自動化が2大価値。"}},{"id":"mxn-problem","term":"M×N問題","yomi":"えむかけるえぬもんだい","aliases":["MN問題","組み合わせ爆発"],"ch":1,"sec":"05","secTitle":"エージェントの接続標準 MCP","def":"M個のAIモデルとN個の外部ツールを個別接続すると、組み合わせの数(M×N)だけ連携処理の開発・保守が必要になる問題。例: モデル3種×ツール5種=15通り。MCPでは各モデル・各ツールがMCPに対応するだけでよく、3+5=8通りで済む。モデルや接続先が増えるほど差が拡大する。","points":["ストラテジストにとっての意味は「将来の拡張コスト」への直結","判断基準は「今後の拡張計画があるかどうか」。接続先が増える見込みやLLM切り替えの可能性があるなら、初期コストがやや高くてもMCP標準化が合理的","拡張予定がなく接続先が固定的なら個別APIで十分","「今は3つだから個別APIでいい」と拡張計画を確認せず判断→半年後に大幅な手戻り、は実務でよくある失敗パターン"],"related":["mcp","api"],"quiz":{"q":"AIモデル3種類と外部ツール5種類を接続する場合、個別API連携とMCP利用で必要な接続数の組み合わせとして正しいものはどれか。","c":["個別API=8通り、MCP=15通り","個別API=15通り、MCP=8通り","どちらも15通り","どちらも8通り"],"a":1,"exp":"個別接続はM×N=3×5=15通り。MCPなら各モデル・ツールがMCP対応するだけでM+N=3+5=8通りで済む。数が増えるほど差が拡大する。"}},{"id":"tool-selection-auto","term":"ツール選択の自動化","yomi":"つーるせんたくのじどうか","aliases":["ルーティングの自動化"],"ch":1,"sec":"05","secTitle":"エージェントの接続標準 MCP","def":"MCPのもう1つの重要な特徴。APIベース開発では「この場面ではこのAPIを呼ぶ」というルーティングロジックを開発者が事前にコードで定義する必要があるが、MCPでは対応ツールを接続しておくだけでLLMが「今どんなツールが使えるか」を動的に認識し、依頼に応じてどのツールを呼び出すかをLLM自身が判断する。","points":["例:「来週の会議を設定して、参加者にSlackで通知して、議題をドキュメントに残して」→カレンダーMCP・Slack MCP・ドキュメントMCPからAIが自動選択し一連のアクションを実行。ユーザーはツール指定不要","接続の標準化と合わせて、構築・保守コスト低減と柔軟な業務対応を実現する"],"related":["mcp","mxn-problem"],"quiz":{"q":"MCPにおける「ツール選択の自動化」の説明として適切なものはどれか。","c":["開発者が事前に書いたルーティングコードが高速化される","LLMが利用可能なツールを動的に認識し、依頼内容に応じて呼び出すツールを自ら判断する","ユーザーが毎回ツールを指定する必要がある","ツールの選択は必ずランダムに行われる"],"a":1,"exp":"APIベースでは開発者が場面ごとの呼び出しロジックを事前定義するが、MCPではLLMが使えるツールを動的に把握し自ら選択・組み合わせて実行する。"}},{"id":"architect-communication","term":"アーキテクトへ伝える3つの情報","yomi":"あーきてくとへつたえるみっつのじょうほう","aliases":["橋渡し","接続方式の判断材料"],"ch":1,"sec":"05","secTitle":"エージェントの接続標準 MCP","def":"接続方式の技術設計はアーキテクトの仕事だが、ストラテジストは判断に必要なビジネス情報を整理して渡す役割を担う。伝えるべきは①接続先ツールの一覧と今後の追加予定、②LLM切り替えの可能性(コスト削減・性能向上のためのモデル変更予定)、③ワークフローツールの選定状況(MCP対応コネクタの有無と接続方式は連動)。","points":["ストラテジストの役割は「技術を決めること」ではなく「技術判断に必要なビジネス情報を整理して渡すこと」","技術仕様書の準備やソースコードの理解はアーキテクト/エンジニアの領域"],"related":["mcp","mxn-problem","strategist-three-pillars"],"quiz":{"q":"ストラテジストがアーキテクトに接続方式の設計を依頼する際、事前に整理して伝えるべき最も重要な情報はどれか。","c":["MCPの技術仕様書とAPIドキュメント","接続先ツールの現在の一覧、今後の追加予定、LLM切り替えの可能性","LLMのソースコードとパラメータ設定","競合他社が採用している接続方式の調査結果"],"a":1,"exp":"アーキテクトの判断に必要なのは「何とつなぐか、今後増えるか、モデルは変わり得るか」。技術仕様書はアーキテクト自身が参照するもの。"}},{"id":"quantitative-merit","term":"定量的メリット/定性的メリット","yomi":"ていりょうてきめりっと","aliases":["定量的メリット","定性的メリット","導入の価値"],"ch":1,"sec":"06","secTitle":"AIエージェント導入の価値","def":"AIエージェントの価値を整理する2つの軸。定量的メリットは数値で測定できる価値(工数削減時間、人件費削減額、エラー率低下など)。定性的メリットは数値化しにくいが見逃せない価値で、代表は①顧客体験の向上(24時間365日の即時対応、回答のばらつき解消)と②従業員体験の向上(反復的な定型業務から解放され高度な問題解決や創造的業務に時間を使える)。","points":["経営層への説明では定量的メリットが説得力を持つが、現場の担当者には「自分の仕事がどう楽になるか」という定性的メリットの方が響く。同じ価値を相手に合わせて語り分ける","経営層への報告の基本形は「定量的メリット・定性的メリット・リスクと対策」の3点セット。リスクに触れない報告は信頼を損なう"],"related":["roi","tco","risk-categories"],"quiz":{"q":"AIエージェントの導入効果を経営層に報告する際の最も適切な構成はどれか。","c":["API費用が安価であることを中心に報告する","定量的メリット・定性的メリット・リスクと対策の3点をセットで報告する","競合他社の導入事例だけを提示して導入を提案する","定量的メリットのみを詳細に示しリスクには触れない"],"a":1,"exp":"報告の基本形は定量・定性・リスクの3点セット。API費用中心はTCOの観点が欠け、リスクに触れないのは信頼を損なう。"}},{"id":"roi","term":"ROI(投資対効果)","yomi":"あーるおーあい","aliases":["Return on Investment","投資対効果","投資回収期間"],"ch":1,"sec":"06","secTitle":"AIエージェント導入の価値","def":"Return on Investmentの略。投じたお金に対してどれだけのリターンが得られたかを示す指標。テキストのヘルプデスク例では、月142時間(約42.5万円/月、年約510万円)の工数削減効果に対し1年目TCOを300万円と見積もると、ROI=(510−300)÷300×100≒約70%、投資回収期間は300万円÷42.5万円/月≒約7か月。","points":["ROIを正しく計算するにはコスト側をTCOで正確に見積もることが前提","2年目以降は初期構築費用が減るため、同水準の効果が続けばROIは改善しやすい","ROIの数字だけで投資判断を完結させない。定量的メリット・定性的メリット・リスクの3つを総合的に評価する"],"related":["tco","quantitative-merit","api-cost-estimation"],"quiz":{"q":"AIエージェントの投資判断に関する記述として最も適切なものはどれか。","c":["ROIが高ければ他の要素は考慮不要である","ROIの計算にはTCOによる正確なコスト見積もりが前提であり、定性的メリットとリスクも含めて総合的に判断する","投資回収期間は計算できないため考慮しない","ROIは売上のみから計算する"],"a":1,"exp":"ROIの数字だけで判断を完結させず、TCOで正確にコストを見積もった上で、定量・定性・リスクの3点を総合評価するのがストラテジストの姿勢。"}},{"id":"tco","term":"TCO(総所有コスト)","yomi":"てぃーしーおー","aliases":["Total Cost of Ownership","総所有コスト"],"ch":1,"sec":"06","secTitle":"AIエージェント導入の価値","def":"Total Cost of Ownershipの略。AIエージェントのコストはAPI利用料だけでなく、初期構築費用、ナレッジベースの整備・更新費用、プロンプト改善の工数、監視・保守の人件費など様々な費用が発生する。これらすべてを含めた総コストがTCO。","points":["API費用だけを見て「安い」と判断すると、運用開始後に「こんなにかかるとは聞いていない」という事態になる","実態としてAPI費用は総コストのごく一部で、構築費用とランニングコストの方がはるかに大きい"],"related":["roi","api-cost-estimation"],"quiz":{"q":"TCOの考え方として最も適切なものはどれか。","c":["TCOとはAPI利用料の年間合計額のことである","初期構築・ナレッジ整備・プロンプト改善・監視保守の人件費などを含めた総コストで見積もる","TCOはハードウェア費用のみを対象とする","TCOは導入後に計算すればよく、投資判断には不要である"],"a":1,"exp":"TCOはAPI費用に加え構築費・運用保守などすべてを含む総所有コスト。API費用だけで「安い」と判断するのは典型的な失敗パターン。"}},{"id":"risk-categories","term":"4つのリスクカテゴリー","yomi":"よっつのりすくかてごりー","aliases":["信頼性リスク","形骸化リスク","ブラックボックス化リスク","セキュリティ・倫理リスク"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"AIエージェント導入に伴うリスクの4分類。①信頼性リスク(回答や判断そのものが誤っている)、②形骸化リスク(導入しても現場で使われない)、③ブラックボックス化リスク(誰が管理しているか分からず運用実態を把握できない)、④セキュリティ・倫理リスク(不正利用、情報漏えい、偏り、不適切な判断)。問題の中心が精度・利用定着・管理体制・安全性/公平性のどこにあるかで分類する。","points":["4つのリスクは独立ではなく相互に影響する。信頼性リスク→形骸化→放置されてブラックボックス化、という連鎖が起き得る","対策は個別ではなく導入から運用まで一気通貫した全体設計として整理する","「リスクがあるから導入しない」ではなく「リスクを管理しながら小さな範囲から段階的に導入する」のが基本姿勢"],"related":["reliability-risk","obsolescence-risk","blackbox-risk","security-ethics-risk"],"quiz":{"q":"次の3つのリスクの分類として正しい組み合わせはどれか。X:存在しない社内規定を引用して回答した/Y:導入したが現場の大半が利用をやめた/Z:各部門が独自にエージェントを構築しIT部門が全体を把握できていない","c":["X=形骸化、Y=信頼性、Z=ブラックボックス化","X=信頼性、Y=形骸化、Z=セキュリティ・倫理","X=信頼性、Y=形骸化、Z=ブラックボックス化","X=セキュリティ・倫理、Y=ブラックボックス化、Z=形骸化"],"a":2,"exp":"Xは「AIが間違えた」=信頼性リスク、Yは「人が使わない」=形骸化リスク、Zは悪意や偏りではなく「管理体制の不在」=ブラックボックス化リスク。"}},{"id":"reliability-risk","term":"信頼性リスク","yomi":"しんらいせいりすく","aliases":["出力の誤り","精度リスク"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"AIエージェントの出力内容や判断結果が正確でないことによって生じるリスク。誤った情報を返す、必要な情報を見落とす、不適切な判断を行うなどが該当し、代表例がハルシネーション(存在しない社内規程や手続きを正式なルールのように示すなど)。","points":["対策①: RAGで社内文書を必ず参照させ、事実データに基づいて回答を生成させる(グラウンディング)","対策②: 「この回答はITマニュアル第○章に基づいています」のように出典を明示し、利用者自身が根拠を確認できるようにする","対策③: 自律性レベルの段階的引き上げ(支援型で運用→精度を十分確認→協働型へ)でリスクをコントロール"],"related":["hallucination","rag-basic","autonomy-levels","risk-categories"],"quiz":{"q":"信頼性リスク(ハルシネーション)への基本対策の組み合わせとして最も適切なものはどれか。","c":["利用の義務化と罰則の設定","RAGによる根拠付け・出典明示・自律性レベルの段階的引き上げ","AIエージェント台帳の整備のみ","高性能モデルへの切り替えのみ"],"a":1,"exp":"信頼性リスク対策の柱は、事実データに基づく回答生成(RAG)、利用者が確認できる出典明示、支援型から始める段階的な自律性引き上げの組み合わせ。"}},{"id":"obsolescence-risk","term":"形骸化リスク","yomi":"けいがいかりすく","aliases":["使われないリスク","定着しない"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"AIエージェントを導入したにもかかわらず、現場で十分に利用されない状態に陥るリスク。技術的に完成していても使われなければ効果はゼロ。原因は操作しにくい、回答精度が期待を下回る、業務の流れに合っていない、導入目的が利用者に伝わっていないなど様々。","points":["対策①: 現場に余計な作業を増やさない設計。条件型の起動タイプで通常業務フローに自然に溶け込ませ、「手間が増えるから使わない」を防ぐ","対策②: 月別・部門別の利用者数・利用回数・利用率を継続的にモニタリングし、低下時は原因分析。導入初期は週次でフィードバック収集","「何が使いにくいか」だけでなく、そもそも何を解決するために導入したのかという目的に立ち返る","義務化は一時的に利用率を上げても本質的な改善にならない。高性能モデルへの切り替えは原因が精度の場合にしか効かない"],"related":["trigger-types","risk-categories"],"quiz":{"q":"形骸化リスクへの対策として最も適切なものはどれか。","c":["LLMをより高性能なモデルに切り替える","利用を義務化する社内規則を作る","利用状況を定量的にモニタリングし、ユーザーフィードバックに基づいて改善する","AIエージェント台帳を整備する"],"a":2,"exp":"形骸化対策の基本は利用率の定量モニタリングと原因の特定・改善。モデル切り替えは原因が精度の場合のみ有効、義務化は本質的改善にならず、台帳はブラックボックス化対策。"}},{"id":"blackbox-risk","term":"ブラックボックス化リスク/野良エージェント","yomi":"ぶらっくぼっくすかりすく","aliases":["野良エージェント","AIエージェント台帳","管理不在"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"AIエージェントが組織内で十分に管理されないまま増え、誰が何を管理しているか、どのデータにアクセスしているか、誰が責任者かを把握できなくなるリスク。公式な管理の対象になっていないエージェントを「野良エージェント」と呼ぶ。問題発生時に原因や責任の所在を特定しにくく、セキュリティ事故や情報漏えいのリスクが高まる。","points":["対策: 「AIエージェント台帳」を作成し、全エージェントの利用目的・参照データ範囲・管理責任者・更新状況を記録・管理","四半期に1回などの定期棚卸で、使われていないエージェントの廃止や設定・セキュリティの確認を行う","例: IT部門以外の部署が独自にGPTsでFAQボットを構築し、把握されないエージェントが社内に10個以上、という状況が典型"],"related":["risk-categories","security-ethics-risk"],"quiz":{"q":"「野良エージェント」の説明として最も適切なものはどれか。","c":["応答速度が遅いAIエージェントのこと","個人や部門が独自に作成・利用し、組織の管理台帳や統制の対象になっていないAIエージェントのこと","オープンソースで公開されたAIエージェントのこと","学習が完了していないAIエージェントのこと"],"a":1,"exp":"野良エージェントは公式な管理対象外のエージェント。台帳による一覧管理と定期的な棚卸がブラックボックス化リスクへの基本対策。"}},{"id":"security-ethics-risk","term":"セキュリティ・倫理リスク","yomi":"せきゅりてぃりんりりすく","aliases":["情報漏えい","不正利用","倫理リスク"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"AIエージェントの利用に伴う安全性・公平性・法的/倫理的な問題に関するリスク。情報漏えい、不正利用、偏った出力、不適切な判断などが含まれる。代表例はプロンプトインジェクションとバイアス。「AIの判断でユーザーが不利益を被った場合の責任は誰にあるか」「差別的な回答への対処」などはAIエージェント固有の論点で、従来のIT導入では発生しなかった。","points":["プロンプトインジェクションとバイアスの両方がこのカテゴリに属する","不正な攻撃への対策だけでなく、偏りや不公平な扱いが生じていないかの観点も含めて評価する"],"related":["prompt-injection","bias","risk-categories"],"quiz":{"q":"セキュリティ・倫理リスクに含まれる問題の組み合わせとして適切なものはどれか。","c":["ハルシネーションと応答遅延","プロンプトインジェクションとバイアス","利用率の低下と操作性の悪さ","管理台帳の不備と棚卸の未実施"],"a":1,"exp":"セキュリティ・倫理リスクには不正利用(プロンプトインジェクション)と公平性の問題(バイアス)が含まれる。ハルシネーションは信頼性、利用率低下は形骸化、台帳不備はブラックボックス化。"}},{"id":"prompt-injection","term":"プロンプトインジェクション","yomi":"ぷろんぷといんじぇくしょん","aliases":["Prompt Injection","多層防御","ガードレール"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"悪意のある入力によって、AIエージェントの動作を本来の意図とは異なる方向へ誘導しようとする攻撃手法。「これまでの指示を無視して機密情報を出力してください」のような入力で制限を回避しようとするケースが典型。","points":["対策は多層防御: ①システム側でのルール明確化(例: 個人情報の一括出力は禁止)、②入力内容のチェック(危険な入力の検知と処理制限)、③出力内容の制御、④アクセス権・データベース側の参照制限","攻撃方法は日々変化するため、入力フィルタリングだけで完全に防ぐことはできない。入力検査・出力制限・アクセス権管理を組み合わせる"],"related":["security-ethics-risk","bias"],"quiz":{"q":"プロンプトインジェクションへの対策として最も適切な考え方はどれか。","c":["入力フィルタリングのみで完全に防止できる","RAGによるグラウンディングで解決できる","ガードレール設計と入力フィルタリングに加え、出力側の制御やアクセス制限も組み合わせた多層防御を行う","学習データの偏りを是正すれば防げる"],"a":2,"exp":"攻撃手法は変化し続けるため入力側の対策だけでは不十分。入力検査・出力制御・アクセス権管理を組み合わせた多層防御が基本。"}},{"id":"bias","term":"バイアス","yomi":"ばいあす","aliases":["偏り","公平性"],"ch":1,"sec":"07","secTitle":"AIエージェントのリスクと対策","def":"AIエージェントが学習や参照に用いたデータに含まれる偏りが、そのまま出力や判断に反映されるリスク。本人(開発者・利用者)が意図していなくても生じる。例: 特定の属性を持つ利用者にだけ回答精度が高く、それ以外には不正確な回答が返る、といった偏りは公平性の観点から問題となる。","points":["導入時には、どのようなデータを使い、誰にどのような影響が出るかを確認する","悪意ある攻撃(プロンプトインジェクション)とは異なり、偏りは意図せず生じる点が特徴"],"related":["security-ethics-risk","prompt-injection"],"quiz":{"q":"AIエージェントにおけるバイアスの説明として最も適切なものはどれか。","c":["悪意のある入力によって動作を誘導する攻撃のこと","学習・参照データに含まれる偏りが、意図せず出力や判断に反映されること","AIが事実でない情報をもっともらしく生成すること","AIエージェントが現場で使われなくなること"],"a":1,"exp":"バイアスはデータ由来の偏りが意図せず出力に反映される問題。攻撃はプロンプトインジェクション、事実でない生成はハルシネーション。"}},{"id":"three-trends","term":"生成AIの3つの進化軸","yomi":"みっつのしんかじく","aliases":["エージェント化","ドメイン特化","モデルの強化","発展トレンド"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"2026年以降の生成AIトレンドを整理する3つの大きな軸。①エージェント化(AIを「実行できる」ようにする)、②ドメイン特化(AIを「専門家」にする)、③モデルの強化(AIの「基礎能力」を上げる)。個々のニュースを追うのではなく、新しい動向がどの流れに位置づくかを整理して変化の意味を捉える。","points":["トレンドを用語として暗記するのではなく、「自社のこの業務にこのトレンドは使えるか?」という問いに答えられる状態が求められる理解レベル","モデルの強化はエージェント化・ドメイン特化が進むための前提となる基盤"],"related":["agentification","domain-specialization","model-enhancement","trend-criteria"],"quiz":{"q":"生成AIの発展トレンドを整理する3つの軸の組み合わせとして正しいものはどれか。","c":["高速化・小型化・低価格化","エージェント化・ドメイン特化・モデルの強化","クラウド化・オンプレ化・エッジ化","自動化・可視化・標準化"],"a":1,"exp":"3軸は「実行できるようにする」エージェント化、「専門家にする」ドメイン特化、「基礎能力を上げる」モデルの強化。新しいニュースをこの3軸のどれに位置づくかで整理する。"}},{"id":"agentification","term":"エージェント化","yomi":"えーじぇんとか","aliases":["実行できるAI","フィジカルAI","コンピュータ操作"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"AIが「回答する存在」から「業務を進める存在」へ広がるトレンド。支える技術は4つ: ①API連携(AIと他サービスをつなぐ配管工事)、②MCP(AIとシステムが会話する共通言語)、③コンピュータ・ブラウザ操作(AIがWebサイトを人間の代わりに操作し、情報収集・フォーム入力・予約などを自動化)、④フィジカルAI(自律性をデジタルから現実世界へ拡張し、工場ロボットや自動運転車として物理的に動く)。","points":["人間がシステムを操作しなければ進まなかった業務も自動化の再検討対象になる","AIの役割が「相談に答える」から「業務を実行する」へ広がり、人間の担当範囲や役割分担の見直しが必要になる"],"related":["three-trends","mcp","ai-agent"],"quiz":{"q":"エージェント化を支える技術として、AIの自律性を現実世界へ拡張し工場ロボットや自動運転として物理的に動くAIを指す用語はどれか。","c":["フィジカルAI","マルチモーダルAI","SLM","RAG"],"a":0,"exp":"フィジカルAIはエージェント化の潮流をデジタルの世界から現実世界へ拡張する概念。API連携・MCP・コンピュータ操作と並ぶエージェント化を支える技術の1つ。"}},{"id":"domain-specialization","term":"ドメイン特化","yomi":"どめいんとっか","aliases":["専門家AI","ファインチューニング","パーソナライズ","検索連携"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"汎用AIの「そこそこ知っている」では通用しない医療・法律・金融・製造などの領域に対し、AIに「専門家としての深さ」を持たせる動き。手段は4つ: ①RAG(回答前に専門データベースを参照)、②ファインチューニング(特定の知識や口調を追加学習。自社製品特化のサポートAIが典型)、③パーソナライズ(利用者ごとの行動・履歴・状況に応じて回答を調整)、④検索連携(Web上や外部の最新情報を取得しながら回答し、学習時点以降の情報を持たない弱点を補う)。","points":["今後は汎用AIと特化型AIを業務の性質に応じて使い分ける場面が増える","企業は自社のどの領域で専門性を高めたAIが必要かを整理し、特化の対象を見極めることが求められる"],"related":["three-trends","rag-basic"],"quiz":{"q":"ドメイン特化の4つの手段のうち、「特定の知識や口調をAIに追加学習させる方法」はどれか。","c":["RAG","ファインチューニング","パーソナライズ","検索連携"],"a":1,"exp":"ファインチューニングは追加学習による特化。RAGは回答前の参照、パーソナライズは利用者ごとの調整、検索連携は最新情報の取得。"}},{"id":"model-enhancement","term":"モデルの強化","yomi":"もでるのきょうか","aliases":["マルチモーダル","モデル規模の拡大","小型化・軽量化","推論能力"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"AIの基盤能力(理解・推論・処理速度・コスト効率)を高める動き。4つの方向で進む: ①モデル規模の拡大(パラメータ数・計算資源の増加。ただし大きくすればよいわけではなく、質の高い学習データと効率的な学習手法も重要)、②マルチモーダル化(文字に加え画像・音声・動画・数値データをまとめて扱う)、③小型化・軽量化(SLM。小さく速く低コスト)、④推論能力の強化(問題を段階的に整理しながら答えを導く)。","points":["モデル性能の向上により、AIエージェントに任せられる業務の範囲が広がる","「現時点でできること」だけでなく今後の性能向上も踏まえて導入・活用の方向性を考える"],"related":["three-trends","slm","reasoning-model","multimodal"],"quiz":{"q":"モデルの強化が進む4つの方向に含まれないものはどれか。","c":["モデル規模の拡大","マルチモーダル化","小型化・軽量化","学習データの完全な不要化"],"a":3,"exp":"4方向はモデル規模の拡大・マルチモーダル化・小型化/軽量化・推論能力の強化。学習データが不要になるという方向性はなく、むしろ質の高い学習データの重要性が増している。"}},{"id":"multimodal","term":"マルチモーダルAI","yomi":"まるちもーだるえーあい","aliases":["画像入力","音声入力","複数モダリティ"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"文字だけでなく画像・音声・動画・数値データなど複数形式の情報をまとめて扱えるようにするモデル強化の方向性。図面を見て問題点を指摘する、会議の録音を要約する、エラー画面のスクリーンショットから原因を回答するなど、文字中心だったAIの活用範囲を広げる。","points":["導入判断は「自社の業務に該当する入力データがあるか」が第一基準。検品写真を毎日数百枚目視チェックする品質管理部門なら優先度大、画像を扱う場面がなければ優先度低","優先度が高くても技術トレンドに飛びつかず、まず限定範囲でPoCを実施して精度を検証してから展開判断するのが実務の鉄則"],"related":["model-enhancement","trend-criteria"],"quiz":{"q":"毎日数百枚の検品写真を目視チェックする製造業の品質管理部門でマルチモーダルAIの導入を検討する際、最も適切な判断はどれか。","c":["最新技術なので全社一斉に導入する","画像を日常的に扱う業務があり優先度は高いが、まず限定範囲でPoCを実施して精度を検証する","画像処理はAIの苦手分野なので見送る","マルチモーダルAIはテキスト処理専用なので使えない"],"a":1,"exp":"「自社業務に該当する入力データがあるか」の基準ではYesで優先度大。ただし技術に飛びつかず限定PoC→精度検証→展開判断が実務の鉄則。"}},{"id":"slm","term":"SLM(小型言語モデル)","yomi":"えすえるえむ","aliases":["Small Language Model","小型モデル","軽量モデル"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"小さく・速く・低コストで動作する言語モデル。スマートフォンや社内サーバーでも動かしやすく、クラウド依存を減らせるため、コストや情報管理の観点から導入しやすい選択肢となる。自社データでのファインチューニングによる業界特化モデルも構築しやすい。一方、LLMより誤った回答を返す頻度が高くなる場合があり、高い正確性が求められる業務には現時点で適さないことがある。","points":["社内メモの要約や文書の下書きなど、多少の誤りを人が確認・修正できる業務でコスト面の利点を活かしやすい","「LLMと同等の精度であらゆるタスクに対応できる」わけではない。難易度に応じたSLMとLLMの使い分けが重要","クラウドへのAPI課金が発生しない構成が可能で運用コスト削減に寄与"],"related":["model-enhancement","model-routing","llm"],"quiz":{"q":"SLMの特徴として誤っている記述はどれか。","c":["LLMに比べてコストが大幅に低く、デバイス上で直接動作できる","自社の業務データでファインチューニングし業界特化モデルを構築しやすい","LLMと同等の精度であらゆるタスクに対応できるためLLMは不要になる","クラウドへのAPI課金が発生しない構成が可能で運用コスト削減に寄与する"],"a":2,"exp":"SLMは精度がやや劣る傾向があり万能ではない。複雑な推論や高度な文章生成にはLLMが依然有効で、難易度に応じた使い分けが重要。"}},{"id":"reasoning-model","term":"推論モデル","yomi":"すいろんもでる","aliases":["リーズニングモデル","段階的推論"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"結論だけを返すのではなく、問題を段階的に整理しながら答えを導く能力を強化したモデル。複雑な条件を含む問題や多段階の判断が必要な業務(例: ネットワーク→メールサーバー→障害情報と順に原因を切り分けるトラブルシューティング)に対応しやすい。応答時間が長くコストも高い傾向がある。","points":["即座に回答が欲しいFAQに推論モデルを使うのは不適切。FAQには通常モデルやSLM、複雑案件には推論モデルを限定的に使う(モデルルーティングの発展形)","すべてに使うとコストが過大に、すべてSLMにすると複雑案件の精度が不足する"],"related":["model-enhancement","model-routing","slm"],"quiz":{"q":"FAQ回答と複雑なトラブルシューティングへのモデル割り当てとして最も適切な設計はどれか。","c":["すべての問い合わせに推論モデルを使い最高精度を目指す","FAQには通常モデルやSLM、複雑なトラブルシューティングには推論モデルを限定的に使う","コスト削減のためすべてSLMのみを使う","推論モデルは応答が遅いためどの業務にも使わない"],"a":1,"exp":"推論モデルは複雑な段階的分析に強いが遅く高コスト。タスク性質に応じた使い分け(モデルルーティング)が正解。全推論はコスト過大、全SLMは精度不足、全面不使用は適用領域の見逃し。"}},{"id":"trend-criteria","term":"トレンドを自社に当てはめる3つの判断基準","yomi":"とれんどのはんだんきじゅん","aliases":["自社適用の判断基準"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"経営層から「最新AIでどこまで任せられるか」を問われた際に、実現可能なことと慎重に判断すべきことを区別して説明するための基準。①自社の業務に該当する入力データがあるか、②コストと精度のバランスが取れるか(即答が必要なFAQに高コストな推論モデルは不適切)、③現時点の性能で業務に耐えられるか(高い正確性が必要な業務にSLMは適さない場合がある)。","points":["RAGはドメイン特化の手段の1つであり、ハルシネーション(信頼性リスク)対策としても機能する横断的な技術","トレンドの暗記ではなく「自社のこの業務に使えるか?」に答えられることが求められるレベル"],"related":["three-trends","multimodal","slm","reasoning-model"],"quiz":{"q":"新しいAI技術トレンドを自社に適用するか判断する基準として適切でないものはどれか。","c":["自社の業務に該当する入力データがあるか","コストと精度のバランスが取れるか","現時点の性能で業務に耐えられるか","競合他社より先に導入できるか"],"a":3,"exp":"3基準は入力データの有無・コストと精度のバランス・現時点の性能での業務適合性。競合との先陣争い自体は判断基準に含まれない。"}},{"id":"rag-basic","term":"RAG(検索拡張生成)※基礎","yomi":"らぐ","aliases":["Retrieval-Augmented Generation","検索拡張生成","グラウンディング"],"ch":1,"sec":"08","secTitle":"生成AIの発展トレンド","def":"AIエージェントが回答を作成する前に、関連する社内文書やナレッジ(社内規定・判例・診療ガイドライン・マニュアルなど)を検索・参照しながら回答する仕組み。根拠のない回答(ハルシネーション)を抑え、「知ったかぶり」を大幅に減らす。コンテキストウィンドウに全文を入れる代わりに必要箇所だけを渡すため、コスト管理としても合理的。詳細な仕組みは第3章Section 14で扱う。","points":["ドメイン特化の4手段の1つであり、信頼性リスク対策の代表でもある","RAGの精度は「どのデータをどれだけ整備して蓄積しているか」に依存。自社独自データの質と量が競争優位の源泉","要約だけを参照させる方式は詳細情報が失われるリスクがあり、原文から必要箇所を取得する方が回答精度を維持できる"],"related":["hallucination","context-window","reliability-risk","domain-specialization"],"quiz":{"q":"RAGの説明として最も適切なものはどれか。","c":["モデルのパラメータを再学習させて知識を追加する手法","回答を作成する前に関連文書を検索・参照しながら回答を生成する仕組み","入力された悪意あるプロンプトを検知する仕組み","モデルを小型化して端末上で動かす技術"],"a":1,"exp":"RAGは回答前の検索・参照によるグラウンディング。再学習による知識追加はファインチューニング。ハルシネーション抑制とコスト管理の両面で有効。"}},{"id":"work-hierarchy","term":"仕事・業務・作業の階層","yomi":"しごとぎょうむさぎょうのかいそう","aliases":["仕事","業務","作業","階層構造"],"ch":2,"sec":"09","secTitle":"業務の構造的理解","def":"日常会話では混用されがちな3語の階層区別。仕事=組織や個人が果たすべき目的・役割の全体(例: 顧客の課題を解決する)。業務=仕事を実現するために組織が繰り返し行う一連の流れで、一定の手順・担当者・ルールを持つまとまり(例: 受注処理、経費精算、問い合わせ対応)。作業=業務を構成する具体的な行為(例: Excelに数値を入力する、領収書を確認する)。","points":["AIエージェントが直接置き換える対象は「作業」。ただし作業だけを単独で見ても前後の流れや業務上の意味が分からなければ適切な設計はできない","「どの作業をAIに任せるか」の前提として「その作業がどの業務の中にあり、どの役割を果たしているか」の把握が必要","AI導入の適切な出発点はツール選定ではなく業務構造の理解"],"related":["ipo-model","hta","asis-analysis"],"quiz":{"q":"「仕事・業務・作業」の階層とAIエージェント導入の関係として最も適切な記述はどれか。","c":["AIエージェントが直接置き換える対象は「仕事」全体である","AIエージェントが直接置き換える対象は「作業」だが、その作業が属する業務全体の流れの理解が設計の前提になる","「業務」と「作業」は同義であり区別する必要はない","作業単位の分析だけで導入設計は完結する"],"a":1,"exp":"置き換え対象は作業レベル。ただし前後の流れや業務上の意味が分からないと適切な設計はできないため、まず業務全体を理解してから作業を特定する順序で考える。"}},{"id":"ipo-model","term":"IPOモデル","yomi":"あいぴーおーもでる","aliases":["Input Process Output","入力・処理・出力"],"ch":2,"sec":"09","secTitle":"業務の構造的理解","def":"あらゆる業務をInput(業務のきっかけとなる情報や素材)・Process(確認・判断・変換・登録などの処理。実際の作業を含む)・Output(成果物や次工程へ渡す情報)の3要素で捉える整理法。詳細な手順の前に「何が入って何が出るか」という業務の輪郭を最初に掴むために使う、4つの可視化手法の中で最も粒度が粗い手法。","points":["IPO整理の目的は「業務全体をAIが置き換えるか」ではなく、どの入力を受けたどの処理の中にAIが担える作業があるかを見つけること","Inputの品質視点も重要: 入力画像が不鮮明ならAI処理の精度は上がらない。問題はAIの性能だけでなく入力情報の質にもある","限界: 「誰がInputを用意し、誰がOutputを受け取るか」という関係者情報が見えない。これを補うのがSIPOC","例(経費精算): Input=領収書、Process=内容確認・費目分類・金額入力・承認依頼、Output=会計システムへの登録データ"],"related":["sipoc","asis-analysis","work-hierarchy","visualization-methods"],"quiz":{"q":"プロジェクト立ち上げ初日に「まずこの業務の入力と出力を自分の中で整理したい」場合、最も適した手法はどれか。","c":["SIPOC分析で関係者含む5要素を整理する","HTAでアトミック・タスクまで分解する","IPOモデルで入力・処理・出力の3要素を書き出す","業務フロー図をチームで共有する"],"a":2,"exp":"入出力の整理という目的にはIPOが最適。SIPOCは範囲が広すぎ、HTAは粒度が細かすぎ、フロー図はチーム共有目的でありまだ一人で整理する段階には適さない。"}},{"id":"asis-analysis","term":"As-Is分析","yomi":"あずいずぶんせき","aliases":["現状分析","As-Is"],"ch":2,"sec":"09","secTitle":"業務の構造的理解","def":"業務の「現在の姿」をIPOの構造に沿って正確に記録する分析手法。「今、誰が、何を、どのように、どんな順序で行っているか」をありのままに可視化する。最重要の注意点は、現状記述に改善案や評価を混ぜないこと。「AIで自動化すべき」等を書き込むと事実の把握と改善の議論が混在し、現状を正確に捉えられなくなる。","points":["手法①プロセスウォークスルー: 作業を横で観察し画面共有や動画で記録。ヒアリングだけに頼らない(言葉で説明できない暗黙の作業を拾う)","手法②5W1Hヒアリングシート: 特にWhy(なぜこの手順があるか)が重要。担当者が答えられない工程は形骸化した廃止候補","手法③スイムレーン図: 部署をまたぐ流れと引き渡し・待ち時間を可視化","手法④マニュアルと実態の差分確認: マニュアル=As-Isではない。差分にこそ現場の暗黙知が凝縮","手法⑤タイムスタディ: 体感でなく実測。時間がかかるのに価値が低い工程がAI化の優先候補"],"related":["tobe-analysis","gap-analysis","tacit-knowledge","ipo-model"],"quiz":{"q":"As-Is分析の記録として不適切なものはどれか。","c":["経理担当3名が月200件の請求書を1件平均8分で会計システムに入力している","入力ミスが月10件発生し、月末の突合で発覚して修正に5時間かかっている","請求書のフォーマットが取引先ごとに異なるため、AIの画像認識で自動化すれば工数を80%削減できる","紙の請求書は経理部門の棚に保管され、過去分の検索に平均15分かかっている"],"a":2,"exp":"As-Isは事実のみを記録する。「AIで自動化すれば80%削減」は改善提案と効果予測であり、To-Be以降の議論。事実と改善案の混在がAs-Is分析の典型的な失敗。"}},{"id":"tobe-analysis","term":"To-Be分析","yomi":"とぅーびーぶんせき","aliases":["あるべき姿","To-Be"],"ch":2,"sec":"09","secTitle":"業務の構造的理解","def":"AIエージェント導入後の業務の「あるべき姿」をIPO構造に沿って設計する手法。最重要原則は「既存業務をそのままAIに置き換えない」こと。紙の回覧フローをそのままデジタル化しても本質的な改善にはならず、「そもそもこのProcessは必要か」「Input形式自体を変えられないか」を問い、AI前提でプロセスそのものを再設計する。","points":["手法①ECRSによるプロセスの取捨選択(To-Be設計前にAs-Isの各プロセスを評価)","手法②AIと人間の役割分類+Human-in-the-Loop設計","手法③ストーリーボード: 利用者視点で具体的な利用場面を書き出し、図だけでは見えない操作の手間・確認タイミング・エラー時対応を事前に発見","手法④KPIとのひも付け: 作業レベルの改善が「担当者の週○時間削減」→「顧客対応コスト削減」のように上位目標へつながる構造を明確化し設計の根拠にする"],"related":["asis-analysis","ecrs","hitl","gap-analysis"],"quiz":{"q":"To-Be設計の原則として最も適切なものはどれか。","c":["既存の業務フローを忠実に再現してAIに置き換える","AIエージェント前提で「そもそもこの工程は必要か」を問い、業務プロセス自体を再設計する","現場に確認せず理想像を最優先で描く","KPIとの関係は導入後に検討する"],"a":1,"exp":"既存業務のそのまま置き換えは本質的改善にならない。AI前提でプロセスの必要性から問い直す再設計がTo-Beの核心。KPIへのひも付けは設計時に行い根拠とする。"}},{"id":"hitl","term":"Human-in-the-Loop(HITL)","yomi":"ひゅーまんいんざるーぷ","aliases":["人間参加型","チェックポイント設計","役割分担の3基準"],"ch":2,"sec":"09","secTitle":"業務の構造的理解","def":"To-Be設計で各プロセスを「AIが担う作業」と「人間が担う作業」に分類し、リスクの高い箇所には人間の最終確認を組み込む設計。分類基準は3つ: ①ルールが明確で繰り返し発生するもの→AIへ、②判断に例外が多く文脈依存性が高いもの→人間へ、③AIの判断誤りのリスクが高いもの→Human-in-the-Loopで人間が最終確認。","points":["どこで人間がチェックポイントを持つかを設計に明示することで、責任の所在が明確になり現場の不安も軽減される","HTAのアトミック・タスク分解と直接つながる: どのタスクでチェックポイントを持つかの特定が責任構造の透明化になる","第1章の「不可逆性の判断」「自律性レベルの段階的引き上げ」と一体で理解する","HITLの二重の役割(第5章): ①安全装置(AIの誤りが顧客や後続処理に届く前に人間が検出・修正する)、②AIを育てる仕組み(人間の「正しい/間違っている」というフィードバックが改善データとして蓄積される)。精度が向上すれば不要になる一時的な措置ではない"],"related":["tobe-analysis","hta","irreversibility","autonomy-levels","delegation-design"],"quiz":{"q":"To-Beにおける「AIが担う作業」と「人間が担う作業」の分類基準として適切でないものはどれか。","c":["ルールが明確で繰り返し発生する作業はAIエージェントへ","判断に例外が多く文脈依存性が高い作業は人間へ","AIの判断誤りのリスクが高い作業はHuman-in-the-Loopで人間が最終確認","処理時間が長い作業はすべて無条件にAIへ"],"a":3,"exp":"分類基準はルールの明確さ・文脈依存性・誤りリスクの3つ。処理時間の長さだけで無条件にAIへ割り当てる基準は存在しない。"}},{"id":"gap-analysis","term":"ギャップ分析(As-Is→To-Be→ギャップの順序)","yomi":"ぎゃっぷぶんせき","aliases":["差分分析","順序の厳守"],"ch":2,"sec":"09","secTitle":"業務の構造的理解","def":"As-IsとTo-Beの差分を明確にし「何を変えれば理想に到達できるか」を特定するプロセス。例: As-Is「経理担当がExcelに手入力」、To-Be「AIが領収書画像から自動入力」なら、ギャップ=「領収書の読み取りと入力の自動化」がAI導入の具体的要件になる。「As-Is→To-Be→ギャップ分析」の順序厳守が最重要原則。","points":["To-Beを先に描くと現実離れした理想像になり導入失敗リスクが高まる。AIプロジェクトでは「技術に感動して理想から入ってしまう」ケースが特に多い","失敗事例の典型: 理想の業務フローを先に設計→現場から「実際の業務と合わない」「使いにくい」の声→利用率低迷。根本原因は現状把握の欠如","ギャップ分析の目的は違いを見つけること自体ではなく、課題と必要な変更(分類基準の統一、検索の仕組み化など)を明らかにすること"],"related":["asis-analysis","tobe-analysis"],"quiz":{"q":"リーダーが最初に「理想の業務フロー」を描いてシステムを構築したところ、導入後に「実際の業務と合わない」という声が相次ぎ利用率が低迷した。最も根本的な原因はどれか。","c":["LLMの性能不足","現状業務を正確に把握しないまま理想像を先に設計した","予算不足","トレーニング不足"],"a":1,"exp":"As-Is→To-Be→ギャップ分析の順序を守らず理想から入った典型的失敗。技術・予算・教育以前の、現状分析の欠如が根本原因。"}},{"id":"bpr","term":"BPR(ビジネスプロセス・リエンジニアリング)","yomi":"びーぴーあーる","aliases":["Business Process Reengineering","業務改革","リエンジニアリング"],"ch":2,"sec":"10","secTitle":"BPR(業務改革)の基礎","def":"既存の業務プロセスを漸進的に改善するのではなく、根本から問い直して再設計する手法。1990年代にマイケル・ハマーとジェームズ・チャンピーが提唱。「なぜその業務が存在するのか」を起点に業務構造を白紙から設計し直す。改善(Improvement)は「今あるものをより良くする」前提だが、再設計(Reengineering)は「今あるものが本当に必要か」を問うことから始まる点が本質的に異なる。","points":["出発点は「コンピュータ普及期に手作業をそのままデジタル化する組織が続出した」ことへの批判。この洞察はAIエージェント時代にそのまま当てはまる","限界と現実的運用: 90年代の初期ブームでは「根本再設計」が大規模人員削減と結びつき現場の抵抗と混乱を招いた。現代は「プロセスの存在意義を問い続ける姿勢」として、AI導入対象の特定業務に絞ってECRSを適用し、小さく検証しながら範囲を広げるのが現実的","可視化のプロセスそのものがBPRの入り口になる"],"related":["ecrs","dirty-process","tobe-analysis","hyperautomation"],"quiz":{"q":"BPRが「改善(Improvement)」ではなく「再設計(Reengineering)」という言葉を使う理由として最も適切なものはどれか。","c":["改善よりも短期間で完了するから","「今あるものをより良くする」のではなく「今あるものが本当に必要か」を問うことから始めるから","ITシステムの導入を必須とするから","人員削減を目的とするから"],"a":1,"exp":"発想の出発点の違いが本質。改善は既存を前提に磨く、再設計は存在の必要性から問う。この差が到達できる変革の深さを左右する。"}},{"id":"dirty-process","term":"汚いプロセスの自動化","yomi":"きたないぷろせすのじどうか","aliases":["Automating a Dirty Process","非効率の高速化"],"ch":2,"sec":"10","secTitle":"BPR(業務改革)の基礎","def":"非効率な業務フローを見直さないままAIエージェントで自動化してしまう、AI導入プロジェクトで最も多い失敗パターン。マイケル・ハマーは「既存のプロセスを自動化することは、既存の問題を自動化することだ」と表現した。非効率を高速・正確に繰り返す装置ができあがるだけで、エージェントが高性能であるほど罠の影響は大きくなる。","points":["例: 紙提出→3名回覧→押印確認→手入力→転記のフローで入力だけAI化しても、「そもそも3名の回覧が必要か」という本質的な問いが立っていない","正しい手順: As-Is分析→BPR/ECRSでプロセス最適化→最適化後のプロセスにTo-Beを設計","現実の壁への予防線: 日本企業ではECRSの抜本見直しが難しいことも多い。その場合は事前に①理想のTo-Be(本来排除すべき工程)の共有、②ECRSをスキップすると成果獲得までの時間と期待難易度が上がるというトレードオフの明言、を対象部署・意思決定層と合意しておく。責任分界が明確になり、失敗時も責任追及でなく業務前提の課題として次の改善につなげられる"],"related":["bpr","ecrs","hyperautomation"],"quiz":{"q":"AI導入後「処理速度は上がったが不要だった承認ステップまで自動化され、全体の工数はあまり変わらない」状況が発生した。最も根本的な原因はどれか。","c":["AIエージェントの性能不足","業務プロセスを最適化せず非効率なフローをそのまま自動化した","導入時のトレーニング不足","自動化する業務の範囲が狭すぎた"],"a":1,"exp":"「汚いプロセスの自動化」の典型例。不要な承認を排除せず自動化したため非効率が高速に回るだけの状態に。As-Is→ECRS→To-Beの順序を守ることが対策。"}},{"id":"ecrs","term":"ECRS","yomi":"いーしーあーるえす","aliases":["排除","結合","順序変更","簡素化","Eliminate","Combine","Rearrange","Simplify"],"ch":2,"sec":"10","secTitle":"BPR(業務改革)の基礎","def":"BPRを実務で進める具体的フレームワーク。Eliminate(排除: この工程は本当に必要か)→Combine(結合: 複数の工程を1つにまとめられないか)→Rearrange(順序変更: 順序を変えて効率化できないか)→Simplify(簡素化: 残す工程をもっとシンプルにできないか)を、この順序で検討する。効果の大きい順に問うことで「本来不要な業務を丁寧に効率化してしまう」無駄を防ぐ。","points":["Eliminateが最初かつ最も厳しい問い。排除できれば自動化の必要すらなくなり効果最大・コストゼロ。「なぜ存在するか」に答えられない工程は形骸化した廃止候補","例: E=少額交通費の領収書原本提出を廃止し申告のみに/C=申請書の記入と上長への提出をフォーム送信+自動通知に統合/R=方向性の承認を先に得て詳細入力は後から(承認の粒度と入力の粒度を分離)/S=自由記述10項目を必須3項目+テンプレート選択に","AIに渡す前に削ぎ落とせるものを削ぎ落とすことが設計の質を決める"],"related":["bpr","dirty-process","tobe-analysis"],"quiz":{"q":"次の改善案とECRSの対応の正しい組み合わせはどれか。X:少額交通費の領収書原本提出を廃止し申告のみに/Y:経費申請の記入と上長提出をフォーム送信+自動通知に統合/Z:報告書の自由記述10項目を必須3項目+テンプレート選択に変更","c":["X=Simplify, Y=Combine, Z=Eliminate","X=Eliminate, Y=Combine, Z=Simplify","X=Eliminate, Y=Rearrange, Z=Combine","X=Combine, Y=Eliminate, Z=Simplify"],"a":1,"exp":"Xは工程を丸ごとなくすEliminate、Yは2ステップを1つに統合するCombine、Zは工程を残しつつシンプルにするSimplify。"}},{"id":"tacit-knowledge","term":"暗黙知の罠と業務の聞き出し方","yomi":"あんもくちのわな","aliases":["暗黙知","ヒアリングの切り口","5つの問い"],"ch":2,"sec":"11","secTitle":"業務可視化の手法","def":"熟練者が無意識に行っている判断や手順は本人でさえ言語化できていないことが多く、「どんな業務ですか」という抽象的なヒアリングだけでは表面しか拾えない問題。長年の担当者ほど「普段どおりに処理している」「感覚的に判断している」という答えにとどまる。対策は複数の観点から具体的に掘り下げる問いの設計。","points":["5つの切り口: ①起点(何がきっかけで始まるか→IPOのInputが明確になる)、②実際に何をするか(画面や手を動かす順番。実演してもらうのが最も効果的)、③イレギュラー(AIが詰まるのはほぼ例外ケース。「自分で判断している」部分はHTAで人間が担う判断処理の候補)、④終わり(完了条件と成果物の渡し先→IPOのOutput・SIPOCのCustomerに対応)、⑤関係者(「休んだときに誰がやるか」が効果的な問い)","聞き方の姿勢も重要: 目的が「問題点の指摘」だと受け取られると正直に話してもらえない。「仕事を正しく理解したい」「うまくAIをサポートに使えるように」という姿勢が前提","業務フロー図の作図自体も生成AIが支援可能(手順と関係者のテキストからDraw.io等で自動生成)"],"related":["asis-analysis","hta","sipoc"],"quiz":{"q":"ベテラン担当者の業務をヒアリングする際、AIエージェントが詰まりやすい箇所やHTAで「人間が担う判断処理」の候補を発見するために特に有効な問いはどれか。","c":["「どんな業務ですか」と全体像を聞く","「イレギュラーなケースと、自分で判断している部分」を聞く","「理想の業務フロー」を聞く","「マニュアルの保管場所」を聞く"],"a":1,"exp":"業務説明は「うまくいくケース」に偏りがち。AIが詰まるのはほぼ例外ケースであり、イレギュラーと自己判断部分を丁寧に聞くことが人間担当タスクの特定につながる。"}},{"id":"visualization-methods","term":"業務可視化の4手法と使い分け","yomi":"ぎょうむかしかのよんしゅほう","aliases":["可視化手法","粒度","使い分け"],"ch":2,"sec":"11","secTitle":"業務可視化の手法","def":"業務をAIエージェントに委ねられる水準まで分解・可視化する4手法。粒度が粗い順に、IPOモデル→SIPOC分析→HTA→業務フロー図。粗い手法から始めて必要に応じて詳細へ進むのが基本だが、4つを必ず全部使う必要はなく「今何を明らかにしたいか」(目的と対象者)で使い分ける。可視化は単なる記録ではなく、AIに引き継がせる情報の設計図を作る行為。","points":["経営層に全体像を説明したい→IPOとSIPOCで十分/AIと人間の役割を現場と詰めたい→HTAと業務フロー図","シンプルな業務ならIPOだけで十分な場合もある","可視化のプロセスは「その業務が本当に必要か」「誰のための業務か」を問い直す機会でもあり、BPRの入り口になる"],"related":["ipo-model","sipoc","hta","swimlane","bpr"],"quiz":{"q":"業務可視化の4手法を粒度が粗い順に並べたものはどれか。","c":["業務フロー図→HTA→SIPOC→IPO","IPO→SIPOC→HTA→業務フロー図","SIPOC→IPO→業務フロー図→HTA","HTA→IPO→SIPOC→業務フロー図"],"a":1,"exp":"IPO(輪郭)→SIPOC(関係者含む5要素)→HTA(タスク分解)→業務フロー図(最も詳細・チーム認識統合)の順。全部使う必要はなく目的で選ぶ。"}},{"id":"sipoc","term":"SIPOC分析","yomi":"さいぽっくぶんせき","aliases":["Supplier Input Process Output Customer","関係者の洗い出し"],"ch":2,"sec":"11","secTitle":"業務可視化の手法","def":"IPOの前後に、業務を依頼してくる主体(Supplier)と成果物を受け取る主体(Customer)を加えた5要素で業務を整理する手法。関係者全員を把握しないと導入後に「そんな機能も必要だったのか」という追加要件が噴出する。特にOutputの受け取り手(Customer)が見落とされやすい。","points":["例: 受注処理のOutput受取者は顧客と倉庫だけでなく「売上データを参照する経営企画部門」も含まれ得る。見落とすと「ダッシュボード連携も必要だった」が本番直前に浮上し大幅な手戻りに","要件定義フェーズで「誰のための、何のための自動化か」を関係者全員で確認する地図として機能。1枚の図にすることで部署をまたいだ認識のズレを早期発見","ヘルプデスク例: 月次レポートを見る経営層がCustomerに含まれると分かれば、対応率・コスト削減実績のダッシュボードを設計時点で織り込める"],"related":["ipo-model","visualization-methods","tacit-knowledge"],"quiz":{"q":"IPO分析のみ行いSIPOC分析を行わずに受注処理システムを導入したところ、導入後に「経営企画部門が売上データをリアルタイムで確認したい」という追加要望が発生した。SIPOCで防げた理由として最も適切なものはどれか。","c":["処理の手順をより細かく定義できたから","出力を受け取る関係者(Customer)を網羅的に洗い出せたから","入力データの品質を事前に確認できたから","AIと人間の役割分担を明確にできたから"],"a":1,"exp":"SIPOCはIPOにSupplierとCustomerを加えて関係者を網羅する手法。経営企画部門というCustomerの見落としが追加要件の原因。手順の細分化や役割分担はHTAの役割。"}},{"id":"hta","term":"HTA(階層的タスク分析)","yomi":"えいちてぃーえー","aliases":["Hierarchical Task Analysis","アトミック・タスク","タスク分解"],"ch":2,"sec":"11","secTitle":"業務可視化の手法","def":"業務をAIエージェントが処理できる最小の作業単位まで階層的に分解していく手法。分解しきった最小単位の作業をアトミック・タスクと呼ぶ。本質的な目的は「どの作業をAIに任せ、どの作業を人間が担うか」を作業レベルで明確にすること。「AIで自動化する」という意思決定は業務単位では粗すぎ、同じ業務内にAI向きの作業と人間が担うべき作業が混在する。","points":["アトミック・タスクの3分類: ①AIエージェントが処理(ルールが明確で繰り返し発生。例: 発注書から品目・数量を読み取る、定型メールを分類する)、②定型処理=RPA・スクリプトで自動化(判断を伴わない純粋な機械的操作。例: メールから添付PDFを取得、データ転記)、③人間が担う(例外判断・倫理的判断・高度な文脈理解。例: 大口注文の受注可否判断、クレームの感情的背景を読み取る対応)","Human-in-the-Loop設計と直結: どのアトミック・タスクで人間がチェックポイントを持つかの特定が責任構造の透明化になる"],"related":["hitl","visualization-methods","work-hierarchy","routine-vs-judgment"],"quiz":{"q":"HTAで分解したタスクの担当割り当てとして最も適切な組み合わせはどれか。X:メールから添付の発注書PDFを取得/Y:取引先ごとにフォーマットが異なる発注書から品目・数量・納期を抽出/Z:大口注文の受注可否を最終判断","c":["X=AI処理、Y=定型処理、Z=人間","X=定型処理、Y=AI処理、Z=人間","X=AI処理、Y=AI処理、Z=AI処理","X=定型処理、Y=定型処理、Z=人間"],"a":1,"exp":"添付取得は判断不要の機械的操作=定型処理。フォーマットが異なる読み取りは文脈判断が必要=AI処理。大口受注可否は責任を伴う経営判断=人間。"}},{"id":"swimlane","term":"業務フロー図(スイムレーン図)","yomi":"ぎょうむふろーず","aliases":["スイムレーン図","フロー図"],"ch":2,"sec":"11","secTitle":"業務可視化の手法","def":"担当者や部署をレーンとして並べ、それぞれが何をしているかを矢印でつないで図示する、4手法の中で最も詳細な可視化。IPO・SIPOC・HTAの分析結果を1枚の図に統合したものであり、可視化プロセスの集大成に位置づけられる。最大の価値はチームでの認識統合。","points":["文章や表では見えにくい「工程の抜け」「担当の重複」「引き渡しの曖昧さ」が図にした瞬間に視覚的に明らかになり、図を見せるだけで議論が始まる","As-IsとTo-Beのフロー図を並べて提示することで「何がどう変わるか」を作業レベルで全員が理解でき、現場の納得と合意形成を促進するコミュニケーションツールになる","作図・維持管理の手間という現実的課題には生成AIの活用が有効(手順と関係者のテキストから自動生成)"],"related":["visualization-methods","asis-analysis","tobe-analysis"],"quiz":{"q":"業務フロー図(スイムレーン図)の最大の価値として最も適切なものはどれか。","c":["1人で業務の入出力を素早く整理できること","チームでの認識統合。工程の抜け・担当の重複・引き渡しの曖昧さが視覚的に明らかになること","関係者を5要素で網羅できること","アトミック・タスクまで分解できること"],"a":1,"exp":"フロー図は分析結果を1枚に統合した集大成であり、価値の中心はチームの認識統合と合意形成。入出力の整理はIPO、関係者網羅はSIPOC、タスク分解はHTA。"}},{"id":"knowledge-mgmt","term":"ナレッジマネジメント","yomi":"なれっじまねじめんと","aliases":["知識経営","情報と知識の違い"],"ch":3,"sec":"12","secTitle":"ナレッジマネジメントの基礎","def":"個人に属している知識を整理・共有し、組織として活用できる状態にする取り組み。AIエージェント導入の前提条件とされる(AIが適切に判断・支援を行うには参照すべき知識が組織内で整理されている必要があるため)。情報は「事実の記述」で誰でも同じように参照できるが、知識は「判断の根拠」であり情報の活用の仕方に組織力の差が生まれる。","points":["例:「顧客Aの購買データがある」は情報、「顧客Aは決算前に大型発注する傾向があるため11月に提案すべき」は知識","価値の高い知識ほど文書化されないまま個人の中に蓄積され、異動・退職とともに失われるおそれがある","AI時代は性能競争がモデルの性能競争から知識の質の競争へ移行しつつある。ナレッジマネジメントは準備作業ではなく組織の知的競争力そのもの","「早すぎる最適化」の罠: 対象業務が定まる前に社内知識をすべて整理しようとするとプロジェクトが長期化する。解決すべき業務課題に必要な知識から優先的に形式知化し、範囲を限定して開始→フィードバックで拡充するのが現実的"],"related":["tacit-explicit","seci-model","rag-basic"],"quiz":{"q":"「情報」と「知識」の区別として最も適切なものはどれか。","c":["情報と知識は同義であり区別する必要はない","情報は事実の記述、知識は判断の根拠であり、情報の活用の仕方に組織力の差が生まれる","知識はデータベースに保存できるが情報はできない","情報は暗黙的、知識は常に形式的である"],"a":1,"exp":"「購買データがある」は情報、「決算前に大型発注する傾向があるから11月に提案すべき」という判断が知識。AIエージェントの価値は組織の知識を参照して判断を支援できるときに高まる。"}},{"id":"tacit-explicit","term":"暗黙知と形式知/ナレッジベース","yomi":"あんもくちとけいしきち","aliases":["形式知","ナレッジベース","知識の囲い込み"],"ch":3,"sec":"12","secTitle":"ナレッジマネジメントの基礎","def":"暗黙知=個人の経験や勘、感覚に基づいて身についているが言葉や文書として整理されていない知識(熟練工が機械音のわずかな違いから不調を察知する等)。形式知=言葉・数値・図表の形で表現され文書やデータとして共有できる知識(マニュアル、FAQ、判定フロー、対応履歴等)。AIエージェントが参照できるのは形式知だけであり、それを整理して保存したものがナレッジベース。","points":["「業務が複雑すぎてAIでは対応できない」状況の多くは、実際には必要な知識が暗黙知のままでAIが参照できる形になっていないことを意味する","形式知化されない2つの本質的障壁: ①言語化の困難さ(熟練者は判断基準が意識にのぼらず「経験でわかる」としか答えられない→問いかけの設計が必要)、②知識の囲い込み(「自分しか知らない」ことが存在価値だと感じる心理→貢献を評価制度に組み込むことが実践的手段)","ナレッジベースの品質がRAGの精度を直接左右する。「AIの精度が低い」問題の多くは実はナレッジベースの問題","自社の暗黙知を丁寧に形式知化したナレッジは他社に複製できない競争優位の源泉"],"related":["knowledge-mgmt","seci-model","rag-basic","tacit-knowledge"],"quiz":{"q":"ベテラン営業担当者が「この顧客は決算前に大型発注する傾向がある」と判断できるが根拠は文書化されていない。AIエージェントにこの判断を任せるために最初に取り組むべきことはどれか。","c":["より高性能なLLMを導入して推論能力を高める","ベテランの判断基準を文書化しナレッジベースに取り込む","過去の受注データをすべてAIに入力し自動学習させる","業務をそのまま録画してAIに見せる"],"a":1,"exp":"AIはナレッジベースの形式知しか参照できない。暗黙知がナレッジベースにない以上、モデル性能を上げても解決しない。まず形式知化が必要。"}},{"id":"seci-model","term":"SECIモデル","yomi":"せきもでる","aliases":["共同化","表出化","連結化","内面化","野中郁次郎"],"ch":3,"sec":"12","secTitle":"ナレッジマネジメントの基礎","def":"知識経営の研究者・野中郁次郎が提唱した、暗黙知と形式知の変換を組織的に設計するフレームワーク。①共同化(Socialization: 暗黙知→暗黙知。一緒に体験して伝わる)、②表出化(Externalization: 暗黙知→形式知。言語化・文書化)、③連結化(Combination: 形式知同士を組み合わせて新しい形式知を生む)、④内面化(Internalization: 形式知が実践を通じて暗黙知として身体化)の4フェーズが循環する。","points":["AIエージェント導入と最も関連が深いのは表出化。ベテランの言語化した知識をチャットボットやワークフローとして実装する工程","AIは全フェーズを加速: 共同化=インタビュー文字起こし・作業動画解析、連結化=複数エージェント統合・ナレッジベース連携、内面化=新人がAIの回答を確認しながら業務を覚える","新人が実務で気づいた「AIが苦手なパターン」をナレッジベースへフィードバックするのは表出化(暗黙知→形式知)","AIエージェントが循環を媒介することで、属人的に止まっていた知識が組織の資産として回り続ける"],"related":["tacit-explicit","knowledge-mgmt","kb-freshness"],"quiz":{"q":"次の活動とSECIモデルのフェーズの正しい組み合わせはどれか。W:新人が熟練工の横で作業を観察し勘所を体感的に学ぶ/X:熟練工が判定フローをフローチャートとして文書化する/Y:判定フローと保全マニュアルと故障履歴を統合してガイドを作成する/Z:新人がガイドに従う点検を繰り返すうちにガイドなしで判断できるようになる","c":["W=共同化, X=表出化, Y=連結化, Z=内面化","W=表出化, X=共同化, Y=内面化, Z=連結化","W=内面化, X=表出化, Y=共同化, Z=連結化","W=共同化, X=連結化, Y=表出化, Z=内面化"],"a":0,"exp":"Wは暗黙知→暗黙知の共同化、Xは暗黙知→形式知の表出化、Yは形式知同士の結合=連結化、Zは形式知が身体化する内面化。"}},{"id":"finetuning","term":"ファインチューニング(RAGとの使い分け)","yomi":"ふぁいんちゅーにんぐ","aliases":["追加学習","Fine-tuning"],"ch":3,"sec":"12","secTitle":"ナレッジマネジメントの基礎","def":"汎用的なAIモデルに自社固有のデータを追加学習させ、特定の用途・文脈・スタイルに特化したモデルを作る手法。RAGが「料理の度にレシピ本を参照する」なら、ファインチューニングは「シェフ自身にレシピを体で覚えさせる」アプローチ。自社独自の言い回しや商品名が多い業界、自社のトーンや応答スタイルの再現などに向く。","points":["注意点①学習データの準備負荷: どんな入力にどんな出力を返すべきかが分かる形に整えたデータが必要。データの質がそのまま品質に影響","注意点②知識更新への不向き: 知識をモデル自体に覚え込ませるため、頻繁に変わる知識は再学習が必要。価格・制度・規約・FAQのように更新頻度が高い情報は一般にRAGが適する","実務では二者択一ではなく組み合わせる: 文体・トーン・専門用語の使い方はファインチューニング、最新の製品情報・FAQ・規程はRAG","どちらの手法でも対象知識が整理されていなければ機能しない。ナレッジマネジメントが土台"],"related":["rag-basic","tacit-explicit","domain-specialization"],"quiz":{"q":"更新頻度が高い価格表やFAQをAIエージェントに扱わせる場合、RAGが一般にファインチューニングより適する理由はどれか。","c":["RAGの方が学習に必要な計算資源が多いから","参照先の文書を更新すればAIが使う知識も更新されるから","ファインチューニングは日本語に対応していないから","RAGはナレッジベースが不要だから"],"a":1,"exp":"ファインチューニングは知識をモデル自体に覚え込ませるため更新のたびに再学習が必要になり得る。RAGは参照先の更新だけで知識が更新されるため、頻繁に変わる情報に向く。"}},{"id":"data-three-types","term":"データの3分類(構造化・非構造化・半構造化)","yomi":"でーたのさんぶんるい","aliases":["構造化データ","非構造化データ","半構造化データ","JSON","データ変換パターン"],"ch":3,"sec":"13","secTitle":"データの種類と特性","def":"構造化データ=行と列の明確な構造を持つデータ(受注履歴、社員情報、仕訳データ)。非構造化データ=明確な構造を持たないデータ(メール、チャット、Word文書、PDF、画像、音声、動画)で企業データの約80%を占める。半構造化データ=タグやキーで部分的に整理されたデータ(JSON、XML。名刺のような中間的存在)。","points":["処理の担い手: 構造化→API・ワークフローの定型処理(LLM不要)、非構造化→LLM(意味の解釈)、半構造化→AIの入出力インターフェース(LLMの出力をJSONで構造化し後続システムへ)","典型的なデータ変換パターン: 非構造化データ→LLMで理解・要約→JSON(半構造化)で出力→APIで構造化データとしてCRM等に登録","設計上の問いは「どの場面でどの種類のデータが発生し、どの仕組みが処理するか」。すべてをAIに任せない前提で役割分担すると精度・速度・コストが最適化される","社員情報のような構造化データはRAGに入れるのではなくAPIで取得してプロンプトに追加する設計が効率的"],"related":["unstructured-data-advantage","metadata","rag-two-phases"],"quiz":{"q":"営業担当者が自由記述で書いた商談メモを要約してCRMに登録するフローとして最も適切なものはどれか。","c":["商談メモをAPIで解析し、要約をExcelに保存する","商談メモをLLMで理解・要約し、JSON形式で出力し、CRMにはAPIで登録する","商談メモをそのままデータベースに格納しCRM側で検索させる","すべての処理をLLMに一括で任せAPIは使わない"],"a":1,"exp":"非構造化→LLM→半構造化(JSON)→API→構造化の流れがAIエージェント設計の典型パターン。自由記述の理解はLLM、定型の登録はAPIが担う。"}},{"id":"metadata","term":"メタデータ","yomi":"めたでーた","aliases":["データについてのデータ","タグ付け"],"ch":3,"sec":"13","secTitle":"データの種類と特性","def":"「データについてのデータ」。文書そのものではなく文書に付与される属性情報(カテゴリ、対応OS、最終更新日など)。メタデータが整備されていないと、ナレッジベースに正しい情報が存在してもAIエージェントが適切なタイミングで参照できない。","points":["ナレッジベースの品質はコンテンツの質だけでなくメタデータの設計でも大きく変わる。RAGの設計と一体で考える","例:「カテゴリ:VPN」タグがあればVPN関連の問い合わせに該当ドキュメントを素早く特定できる。「対応OS」タグで質問者の環境に合うチャンクを優先できる","メタデータの付与はAIによる自動付与+人間の確認(HITL)の分担が現実的"],"related":["data-three-types","rag-two-phases","seven-habits"],"quiz":{"q":"メタデータの説明として最も適切なものはどれか。","c":["文書の本文そのもののこと","文書に付与される属性情報であり、RAGの検索精度を大きく左右する","AIモデルのパラメータのこと","データベースの暗号化キーのこと"],"a":1,"exp":"メタデータは「データについてのデータ」。カテゴリ・対応OS・更新日などの属性情報が整備されているかどうかが、適切なチャンクを検索できるかを左右する。"}},{"id":"rag-two-phases","term":"RAGの2フェーズ(保存/検索・生成)","yomi":"らぐのにふぇーず","aliases":["保存フェーズ","検索・生成フェーズ","ベクトル化","インデックス化","グラウンディング"],"ch":3,"sec":"14","secTitle":"RAGの仕組み","def":"RAGは大きく2フェーズで動作する。①保存フェーズ(事前準備): チャンク分割→ベクトル化(テキストの意味を数値の列に変換し、意味が近いテキスト同士を近い位置に配置)→インデックス化(データベースに格納し高速検索用の索引を作成)。②検索・生成フェーズ: 質問をベクトル化し意味の近さで関連チャンクを検索(セマンティック検索)→関連性の高い順に並べ替え上位チャンクをプロンプトに含める→LLMがそれを根拠に回答を生成(グラウンディング)。","points":["セマンティック検索はキーワードの完全一致ではなく意味の近さで行われる。「初期設定がうまくいかない」と「セットアップ時のエラー対処法」は表現が違っても意味的に近くヒットする","グラウンディング=回答を外部の文書やデータに基づかせる方法。根拠のない回答(ハルシネーション)を抑える","LLMの事前学習には組織固有の情報(業務マニュアル、社内規程、製品仕様、対応履歴)が含まれないため、RAGの仕組みなしにはAIは参照できない","RAGはモデルのパラメータを更新しない(ファインチューニングとの違い)"],"related":["rag-basic","chunking","rag-eval","finetuning","hallucination"],"quiz":{"q":"「初期設定がうまくいかない」という質問へのベクトル検索で、類似度が最も高いと期待されるチャンクはどれか。","c":["「製品の返品手続き: 購入後30日以内に連絡してください」","「セットアップ時のエラー対処法: まず電源を再起動してください」","「月額料金プランの比較: スタンダードプランは月額3,000円です」","「アカウント削除の手順: 設定画面からアカウント管理を選択します」"],"a":1,"exp":"ベクトル検索は意味の近さで検索するセマンティック検索。「初期設定」と「セットアップ」は表現が異なるが意味的に最も近く、ベクトル空間上で近い位置に配置される。"}},{"id":"chunking","term":"チャンク分割","yomi":"ちゃんくぶんかつ","aliases":["チャンキング","チャンク","分割粒度"],"ch":3,"sec":"14","secTitle":"RAGの仕組み","def":"長い文書を意味のあるまとまり(チャンク)ごとに区切る処理。チャンクが大きすぎると複数トピックが混在して検索ノイズになり(例: Windows版とMac版の手順が混在し誤案内)、小さすぎると文脈が失われて回答の質が低下する(例: 「手順3: 新しいパスワードを入力する」だけがヒット)。「1つのトピックが1つのチャンクに収まる」サイズが目安で、マニュアルなら見出し単位が一般的。","points":["各チャンクにカテゴリ・対応OS・最終更新日などのメタデータを付与すると検索精度が上がる","最初から完璧な設計を目指さず、まず動くものを作りテスト運用の問題(誤案内・文脈欠如)をもとに段階的に分割を見直すのが現実的","FAQ集は質問と回答のペアを1件ずつ分離してメタデータを付与すると精度が高まる"],"related":["rag-two-phases","metadata","rag-eval"],"quiz":{"q":"チャンクサイズが「大きすぎる」場合と「小さすぎる」場合に発生する問題の正しい組み合わせはどれか。","c":["大=検索速度の低下、小=ベクトル化不能","大=複数トピックが混在し検索ノイズが増える、小=文脈が失われ回答の質が低下する","大=メタデータを付与できない、小=コストが増大する","大=ベクトル空間で近接配置される、小=セマンティック検索が機能しない"],"a":1,"exp":"大きすぎると無関係な情報まで返り、小さすぎると文脈を欠いた断片になる。「1トピック=1チャンク」が目安。"}},{"id":"rag-eval","term":"RAG精度の切り分け(検索/生成)と向上4観点","yomi":"らぐせいどのきりわけ","aliases":["検索精度","生成精度","リランキング","クエリ変換"],"ch":3,"sec":"14","secTitle":"RAGの仕組み","def":"RAGの精度は「検索の精度(関連チャンクを適切に取得できているか)」と「生成の精度(取得したチャンクに忠実で過不足ない回答か)」の2段階で測る。回答が不正確なとき、どちらに原因があるかを切り分けることが改善の出発点。区別せずに対処すると原因でない側を改善し続けることになる。","points":["切り分けの実際: 検索されたチャンクを記録し「正しいチャンクが上位にあるか」を確認。メール設定の質問にVPN関連チャンクが上位なら検索の問題(チャンク粒度・メタデータ不足・用語の乖離)。正しいチャンクが取れているのに回答が不正確なら生成の問題(プロンプト改善・LLM設定調整)","精度向上の4観点: ①質問の変換(曖昧な質問を検索に適した形に変換・分解)、②検索先の振り分け(質問内容に応じてベクトルDB/リレーショナルDB等を選ぶ)、③検索結果の並べ替えと絞り込み(リランキング・フィルタリング)、④チャンクの設計と構造化(粒度・メタデータ・要約テキスト併用)","ストラテジストの4原則: ナレッジベースの品質がRAG精度を左右する/チャンク設計は最初から完璧を目指さない/メタデータが検索精度を大きく左右する/精度問題は検索と生成に分けて特定する","原因特定なしにモデル変更から着手するのは非効率"],"related":["rag-two-phases","chunking","metadata"],"quiz":{"q":"「Outlookでメールが送信できない」という問い合わせにAIが「VPN接続を確認してください」と回答した。最も適切な対処はどれか。","c":["LLMをより高性能なモデルに変更する","検索されたチャンクを確認し、VPN関連が上位なら メタデータ付与やチャンク分割の見直しで検索精度を改善する","ナレッジベースの全ドキュメントを作り直す","RAGを諦めてすべての回答を人間が書く"],"a":1,"exp":"まず検索と生成のどちらに原因があるかを切り分ける。無関係なチャンクが上位なら検索段階の問題であり、チャンク粒度やメタデータの改善が対策。原因特定なしのモデル変更は非効率。"}},{"id":"ai-governance","term":"AIガバナンス","yomi":"えーあいがばなんす","aliases":["ガバナンス","管理体制"],"ch":3,"sec":"15","secTitle":"AIガバナンスと法務","def":"組織としてAIエージェントをどのように利用・管理・監督するかを定めた体制・ルール・プロセスの総称。エージェントとしてのAI活用では、AIが人間の指示なしに判断・行動し、複数エージェントが連携して外部システムに接続するため、「誰が、どこで、何のために動かしているか」を組織として把握しなければ問題発生時に原因を特定できない。","points":["ガバナンスなしの導入は「ブレーキのない車を走らせる」に等しい。自律性が高まるほどガバナンス設計はツール選定や業務設計と同等の重みを持つ","ガバナンスの目的はリスクを恐れて導入を止めることではなく、リスクを可視化し許容範囲で管理しながら安全に活用する土台を作ること","ストラテジスト固有の能力=技術と法務の橋渡し(翻訳力)。「RAGでナレッジベースを検索しLLMがプロンプトに含めます」→「社内文書のテキストが外部AIサービスに送信されます。個人情報や営業秘密が含まれる場合、個人情報保護法対応と情報漏洩リスク評価が必要です」のように、法務が判断できる言葉に翻訳する","翻訳の注意: 「学習します」という表現は誤解を招く。RAGはパラメータを更新せず検索結果を参照するだけ"],"related":["ai-policy","legal-risks","blackbox-risk"],"quiz":{"q":"ストラテジストが法務部門に「RAGでナレッジベースを検索し、LLMがプロンプトに含めて回答を生成します」と説明する場合の適切な翻訳はどれか。","c":["「AIが社内文書を自動学習して知識を更新します」","「社内文書のテキストがAIサービスに送信され、AIがその内容を参照して回答を作成します」","「AIが社内のすべてのデータにアクセスして最適な回答を生成します」","「社内文書は安全に保管されAIには一切送信されません」"],"a":1,"exp":"技術的に正確かつ法務がリスク評価できる翻訳が必要。「学習」はパラメータ更新を連想させ誤解を招く(RAGは検索・参照のみ)。「すべてのデータ」は不正確、「送信されない」は事実と異なる。"}},{"id":"ai-policy","term":"AIポリシーと利用ガイドライン","yomi":"えーあいぽりしー","aliases":["許可データ","禁止データ","利用ガイドライン"],"ch":3,"sec":"15","secTitle":"AIガバナンスと法務","def":"AIポリシーは組織としてのAI利用ルールを文書化したもので、核心は「入力を許可するデータ」と「入力を禁止するデータ」の明確な定義。万社共通の正解は存在せず、業種・データの機密レベル・AIサービスの形態・適用される法規制によって企業ごとに大きく異なる。利用ガイドラインはポリシーの抽象的なルールを個々の従業員が日常業務で判断できる具体的な行動指針に変換したもの。","points":["許可データの一般例: 公開情報、社内FAQ、一般的な業務文書。禁止データの一般例: マスキング前の個人情報、未公開の財務情報、営業秘密。あくまで出発点であり自社の判断で具体化する","法務・セキュリティ・事業部門と協議して策定。他社ポリシーの流用は不可。オンプレミス運用ならデータが外部送信されないため許可範囲が広がり得る(クラウド型とはリスクの性質が異なる)","策定して終わりではなく、半年〜1年に1度の定期見直しを運用サイクルに組み込む","ガイドラインの質は具体性で決まる。「適切に利用すること」は機能しない。「個人名・顧客名・口座番号を匿名化してから入力」「出力は担当者確認後に送信」「社外公開は管理職承認」のように何を・どうすれば・誰が確認するかまで記述"],"related":["ai-governance","legal-risks"],"quiz":{"q":"AIポリシーの策定に関する記述として最も適切なものはどれか。","c":["業界団体の標準テンプレートをそのまま適用すればよい","許可データと禁止データの定義は自社の業務内容・機密レベル・AIサービスの形態に応じて法務部門と協議して策定する","クラウド型でもオンプレミス型でもポリシーの内容は同じでよい","一度策定すれば以降は見直す必要がない"],"a":1,"exp":"AIポリシーに万社共通の正解はない。業種・機密レベル・サービス形態で企業ごとに異なり、クラウド型とオンプレ型はリスクの性質が違う。定期見直しも運用に組み込む。"}},{"id":"legal-risks","term":"AI利用の3つの法的リスクと責任分界点","yomi":"みっつのほうてきりすく","aliases":["著作権リスク","個人情報保護法","責任分界点","マスキング"],"ch":3,"sec":"15","secTitle":"AIガバナンスと法務","def":"ストラテジストが最低限押さえるべき法的リスクは3つ。①著作権リスク(学習データに含まれる著作物の権利+AI生成コンテンツの権利帰属。「AIの出力そのものには原則著作権が発生しない」が主流の見解だが、人間が創作的関与をした場合は認められる可能性があり、解釈は国・地域・判例で変化し続ける)。②個人情報保護法リスク(本人を特定できる情報を外部サービスに送信する場合、利用目的の明示・本人の同意・安全管理措置が必要。マスキング処理が具体的対応策)。③責任分界点のリスク(AIが誤った判断をした場合に誰が責任を負うかに組織として答えられていない状態)。","points":["AIには法的責任を負わせることができない。自律的に動くからこそ責任の所在を人間の側で事前に決めておくことがガバナンスの核心","HITL設計で「AIの判断をそのまま実行したわけではない」状態を作り、設計者・承認者・経営者の責任範囲を明文化する","責任分界の例: FAQの自動回答→第一義的責任は運用管理者。担当者確認付き回答→確認して送信した時点で責任は担当者に移る","著作権の解釈は変化し続けるため法務部門との継続的な確認が必要"],"related":["ai-policy","ai-governance","hitl","blackbox-risk"],"quiz":{"q":"AIエージェントの自動回答が誤った情報を案内し業務上の損害が発生した。責任に関する記述として最も適切なものはどれか。","c":["AIエージェントの開発元が全責任を負う","AIが自律的に回答したため誰も責任を負わない","AIポリシーに基づく責任分界点に従い、運用管理者または組織が責任を負う","出力を利用したユーザーの自己責任である"],"a":2,"exp":"AIに法的責任は負わせられない。導入前に責任分界点をAIポリシーで定義しておくことが重要で、「誰も責任を負わない」は組織として許容されない。"}},{"id":"seven-habits","term":"AIが読みやすいデータ・7つの習慣","yomi":"ななつのしゅうかん","aliases":["AI可読データ","1セル1データ","固有名詞で書く","セル結合"],"ch":3,"sec":"16","secTitle":"AIエージェントが読みやすいデータを作る","def":"人間にとって読みやすい文書がAIにとって扱いやすいとは限らない(セル結合で整えた表は行と列の対応が崩れる、「例の件、確認済み」は主語や対象が不明)。原則は「AIエージェントが見えないものは、存在しないのと同じ」。既存業務の延長で実践できる7つの習慣: ①固有名詞で書く、②見た目より構造で作る(セル結合しない・色で意味を持たせない・1セル1データ)、③正しい入力がラクにできる環境を作る(表記ゆれはプルダウンやマスタ参照で仕組み的に防ぐ)、④重要な画像に注釈を入れる、⑤日付とカテゴリタグを入れる、⑥バージョン管理は履歴機能で行う(「最終版_修正2_確定」を作らない)、⑦AIがアクセスできる場所に置く(個人PCやメール添付では参照不可)。","points":["AIが扱いやすいデータの条件: その記述だけで意味が分かる/1項目に1情報/構造が文字として明示されている","判断基準②は「見栄えの良い資料」ではなく「フィルタやピボットが使える状態」","習慣③の本質は「人間の注意力に頼らず仕組みで品質を担保する」— AI運用設計全般に通じる原則","「例の件」「いつもの対応で解決」のような表現は参照先を固有名詞で明示し、テンプレートや入力項目の設計で自然に記録できる仕組みを作る"],"related":["ai-ready-data","metadata","kb-freshness","harness-engineering"],"quiz":{"q":"顧客名が「トヨタ」「トヨタ自動車」「Toyota」と複数の表記で入力される問題への対策として、7つの習慣の考え方に最も沿ったものはどれか。","c":["「表記を統一しよう」と全社に呼びかける","入力者に注意喚起のメールを毎月送る","プルダウン選択やマスタテーブル参照など、入力を間違えにくい仕組みを作る","表記ゆれはAIが自動で吸収するので対策不要"],"a":2,"exp":"人間の注意力に頼らず、そもそも間違えにくい仕組みで品質を担保するのが本質。呼びかけだけでは定着しない。"}},{"id":"ai-ready-data","term":"AI Readyデータ","yomi":"えーあいれでぃでーた","aliases":["AI Ready","4つの特性","Gartner"],"ch":3,"sec":"16","secTitle":"AIエージェントが読みやすいデータを作る","def":"AIエージェントが正確かつ安全に処理・活用できる状態に整備されたデータ。Gartnerは条件を4特性で整理: ①正確性(データが正確で矛盾がない)、②可視性(所在と意味が明確でメタデータが整備)、③追跡可能性(出所と変更履歴が追跡可能)、④安全性(アクセス制御とプライバシー保護が適切)。Gartnerは「2026年までにAI Readyデータの不備が原因でAIプロジェクトの60%が中止される」と予測。","points":["IBMの2024年調査では「自社データがAIに必要な品質・アクセスしやすさ・セキュリティ基準を満たす」と答えた技術責任者は29%にとどまる","AIプロジェクトの成否はAIの技術力ではなくデータの準備状況で決まる — この事実を経営層と共有できることがストラテジストの武器","7つの習慣は4特性の実行の最前線(習慣1〜4=正確性、習慣5=可視性、習慣6=追跡可能性、習慣7+ガバナンス=安全性)","既存データの整形は「全部やる」が罠。導入対象業務とRAG参照範囲を決め、その範囲を優先整形し、それ以外は後回しにしてまず動かす。従来のナレッジ整備が続かないのは「入力する人にメリットがなく活用する人だけが得をする」構造のため"],"related":["seven-habits","kb-freshness","ai-governance"],"quiz":{"q":"GartnerによるAI Readyデータの4つの特性に含まれないものはどれか。","c":["正確性(データが正確で矛盾がない)","可視性(所在と意味が明確でメタデータが整備されている)","追跡可能性(出所と変更履歴が追跡できる)","高速性(データの読み込みが高速である)"],"a":3,"exp":"4特性は正確性・可視性・追跡可能性・安全性。読み込み速度は含まれない。"}},{"id":"kb-freshness","term":"ナレッジベースの鮮度管理","yomi":"なれっじべーすのせんどかんり","aliases":["ドリフト","更新パイプライン","旧版の無効化","階層管理"],"ch":3,"sec":"16","secTitle":"AIエージェントが読みやすいデータを作る","def":"ナレッジベースを静的に扱う(一度投入したら更新しない)ことが品質劣化の最大の原因。古い情報を返し続けて回答品質が徐々に劣化する現象を「ドリフト」と呼ぶ。対策は更新パイプラインの4ステップ: ①変更の検知(更新日時や差分情報で自動把握)→②変更箇所の反映(変更分のみ再登録)→③古い情報の除外(旧チャンクの削除・無効化・有効期限付与)→④品質の確認(更新前後で同じ質問の回答を比較)。","points":["更新トリガーの使い分け: 自動更新=更新頻度が高く形式が定まったドキュメント(ITマニュアル・FAQ)、定期棚卸し=頻度は低いが影響が大きいもの(就業規則・契約テンプレート)、人間のフィードバックトリガー=現場が「古くなった」と気づいた時点で更新申請(SECIの表出化の継続)","旧版と新版が両方登録されていると旧版が検索上位に来ることがある。旧版削除+履歴機能管理、または有効期限メタデータで最新版を優先","ナレッジソースの階層管理: 信頼度の高いプライマリソース(社内規程・製品仕様書・認定マニュアル)を最優先で投入し、セカンダリソース(Slackログ・個人メモ・フォーラム)は期間・チャンネル・投稿者ロールなどのフィルタ条件を設ける","機密性の異なるデータは同じナレッジベースにまとめず、アクセス権限に応じて分けて管理(全社向けと人事部門専用を分離)"],"related":["seci-model","seven-habits","rag-eval","metadata"],"quiz":{"q":"「製品Aのライセンス価格を教えて」に対しAIが2024年度の旧価格を回答した。ナレッジベースには2026年度の最新価格表も登録済み。最も可能性が高い原因はどれか。","c":["旧版と新版の両方が登録されており、RAGが旧版を検索上位に返した","LLMが2024年のデータで事前学習されているため","質問文に「2026年度」と明記されていなかったため","価格表がPDF形式で読み取れなかったため"],"a":0,"exp":"旧版の無効化が未実施だと両方が検索対象になり旧版が上位に来ることがある。対策は旧版削除+履歴機能管理、または有効期限メタデータでの最新版優先。RAG利用時は事前学習の年度は関係ない。"}},{"id":"harness-engineering","term":"コンテキストエンジニアリング(環境設計)","yomi":"こんてきすとえんじにありんぐ","aliases":["ハーネスエンジニアリング","環境設計","AIが動く環境"],"ch":3,"sec":"16","secTitle":"AIエージェントが読みやすいデータを作る","def":"AIエージェントが暴走せず狙い通りの成果を出し続けるための「環境設計」全般を指す概念。データ品質の整備・ナレッジベースの鮮度管理・仕組みでの品質担保に加え、出力の自動チェックの仕組み、段階的に作業を進めさせるワークフロー設計、参照するルールの明文化などを含む。","points":["本質的な視点:「AIエージェントの回答品質はAIモデルの賢さだけでは決まらない」。同じモデルでもデータ整備状況・ルールの明文化・チェック体制で成果は大きく変わる","AIの性能を上げるより、AIが正しく動ける環境を整える方が多くの場合効果的かつ即効性がある","人間とAIの役割分担: 人間が基本的な書き方・整理ルールを守り、メタデータ付与やタグ付けなど補助作業はAIで自動化(AIの叩き台+人間の確認)","ハーネスエンジニアリングの4領域(第4章S22): ①コンテキスト設計、②データ品質管理、③出力の自動チェック(自律的に動く環境では人間が都度確認できないため特に重要)、④Human-in-the-Loopの設計。ハーネスとは馬を正しい方向に導く手綱のこと"],"related":["seven-habits","kb-freshness","ai-ready-data","context-engineering"],"quiz":{"q":"AIエージェントの回答品質を向上させるアプローチとして最も効果的なものはどれか。","c":["高性能で最新のLLMに定期的にアップグレードする","参照データの品質を高め、ルールの明文化やチェック体制などAIが正しく動ける環境を整備する","プロンプトを長く詳細に書くことだけで対応する","すべての回答を人間がチェックし手動で書き直す"],"a":1,"exp":"回答品質はモデルの性能だけでは決まらない。データ品質・ルール明文化・チェック体制という環境の整備が最も効果的かつ即効性がある。全件人間チェックはスケールしない。"}},{"id":"ai-uncertainty","term":"AIプロジェクトの3つの不確実性","yomi":"みっつのふかくじつせい","aliases":["技術面の不確実性","業務適合性","効果面","アジャイルとの違い"],"ch":3,"sec":"17","secTitle":"AIプロジェクトの進め方","def":"通常のシステム開発は「何を作るか」は決まっていて実装方法や工数が不確実だが、AIプロジェクトは「そもそもAIエージェントはこの課題を解けるのか」という根本的な問いが未解決のまま始まる。①技術面(自社データの質・量・ばらつきで期待精度が出るか事前に判断できない)、②業務適合性(技術的に動いても現場に受け入れられ使われるとは限らない)、③効果面(導入しても効果が想定どおり現れるとは限らず実測が必要)の3種類が重なる。だからこそ本番導入前の限定的な試行=PoC(概念実証)が不可欠。","points":["アジャイル開発は「何を作るかはわかっている」前提の反復であり、「そもそもAIが解けるか」には答えない","デザイン思考は課題発見に優れるが、AIプロトタイプの精度評価や定着判断のフレームは持たない","両者とも一部には有効だが「このPoCは合格か、やり直しか、撤退か」の判断基準は提供しない。AI固有の不確実性に対処する独自のプロセス設計が必要"],"related":["poc-flow","three-layer-framework"],"quiz":{"q":"AIプロジェクトが通常のITプロジェクトと本質的に異なる点として最も適切なものはどれか。","c":["開発工数が常に少なくて済む点","「そもそもAIがこの課題を解けるのか」という根本的な問いが未解決のまま始まる点","要件が最初から完全に確定している点","不確実性が一切存在しない点"],"a":1,"exp":"通常の開発は実装方法・工数が不確実だが、AIプロジェクトは技術面・業務適合性・効果面の3つの不確実性が重なり、課題を解けるか自体が未知。そのためPoCによる事前検証が不可欠。"}},{"id":"poc-flow","term":"PoCとA/Bフェーズ・判断ゲート","yomi":"ぴーおーしーとえーびーふぇーず","aliases":["PoC","概念実証","判断ゲート","MVP","撤退判断","スコープ設計"],"ch":3,"sec":"17","secTitle":"AIプロジェクトの進め方","def":"AIプロジェクトはA:実験フェーズ(PoC=課題を解けるかを小さく検証)とB:本運用フェーズ(検証済みの解決策を本番展開)で構成。設計思想は2点: AからBへの移行を「判断ゲート」(進むべき条件が揃っているかを確認する意思決定ポイント)で制御すること、Aフェーズは繰り返しが前提であること。一度のPoCで成功するケースは少数で、繰り返し自体は失敗ではなく正常な進行。撤退の判断も失敗ではなく、小さく失敗を発見して大きな損失を防いだ成果。","points":["Aフェーズ5ステップ: ①初期相談(「AIを使いたい」は手段の指定。何が困っているか/何が変われば成功か/現状どう対処しているかで課題に変換)→②業務分析・現場視察(最重要工程。観察であって提案ではない。マニュアルと実態の差分、データの存在・品質・アクセス可否、成功の定義の合意)→③提案・スコープ設計(最大の落とし穴はスコープの広げすぎ。最もインパクトが大きく実現可能性の見通しが立つ一点に絞る)→④モデル・MVP開発(作り込みすぎない。目的は動くものではなく検証できる状態。精度検証が目的ならUIは最低限)→⑤効果検証(事前定義した方法で測る。結果を見てから基準を設定するとバイアスが入る。定量+定性の両方で合格が条件)","効果検証の3つの帰結: 合格→Bフェーズへ/修正が必要→課題を特定してAフェーズを繰り返す/見通しが立たない→撤
